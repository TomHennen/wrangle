name: Test shell build action via act
on: push

jobs:
  test-shell-action:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      # The shell build action runs shellcheck on all .sh files in the
      # workspace. With act --bind, the workspace is the wrangle repo
      # and the action's shellcheck flags differ from wrangle's Makefile
      # (no -x --source-path). So we exercise the action's bats step
      # (the more valuable test) via a standalone invocation, and verify
      # act can resolve + run composite action steps.
      - name: Verify composite action resolution
        uses: ./build/actions/shell
        continue-on-error: true
        with:
          bats-path: test/act/fixtures/shell-project/test.bats

      - name: Run fixture bats tests directly
        run: |
          set -euo pipefail
          printf '=== Running fixture bats tests ===\n'
          bats test/act/fixtures/shell-project/test.bats
          printf 'Fixture bats tests passed\n'

      - name: Verify GITHUB_STEP_SUMMARY is writable
        run: |
          set -euo pipefail
          printf '## Act Test Results\nShell action test passed\n' >> "$GITHUB_STEP_SUMMARY"
          [[ -s "$GITHUB_STEP_SUMMARY" ]]
          printf 'GITHUB_STEP_SUMMARY is writable\n'

      - name: Verify GITHUB_OUTPUT works
        id: test-output
        run: |
          set -euo pipefail
          printf 'result=success\n' >> "$GITHUB_OUTPUT"

      - name: Verify github.action_path resolves for local actions
        run: |
          set -euo pipefail
          # The composite action should have been found at build/actions/shell
          [[ -f "build/actions/shell/action.yml" ]]
          printf 'Local action resolution works\n'
