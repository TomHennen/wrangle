# Copy this file to your repo at .github/workflows/build_npm.yml
#
# Before first use:
# 1. Configure a Trusted Publisher on npmjs.com (npmjs.com → your package
#    → Settings → Trusted publishing)
#    - Owner: <your-github-org-or-user>
#    - Repository: <your-repo>
#    - Workflow name: build_npm.yml
#    - (optional) Environment: <env-name>
# 2. Bootstrap: trusted publishing cannot publish a package's first
#    version (npm/cli#8544). Run `npm publish` once from a maintainer's
#    terminal with an NPM_TOKEN; subsequent versions go through this
#    automated path.
#
# Publishing runs directly in this workflow (not inside wrangle's reusable
# workflow) because npm Trusted Publishing validates the OIDC token's
# `workflow_ref` against the caller workflow's filename. See:
# https://docs.npmjs.com/trusted-publishers/ (Troubleshooting)
# https://github.com/npm/documentation/issues/1755
#
# Wrangle's reusable workflow generates SLSA provenance (Build L3); its
# `verify` job then verifies that provenance (fail-closed, via ampel against
# the wrangle PolicySet) and emits the signed VSA before declaring
# success. If verification fails, the workflow fails and `needs: [build]`
# blocks publish. The publish job below additionally re-verifies its own
# download against the signed VSA (wrangle/actions/verify-vsa) so the
# exact bytes sent to npm are the bytes that passed wrangle's policy.
#
# Trigger note: this workflow publishes when `should-release` is true.
# This template sets `release-events: tag-only` so only tag pushes
# publish — `workflow_dispatch` runs build + test + provenance + verify
# but does NOT publish, even from main. Switch to `non-pull-request`
# (publish on every non-PR event) or `main-and-tags` (push to main or
# tags) if your release model needs that.
name: npm Build

on:
  push:
    branches: ["main"]  # source scan + snapshot build on main (no publish); drop to skip per-merge builds
    tags: ["v*"]       # publish on version tags
  pull_request:
    branches: ["**"]   # build + test on PRs (no publish)
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write   # wrangle's verify job attaches the VSA to the release on tags; GitHub validates at startup even on non-tag runs
      id-token: write   # OIDC for Sigstore signing
      attestations: write   # wrangle's attest job writes GitHub-issued SLSA provenance
      actions: read  # source scan: Scorecard reads the Actions API
      security-events: write  # source-scan SARIF -> Security tab
    uses: TomHennen/wrangle/.github/workflows/build_and_publish_npm.yml@v0.2.2 # zizmor: ignore[unpinned-uses] - immutable
    with:
      path: "."
      release-events: tag-only          # only tag pushes publish (recommended default)
      # node-version: ""                # optional: auto-detected from .nvmrc or package.json
      # run-tests: true                 # optional: skip with false
      # ignore-scripts: false           # optional: set true to suppress prepare/prepack/postpack hooks (breaks projects that rely on husky, prebuild-install)

  publish:
    # Gate on the should-release output. should-release is "true" only when
    # the wrangle workflow succeeded (which includes the verify job's
    # provenance verification). That job verified its own download on its
    # own runner; the verify-vsa step below re-checks THIS job's bytes.
    if: ${{ needs.build.outputs.should-release == 'true' }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for Trusted Publishing
      contents: read
    steps:
      # setup-node v6 + Node 24 are required for Trusted Publishing:
      #   - npm 11.5.1+ is the minimum that supports OIDC auth (ships with Node 24).
      #   - setup-node v6 does NOT auto-export NODE_AUTH_TOKEN, letting
      #     npm 11's OIDC auto-detection take effect. v4/v5 would inject
      #     an empty NODE_AUTH_TOKEN that silently downgrades the publish
      #     to legacy token auth.
      # Trusted Publishing exchanges the GHA OIDC token for a publish
      # credential — DO NOT set NODE_AUTH_TOKEN anywhere in this job.
      # A leftover token (e.g., from an org-level secret reference)
      # would silently bypass the OIDC binding and downgrade to legacy
      # token auth.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false   # no lockfile in this job; suppresses v6's cache warning

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.dist-artifact-name }}
          path: dist/

      # Verify the downloaded tarball against wrangle's signed VSA — the
      # full policy verdict — before any bytes leave this runner.
      - uses: TomHennen/wrangle/actions/verify-vsa@v0.2.2 # zizmor: ignore[unpinned-uses] - immutable
        with:
          path: dist/
          resource-uri: ${{ needs.build.outputs.resource-uri }}

      # `npm publish <tgz> --provenance --access public` populates the
      # registry's per-version attestation slot with a Sigstore-signed
      # SLSA L2 in-CLI bundle. Wrangle's separate L3 bundle lives in the
      # metadata-artifact, attached to GitHub Releases on tag pushes.
      # Note: --access public is only required on the FIRST publish of
      # a scoped package; harmless on subsequent publishes.
      #
      # The `./` prefix on the tarball path is load-bearing: without it,
      # npm's package-arg parser treats `dist/foo.tgz` as a GitHub
      # shorthand (`owner=dist`, `repo=foo.tgz`) and attempts
      # `git ls-remote ssh://git@github.com/dist/foo.tgz.git` instead of
      # publishing the local file.
      - name: Publish to npmjs.org
        env:
          TARBALL: ${{ needs.build.outputs.tarball }}
        run: npm publish "./dist/${TARBALL}" --provenance --access public
