# Copy this file to your repo at .github/dependabot.yml
#
# The github-actions entry below raises update PRs for the action pins in
# your workflows — including your `uses: TomHennen/wrangle/...` pin, which
# is how you pick up new wrangle releases.
#
# Do NOT enable auto-merge: review updates after the ~7-day `cooldown`
# below, so the community can surface supply-chain attacks first.
version: 2
updates:
  - package-ecosystem: "github-actions"
    # "/" covers .github/workflows, where your `uses: TomHennen/wrangle/...` pin
    # lives. If you add your OWN composite actions in subdirectories, add a
    # directory entry per action — github-actions globs don't recurse into
    # nested action.yml files.
    directory: "/"
    # An action pinned in several files (a wrangle ref in multiple workflows,
    # or across "/" and your composites) moves in one PR under group-by, so no
    # two copies diverge.
    groups:
      across-directories:
        patterns:
          - "*"
        group-by: dependency-name
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

