# Copy this file to your repo at `.goreleaser.yml` (or `.goreleaser.yaml`).
#
# This is the minimum goreleaser config wrangle's Go build type
# requires. wrangle runs goreleaser with --skip=publish: it builds the
# archives + checksums into dist/ but publishes nothing. wrangle then
# uploads only the attested archives + checksums.txt (plus signed-VSA
# bundles) to the tag's GitHub Release, creating it if absent. Do NOT add goreleaser
# publisher config — release.draft, brews, dockers, nfpms, announce —
# here: those verbs never run under --skip=publish, and wrangle only
# publishes what it can attest. Full reference:
# https://goreleaser.com/customization/.

version: 2

builds:
  # `main:` is the path to your binary's entry point. Adjust to match
  # your project layout. For a monorepo with multiple binaries, add
  # one `builds:` entry per binary.
  - main: ./cmd/example

    # `-trimpath` strips local filesystem paths from the binary —
    # zero runtime cost, materially improves reproducibility, makes
    # wrangle's SLSA provenance bind to source rather than build host.
    flags:
      - -trimpath

    # `-buildvcs=false` suppresses VCS-info embedding (commit SHA,
    # dirty flag, timestamps). Zero runtime cost; same reproducibility
    # win as -trimpath. Without it, two builds of the same commit
    # produce different bytes.
    env:
      - GOFLAGS=-buildvcs=false

    # Default GOOS / GOARCH matrix produces linux + darwin + windows
    # binaries for both amd64 and arm64. Trim to just what you ship
    # — every extra cell costs CI time.
    # goos: [linux, darwin]
    # goarch: [amd64, arm64]

# Pin the checksums filename — wrangle base64-encodes
# dist/checksums.txt for attest-build-provenance's subject-checksums
# input. Custom names break that hand-off.
checksum:
  name_template: "checksums.txt"

# Tarball naming for the archives goreleaser builds (and wrangle
# uploads). Goreleaser's defaults are reasonable; this is just the
# explicit form.
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

# Snapshot name for non-release builds (PRs, non-tag pushes).
# Uses only ShortCommit — avoids .Version, which goreleaser derives from
# your nearest git tag and may not be valid semver before your first v*
# release. Functions like incpatch / incminor / incmajor require semver
# and will fail if your repo has only non-semver tags (e.g. "phase-0-complete").
snapshot:
  version_template: "{{ .ShortCommit }}-snapshot"

# NOTE: goreleaser's downstream publisher verbs (brews, dockers, nfpms,
# announce, …) do NOT run under wrangle — it invokes goreleaser with
# --skip=publish and publishes only the attested archives + checksums.txt
# itself, because it can't attest those other outputs. Need attested
# container images? Pair with wrangle's container build type. Need a
# Homebrew tap or deb/rpm? Run that from a separate, non-wrangle job
# against the binaries wrangle published.
