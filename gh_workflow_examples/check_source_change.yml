# Copy this file to your repo at .github/workflows/check_source_change.yml
# Adjust the branch name if your default branch isn't "main".
name: Check Source Change
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  check-change:
    permissions:
      actions: read
      contents: read
      security-events: write
    # TODO(v0.1.0): Update to @v0.1.0 before release
    uses: tomhennen/wrangle/.github/workflows/check_source_change.yml@main
