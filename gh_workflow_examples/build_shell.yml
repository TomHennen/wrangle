# Copy this file to your repo at .github/workflows/build_shell.yml
# Adjust the branch name if your default branch isn't "main".
name: Shell Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  shell-build:
    permissions:
      contents: read
    uses: TomHennen/wrangle/.github/workflows/build_shell.yml@v0.1.0
