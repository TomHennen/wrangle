# Copy this file to your repo at .github/workflows/build_go.yml
#
# Before first use:
# 1. Copy `gh_workflow_examples/build_go.goreleaser.yml` to your
#    repo root as `.goreleaser.yml` and adjust to your project
#    (binary name, GOOS/GOARCH matrix).
# 2. Make sure your release tags match `v*` — goreleaser uses the
#    tag name as the version.
#
# Wrangle's reusable workflow handles build, tests, SBOM, SLSA L3
# provenance generation, its `verify` job's provenance verification
# (fail-closed, via ampel against the wrangle PolicySet) plus signed-VSA
# emission. goreleaser builds with --skip=publish, then wrangle creates
# the Release and uploads ONLY the attested artifacts. Downstream
# goreleaser verbs (Docker pushes, Homebrew taps, deb/rpm/snap,
# announcements) are NOT run — they'd ship bytes without provenance;
# run them from your own job, or use wrangle's container build type for
# attested images. This caller workflow gates which events publish.
#
# Trigger note: `release-events: tag-only` means only tag pushes
# publish a release. PR builds run the full pipeline (build → tests
# → SBOM) but do NOT mint provenance or publish.
name: Go Build

on:
  push:
    branches: ["main"]  # source scan + snapshot build on main (no publish); drop to skip per-merge builds
    tags: ["v*"]       # publish on version tags
  pull_request:
    branches: ["**"]   # build + test on PRs (no provenance, no publish)
  workflow_dispatch:

jobs:
  build:
    # Maximum the caller grants; wrangle's internal jobs each drop to the subset they actually need.
    permissions:
      contents: write   # wrangle's publish job creates the Release + uploads the attested artifacts
      id-token: write   # OIDC for Sigstore signing
      attestations: write   # wrangle's attest job writes GitHub-issued SLSA provenance
      actions: read  # source scan: Scorecard reads the Actions API
      security-events: write  # source-scan SARIF -> Security tab
    uses: TomHennen/wrangle/.github/workflows/build_and_publish_go.yml@v0.2.2 # zizmor: ignore[unpinned-uses] - immutable
    with:
      path: "."
      # release-events: tag-only         # default; uncomment + change to "non-pull-request" or "main-and-tags" for early failure detection on non-tag events
      # go-version: ""                  # optional: auto-detected from go.mod's `go` directive
      # run-tests: true                 # optional: skip with false (also skips gofmt/vet/govulncheck)
      # run-race-detector: true         # optional: set false when CGO is disabled (race detector requires cgo)
      # run-gofmt-check: true           # optional: set false only if the `// Code generated` auto-skip isn't enough
