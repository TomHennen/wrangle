# Copy this file to your repo at .github/workflows/build_go.yml
#
# Before first use:
# 1. Drop a `.goreleaser.yml` config in your repo root (or under `path:`
#    if your Go project lives in a subdirectory). Wrangle does not ship
#    a starter goreleaser config; bring your own. See
#    https://goreleaser.com/customization/ for the schema.
#    Minimum recommended `builds:` settings for reproducible bytes:
#        builds:
#          - flags: [-trimpath]
#            env: [-buildvcs=false]
#
# Unlike python and npm, the adopter does NOT need a separate publish
# job here. Go has no language-level package registry with a caller-
# bound OIDC publish constraint, so goreleaser itself owns publish on
# tag pushes — it creates the GitHub Release, attaches archives + checksums,
# and runs every downstream verb your .goreleaser.yml configures (Docker
# pushes, Homebrew taps, deb/rpm/snap, announcements). The SLSA generator
# appends the provenance file to the same release shortly after.
#
# Single `uses:` line is the full integration.
#
# Trigger note: this template sets `release-events: tag-only` so only
# tag pushes publish a GitHub Release. PR builds run the full pipeline
# (build → tests → SBOM) but do NOT mint provenance or publish. Switch
# to `non-pull-request` or `main-and-tags` for a different release model.
name: Go Build

on:
  push:
    tags: ["v*"]       # publish on version tags
  pull_request:
    branches: ["**"]   # build + test on PRs (no provenance, no publish)
  workflow_dispatch:

jobs:
  build:
    permissions:
      # Required by goreleaser's inline publish + wrangle's nested provenance:
      contents: write   # goreleaser creates the GitHub Release on tag push + SLSA generator's upload-assets job (declared at startup)
      id-token: write   # OIDC for Sigstore signing
      actions: read     # SLSA generator detects the GitHub Actions environment
    uses: TomHennen/wrangle/.github/workflows/build_and_publish_go.yml@v0.2.0
    with:
      path: "."
      release-events: tag-only          # only tag pushes publish a release (recommended default)
      # go-version: ""                  # optional: auto-detected from go.mod's `go` directive
      # run-tests: true                 # optional: skip with false (also skips gofmt/vet/govulncheck)
      # run-race-detector: true         # optional: set false when CGO is disabled (race detector requires cgo)
      # run-gofmt-check: true           # optional: set false only if the `// Code generated` auto-skip isn't enough
      # verify-provenance: true         # optional: wrangle verifies post-publish; set false for custom verify
