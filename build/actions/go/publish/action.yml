name: Wrangle Go Publish
description: >
  Create the GitHub Release for a tag and upload the artifacts wrangle
  attested: the goreleaser archives, checksums.txt, and one signed VSA
  bundle per archive. Runs after attest + verify, so nothing ships until
  the provenance and the VSA pass. goreleaser builds with --skip=publish,
  so its downstream verbs (Docker pushes, Homebrew taps, deb/rpm) are NOT
  run — only wrangle-attested artifacts reach the Release.

inputs:
  tag:
    description: "Release tag (the build job's version output) to create/upload to."
    required: true
  dist-dir:
    description: "Directory holding the goreleaser archives + checksums.txt."
    required: true
  dist-files:
    description: "JSON array of archive basenames (the build job's dist-files output)."
    required: true
  bundles-dir:
    description: "Directory holding the <archive>.intoto.jsonl VSA bundles."
    required: true

runs:
  using: composite
  steps:
    - name: Create release and upload attested artifacts
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
        DIST_DIR: ${{ inputs.dist-dir }}
        DIST_FILES: ${{ inputs.dist-files }}
        BUNDLES_DIR: ${{ inputs.bundles-dir }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/publish_release.sh" "$TAG" "$DIST_DIR" "$DIST_FILES" "$BUNDLES_DIR"
