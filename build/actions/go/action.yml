name: Wrangle Go Build
description: |
  Build a Go project via goreleaser, run gofmt/vet/test/govulncheck,
  generate SBOM, and compute artifact hashes for SLSA provenance.
  SLSA provenance generation is handled by a separate job in the
  reusable workflow. Publishing to GitHub Releases happens in a
  separate `publish` job in the reusable workflow, AFTER verify —
  preserving wrangle's "verify before publish" invariant. Goreleaser
  here always runs with `--skip=publish`; it builds and packages, but
  upload is owned by the reusable workflow's publish job.

inputs:
  path:
    description: "Relative path to the directory containing go.mod and .goreleaser.yml"
    required: false
    default: "."
  go-version:
    description: |
      Go version override. If empty, setup-go reads from go.mod's
      `go` directive — the wrangle-recommended path so the build
      version stays in lockstep with the module declaration.
    required: false
    default: ""
  run-tests:
    description: "Whether to run `go test ./...` (with -race) before the build"
    required: false
    default: "true"
  cache:
    description: |
      Whether the Go module + build caches (actions/setup-go's `cache`
      input) are used. "enabled" (default) lets setup-go restore and
      save both caches; "disabled" passes `cache: false` so the build
      consumes no shared cache. Validated against the enabled|disabled
      allowlist by validate_inputs.sh.

      The reusable workflow (build_and_publish_go.yml) sets this to
      "disabled" for release builds and "enabled" for PR builds. Go's
      module cache re-verifies entries against `.ziphash` on use, but
      an attacker controlling the GHA cache scope can plant a malicious
      module AND a matching `.ziphash` — so the re-verification protects
      against random corruption, not against a coordinated cache-scope
      attacker. The build cache (`~/.cache/go-build`) is stricter still:
      it stores compiled output keyed by source fingerprint, and the
      toolchain trusts the cached output to be the correct compile of
      those inputs (the same shape as the uv-cache GAP in
      docs/SLSA_L3_AUDIT.md Finding 1). Disabling the cache for release
      builds keeps Go on the L3-Isolated path — fresh download, fresh
      build, no cross-build shared state in the bytes the SLSA generator
      signs.

      Direct callers of this composite (not a supported L3 path) get
      caching by default; they are not claiming L3 provenance.
    required: false
    default: "enabled"
  govulncheck-version:
    description: |
      Version of govulncheck to install (via `go install
      golang.org/x/vuln/cmd/govulncheck@<version>`). Pinned in wrangle
      to keep new upstream releases from amplifying through wrangle
      without a deliberate bump — same supply-chain hygiene wrangle
      applies to every adopted tool. sum.golang.org's Trillian-backed
      Merkle log over `go.sum`-shaped lines provides install-time
      integrity.
    required: false
    default: "v1.1.4"

outputs:
  version:
    description: "The release version (git tag) goreleaser used, or 'snapshot' for non-tag builds"
    value: ${{ steps.metadata.outputs.version }}
  hashes:
    description: "Base64-encoded SHA-256 hashes of built artifacts (for SLSA generator)"
    value: ${{ steps.hash.outputs.hashes }}
  shortname:
    description: "Path-derived short name for artifact namespacing (e.g., '.' becomes '_')"
    value: ${{ steps.metadata.outputs.shortname }}
  metadata-dir:
    description: "Path to the metadata directory (relative to the workspace) containing the SBOM and govulncheck output"
    value: ${{ steps.metadata.outputs.metadata-dir }}

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_CACHE: ${{ inputs.cache }}
      run: |
        set -euo pipefail
        if [[ "$INPUT_CACHE" != "enabled" && "$INPUT_CACHE" != "disabled" ]]; then
            printf 'Error: cache input must be one of enabled|disabled (got: %s)\n' "$INPUT_CACHE" >&2
            exit 1
        fi
        "${{ github.action_path }}/validate_inputs.sh" "$INPUT_PATH"

    - name: Compute metadata
      id: metadata
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        SHORTNAME="${INPUT_PATH////_}"
        METADATA_DIR="metadata/go/${SHORTNAME}"
        mkdir -p "$METADATA_DIR"
        printf 'shortname=%s\n' "$SHORTNAME" >> "$GITHUB_OUTPUT"
        printf 'metadata-dir=%s\n' "$METADATA_DIR" >> "$GITHUB_OUTPUT"

        # Version: the git tag if we're on one, otherwise "snapshot".
        # Matches what goreleaser will use for its package version.
        if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
        else
            VERSION="snapshot"
        fi
        printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        # If go-version is empty, setup-go uses go-version-file.
        go-version: ${{ inputs.go-version || '' }}
        go-version-file: ${{ inputs.go-version == '' && format('{0}/go.mod', inputs.path) || '' }}
        # Release builds (cache: disabled) pass `cache: false` so the
        # build consumes no shared, cross-build cache — Go's build cache
        # trusts pre-derived compiled output without re-derivation,
        # which is the same shape as the uv-cache L3 gap. See the
        # `cache:` input docs above for the full reasoning. The cache:
        # input is constrained to enabled|disabled by the validate step.
        cache: ${{ inputs.cache != 'disabled' }}
        cache-dependency-path: ${{ inputs.path }}/go.sum

    # build_go.sh runs gofmt/vet/test/govulncheck. These invocations
    # execute arbitrary project code (tests, vuln scanner against the
    # full callgraph) that could print `::add-mask::` / `::set-output::`
    # workflow commands on stdout to hijack the build job.
    # stop_commands_guard.sh wraps the whole thing so workflow-command
    # injection is neutralized — see docs/SLSA_L3_AUDIT.md Finding 3.
    - name: Run quality checks (gofmt, vet, test, govulncheck)
      if: inputs.run-tests == 'true'
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        METADATA_DIR: ${{ steps.metadata.outputs.metadata-dir }}
        GOVULN_VERSION: ${{ inputs.govulncheck-version }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../../../lib/stop_commands_guard.sh" run \
          "${{ github.action_path }}/build_go.sh" "$INPUT_PATH" "$METADATA_DIR" "$GOVULN_VERSION"

    # Goreleaser runs as a separate `uses:` step (goreleaser-action,
    # SHA-pinned). The action's invocation cannot be wrapped inline by
    # stop_commands_guard.sh, so we use the begin/end form: begin emits
    # the suspend directive + writes the token to GITHUB_OUTPUT; end
    # (in a later step, with if: always()) re-enables. Same pattern the
    # container build type uses for docker/build-push-action.
    - name: Suspend workflow commands (begin)
      id: guard
      shell: bash
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../../../lib/stop_commands_guard.sh" begin

    # Goreleaser runs with --skip=publish always — the build composite
    # never uploads to GitHub Releases inline. Upload happens in the
    # reusable workflow's `publish` job, after the verify job confirms
    # the just-generated SLSA provenance matches the just-built dist.
    # This preserves the "verify before publish" invariant python and
    # npm already have; without --skip=publish, a build that goreleaser
    # publishes but verify later fails would have already exposed the
    # bad bytes to consumers.
    #
    # On non-tag events goreleaser additionally needs --snapshot
    # (`release` refuses to run off a tag without it). Snapshot mode is
    # purely about version-string handling; the produced dist/ layout
    # is identical to a tag build, so hash computation and SBOM
    # generation work the same way.
    - name: Run goreleaser
      uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
      with:
        # Pinned literal version, not "~> v2", to match wrangle's
        # supply-chain discipline (see CLAUDE.md "No auto-merge of
        # dependency updates"). A new upstream goreleaser release MUST
        # be deliberately adopted via a wrangle PR, not amplified
        # automatically the day it ships. Dependabot tracks the
        # goreleaser-action SHA; the binary version below is bumped
        # by hand on the same supply-chain delay (aim for 7 days
        # after upstream release) along with a CI smoke test.
        version: "2.15.4"
        workdir: ${{ inputs.path }}
        args: ${{ startsWith(github.ref, 'refs/tags/') && 'release --clean --skip=publish' || 'release --clean --snapshot --skip=publish' }}

    - name: Resume workflow commands (end)
      if: always()
      shell: bash
      env:
        STOP_COMMANDS_TOKEN: ${{ steps.guard.outputs.stop-commands-token }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../../../lib/stop_commands_guard.sh" end "$STOP_COMMANDS_TOKEN"

    - name: Compute artifact hashes
      id: hash
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        # Goreleaser writes dist/checksums.txt with `<sha256>  <filename>`
        # lines. The SLSA generator's base64-subjects input wants
        # `sha256sum`-style output base64-encoded. dist/checksums.txt is
        # already in that exact format, so we base64-encode it directly
        # (with the file lines stripped of any `./` prefix bare filenames
        # don't have, since goreleaser emits bare names).
        #
        # base64 -w0 (no line wrapping) is what the generator expects.
        HASHES="$(base64 -w0 < "$INPUT_PATH/dist/checksums.txt")"
        printf 'hashes=%s\n' "$HASHES" >> "$GITHUB_OUTPUT"

    - name: Install Cosign (for syft signature verification)
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Install syft
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../../..
      run: |
        set -euo pipefail
        "$WRANGLE_ROOT/tools/syft/install.sh"

    - name: Generate SBOM
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        METADATA_DIR: ${{ steps.metadata.outputs.metadata-dir }}
      run: |
        set -euo pipefail
        SBOM_PATH="${METADATA_DIR}/sbom.spdx.json"
        BIN_DIR="${WRANGLE_BIN_DIR:-${RUNNER_TEMP:-.}/.wrangle/bin}"
        "$BIN_DIR/syft" dir:"$INPUT_PATH" -o spdx-json > "$SBOM_PATH"
        printf 'SBOM written to %s\n' "$SBOM_PATH"

    - name: Generate summary
      if: always()
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        VERSION: ${{ steps.metadata.outputs.version }}
      run: |
        set -euo pipefail
        {
            printf '## Go Build Results\n\n'
            printf '| | |\n|---|---|\n'
            printf '| **Project** | %s |\n' "$INPUT_PATH"
            printf '| **Version** | %s |\n' "$VERSION"
            printf '| **Artifacts** | |\n'
            for f in "$INPUT_PATH"/dist/*; do
                if [[ -f "$f" ]]; then
                    printf '| | `%s` |\n' "$(basename "$f")"
                fi
            done
        } >> "$GITHUB_STEP_SUMMARY"
