name: Wrangle Go Release
description: |
  Invoke goreleaser to build (and on tag pushes, publish) a Go
  project; generate the SBOM via syft; compute artifact hashes for
  SLSA provenance. Sister composite to `build/actions/go/checks` —
  the calling reusable workflow runs checks first (with
  `contents: read`), then this composite (with `contents: write`,
  since goreleaser publishes inline). See build/actions/go/SPEC.md
  "Permissions architecture."

  Goreleaser owns its native publish on tag pushes: it creates the
  GitHub Release, attaches archives + checksums, and runs whatever
  downstream verbs the adopter's .goreleaser.yml configures (Docker
  pushes, Homebrew taps, deb/rpm/snap, announce, etc.). The SLSA
  generator's upload-assets job in the reusable workflow appends
  the provenance file shortly after.

inputs:
  path:
    description: "Relative path to the directory containing go.mod and .goreleaser.yml"
    required: false
    default: "."
  go-version:
    description: |
      Go version override. If empty, setup-go reads from go.mod's
      `go` directive.
    required: false
    default: ""
  cache:
    description: |
      Whether the Go module + build caches (actions/setup-go's
      `cache` input) are used. "enabled" (default) restores+saves
      both; "disabled" passes `cache: false`. The reusable workflow
      sets this to "disabled" for release builds — the bytes the
      SLSA generator signs must derive without consulting any
      shared cross-build cache. See SPEC.md "Cache isolation" for
      the L3 reasoning.
    required: false
    default: "enabled"
  publish:
    description: |
      Whether goreleaser publishes the release inline. The calling
      reusable workflow sets this to the AND of `should-release`
      (from the gate job) and `startsWith(github.ref, 'refs/tags/')`
      — both conditions must hold for a publish to actually be
      possible (gh release requires a tag, and the adopter's
      release-events input controls whether wrangle's pipeline
      treats this event as a release at all).

      true  -> goreleaser runs `release --clean` (full publish,
               creates the GitHub Release, runs Docker pushes,
               Homebrew taps, etc. per the adopter's config).
      false -> goreleaser runs `release --clean --snapshot --skip=publish`
               (builds locally, no upload). PR builds use this so
               the pipeline is exercised without publishing.
    required: false
    default: "false"
  metadata-dir:
    description: |
      Workspace-relative path where sbom.spdx.json should be
      written (typically `metadata/go/<shortname>/`). The composite
      creates the directory if needed; the caller uploads it as a
      workflow artifact.
    required: false
    default: "metadata/go/_"

outputs:
  version:
    description: "The release version (git tag) goreleaser used, or 'snapshot' for non-tag builds"
    value: ${{ steps.metadata.outputs.version }}
  hashes:
    description: "Base64-encoded SHA-256 hashes of built artifacts (for SLSA generator)"
    value: ${{ steps.hash.outputs.hashes }}
  shortname:
    description: "Path-derived short name for artifact namespacing (e.g., '.' becomes '_')"
    value: ${{ steps.metadata.outputs.shortname }}

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_CACHE: ${{ inputs.cache }}
        INPUT_PUBLISH: ${{ inputs.publish }}
      run: |
        set -euo pipefail
        if [[ "$INPUT_CACHE" != "enabled" && "$INPUT_CACHE" != "disabled" ]]; then
            printf 'Error: cache input must be one of enabled|disabled (got: %s)\n' "$INPUT_CACHE" >&2
            exit 1
        fi
        if [[ "$INPUT_PUBLISH" != "true" && "$INPUT_PUBLISH" != "false" ]]; then
            printf 'Error: publish input must be one of true|false (got: %s)\n' "$INPUT_PUBLISH" >&2
            exit 1
        fi
        "${{ github.action_path }}/validate_inputs.sh" "$INPUT_PATH"

    - name: Compute metadata
      id: metadata
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        SHORTNAME="${INPUT_PATH////_}"
        printf 'shortname=%s\n' "$SHORTNAME" >> "$GITHUB_OUTPUT"

        # Version: the git tag if we're on one, otherwise "snapshot".
        # Matches what goreleaser will use for its package version.
        if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
        else
            VERSION="snapshot"
        fi
        printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.go-version || '' }}
        go-version-file: ${{ inputs.go-version == '' && format('{0}/go.mod', inputs.path) || '' }}
        cache: ${{ inputs.cache != 'disabled' }}
        cache-dependency-path: ${{ inputs.path }}/go.sum

    # goreleaser-action is a `uses:` step; can't be wrapped inline
    # by stop_commands_guard.sh `run` mode. Use the begin/end form:
    # `begin` emits ::stop-commands::<token> + writes the token to
    # $GITHUB_OUTPUT; `end` (later step, `if: always()`) re-enables.
    # Same pattern container uses for docker/build-push-action.
    - name: Suspend workflow commands (begin)
      id: guard
      shell: bash
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../../../../lib/stop_commands_guard.sh" begin

    - name: Run goreleaser
      uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
      with:
        # Pinned literal version (not "~> v2") to match wrangle's
        # supply-chain discipline. See CLAUDE.md "No auto-merge of
        # dependency updates." Dependabot tracks the action SHA; the
        # binary version below is bumped by hand on the 7-day delay.
        version: "2.15.4"
        workdir: ${{ inputs.path }}
        # publish == 'true' → full release (native goreleaser publish).
        # publish != 'true' → snapshot + skip-publish (build only).
        # Caller sets publish from `should-release && startsWith(refs/tags/)`,
        # so the false branch covers both PR builds and main-pushes
        # under tag-only release-events.
        args: ${{ inputs.publish == 'true' && 'release --clean' || 'release --clean --snapshot --skip=publish' }}
      env:
        # goreleaser's publish path needs GITHUB_TOKEN for the GitHub
        # Release create + upload. The caller of the reusable workflow
        # grants contents: write at startup. Harmless when not
        # publishing.
        GITHUB_TOKEN: ${{ github.token }}

    - name: Resume workflow commands (end)
      if: always()
      shell: bash
      env:
        STOP_COMMANDS_TOKEN: ${{ steps.guard.outputs.stop-commands-token }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../../../../lib/stop_commands_guard.sh" end "$STOP_COMMANDS_TOKEN"

    - name: Compute artifact hashes
      id: hash
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/compute_hashes.sh" "$INPUT_PATH/dist/checksums.txt"

    - name: Install Cosign (for syft signature verification)
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

    - name: Install syft
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../../../..
      run: |
        set -euo pipefail
        "$WRANGLE_ROOT/tools/syft/install.sh"

    - name: Generate SBOM
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        METADATA_DIR: ${{ inputs.metadata-dir }}
      run: |
        set -euo pipefail
        mkdir -p "$METADATA_DIR"
        "${{ github.action_path }}/generate_sbom.sh" "$INPUT_PATH" "$METADATA_DIR/sbom.spdx.json"

    - name: Generate summary
      if: always()
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        VERSION: ${{ steps.metadata.outputs.version }}
        PUBLISH: ${{ inputs.publish }}
      run: |
        set -euo pipefail
        {
            printf '## Go Release Results\n\n'
            printf '| | |\n|---|---|\n'
            printf '| **Project** | %s |\n' "$INPUT_PATH"
            printf '| **Version** | %s |\n' "$VERSION"
            printf '| **Published** | %s |\n' "$PUBLISH"
            printf '| **Artifacts** | |\n'
            for f in "$INPUT_PATH"/dist/*; do
                if [[ -f "$f" ]]; then
                    printf '| | `%s` |\n' "$(basename "$f")"
                fi
            done
        } >> "$GITHUB_STEP_SUMMARY"
