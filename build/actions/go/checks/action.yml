name: Wrangle Go Checks
description: |
  Run Go pre-build quality gates: gofmt (with generated-file
  auto-skip), `go vet`, `go test`, and `govulncheck` reachable-vuln
  scan. Does NOT build, package, or publish — those steps live in
  the sister `build/actions/go/release` composite.

  This composite is intended to run in a job with `contents: read`.
  Splitting checks from release lets the reusable workflow restrict
  this job's permissions — `go test` executes arbitrary adopter test
  code, so denying it `contents: write` is real defense-in-depth.
  See build/actions/go/SPEC.md "Permissions architecture" for the
  full rationale.

inputs:
  path:
    description: "Relative path to the directory containing go.mod"
    required: false
    default: "."
  go-version:
    description: |
      Go version override. If empty, setup-go reads from go.mod's
      `go` directive — the wrangle-recommended path so the build
      version stays in lockstep with the module declaration.
    required: false
    default: ""
  cache:
    description: |
      Whether the Go module + build caches (actions/setup-go's
      `cache` input) are used. "enabled" (default) restores+saves
      both caches; "disabled" passes `cache: false`. The reusable
      workflow sets this to "disabled" for release builds — see the
      release composite's `cache:` input docs for the cache
      isolation reasoning.
    required: false
    default: "enabled"
  run-race-detector:
    description: |
      Whether `go test` runs with `-race`. Defaults to true. Set to
      false when CGO is disabled — the race detector requires cgo.
    required: false
    default: "true"
  run-gofmt-check:
    description: |
      Whether to run `gofmt -l` before the build. Defaults to true.
      Files with `// Code generated ... DO NOT EDIT.` headers are
      auto-skipped; set false only when that convention doesn't
      cover the adopter's generators.
    required: false
    default: "true"
  govulncheck-version:
    description: |
      Pinned semver for govulncheck (e.g., "vX.Y.Z"). validate_inputs.sh
      enforces a strict semver-tag regex and rejects `@latest`, `@main`,
      branch names, and any other non-pinned ref — `go install` would
      happily resolve those, so the enforcement is wrangle-side. See
      CLAUDE.md "Supply Chain Discipline." sum.golang.org's Trillian-
      backed Merkle log provides install-time integrity.

      Empty (default) resolves to wrangle's vetted pin via the
      `Resolve govulncheck version` step below — the pin literal lives
      there exactly once.
    required: false
    default: ""

outputs:
  shortname:
    description: "Path-derived short name (e.g., '.' becomes '_'). Use to namespace artifacts."
    value: ${{ steps.metadata.outputs.shortname }}
  metadata-dir:
    description: "Workspace-relative path containing the govulncheck.json output. Format: metadata/go/<shortname>."
    value: ${{ steps.metadata.outputs.metadata-dir }}

runs:
  using: "composite"
  steps:
    # Single coalesce site: the wrangle govulncheck pin literal lives
    # here and only here. Downstream steps reference steps.govuln.outputs.version
    # so a pin bump is a one-line edit. Both the composite's input
    # `default: ""` and the reusable workflow's `default: ""` deliberately
    # delegate to this step — passing "" explicitly through `with:` would
    # otherwise shadow any other `default:` on the chain.
    - name: Resolve govulncheck version
      id: govuln
      shell: bash
      env:
        INPUT_GOVULN_VERSION: ${{ inputs.govulncheck-version || 'v1.1.4' }}
      run: |
        set -euo pipefail
        printf 'version=%s\n' "$INPUT_GOVULN_VERSION" >> "$GITHUB_OUTPUT"

    - name: Validate inputs
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_CACHE: ${{ inputs.cache }}
        INPUT_GOVULN_VERSION: ${{ steps.govuln.outputs.version }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/validate_inputs.sh" "$INPUT_PATH" "$INPUT_CACHE" "$INPUT_GOVULN_VERSION"

    - name: Compute metadata
      id: metadata
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../compute_metadata.sh" "$INPUT_PATH"

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.go-version || '' }}
        go-version-file: ${{ inputs.go-version == '' && format('{0}/go.mod', inputs.path) || '' }}
        cache: ${{ inputs.cache != 'disabled' }}
        cache-dependency-path: ${{ inputs.path }}/go.sum

    # run_checks.sh runs `go test` (arbitrary adopter test code) and
    # `govulncheck` (which walks the full callgraph). stop_commands_guard.sh
    # wraps the whole script so a malicious test or transitive package
    # printing `::add-mask::` / `::set-output::` to stdout cannot hijack
    # the job — see docs/SLSA_L3_AUDIT.md Finding 3.
    - name: Run quality checks
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        METADATA_DIR: ${{ steps.metadata.outputs.metadata-dir }}
        GOVULN_VERSION: ${{ steps.govuln.outputs.version }}
        RUN_RACE: ${{ inputs.run-race-detector }}
        RUN_GOFMT: ${{ inputs.run-gofmt-check }}
      run: |
        set -euo pipefail
        mkdir -p "$METADATA_DIR"
        "${{ github.action_path }}/../../../../lib/stop_commands_guard.sh" run \
          "${{ github.action_path }}/run_checks.sh" "$INPUT_PATH" "$METADATA_DIR" "$GOVULN_VERSION" "$RUN_RACE" "$RUN_GOFMT"
