name: Wrangle Go Checks
description: |
  Run Go pre-build quality gates: gofmt (with generated-file
  auto-skip), `go vet`, `go test`, and `govulncheck` reachable-vuln
  scan. Does NOT build, package, or publish — those steps live in
  the sister `build/actions/go/release` composite.

  This composite is intended to run in a job with `contents: read`.
  Splitting checks from release lets the reusable workflow restrict
  this job's permissions — `go test` executes arbitrary adopter test
  code, so denying it `contents: write` is real defense-in-depth.
  See build/actions/go/SPEC.md "Permissions architecture" for the
  full rationale.

inputs:
  path:
    description: "Relative path to the directory containing go.mod"
    required: false
    default: "."
  go-version:
    description: |
      Go version override. If empty, setup-go reads from go.mod's
      `go` directive — the wrangle-recommended path so the build
      version stays in lockstep with the module declaration.
    required: false
    default: ""
  cache:
    description: |
      Whether the Go module + build caches (actions/setup-go's
      `cache` input) are used. "enabled" (default) restores+saves
      both caches; "disabled" passes `cache: false`. The reusable
      workflow sets this to "disabled" for release builds — see the
      release composite's `cache:` input docs for the cache
      isolation reasoning.
    required: false
    default: "enabled"
  run-race-detector:
    description: |
      Whether `go test` runs with `-race`. Defaults to true. Set to
      false when CGO is disabled — the race detector requires cgo.
    required: false
    default: "true"
  run-gofmt-check:
    description: |
      Whether to run `gofmt -l` before the build. Defaults to true.
      Files with `// Code generated ... DO NOT EDIT.` headers are
      auto-skipped; set false only when that convention doesn't
      cover the adopter's generators.
    required: false
    default: "true"
  govulncheck-version:
    description: |
      Pinned semver for govulncheck (e.g., "v1.1.4"). Wrangle does
      not accept `latest`/`main` — see CLAUDE.md "Supply Chain
      Discipline." sum.golang.org's Trillian-backed Merkle log
      provides install-time integrity.
    required: false
    default: "v1.1.4"
  metadata-dir:
    description: |
      Workspace-relative path where govulncheck.json should be
      written (typically `metadata/go/<shortname>/`). The composite
      creates the directory if needed; the caller uploads it as a
      workflow artifact.
    required: false
    default: "metadata/go/_"

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_CACHE: ${{ inputs.cache }}
      run: |
        set -euo pipefail
        if [[ "$INPUT_CACHE" != "enabled" && "$INPUT_CACHE" != "disabled" ]]; then
            printf 'Error: cache input must be one of enabled|disabled (got: %s)\n' "$INPUT_CACHE" >&2
            exit 1
        fi
        "${{ github.action_path }}/validate_inputs.sh" "$INPUT_PATH"

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: ${{ inputs.go-version || '' }}
        go-version-file: ${{ inputs.go-version == '' && format('{0}/go.mod', inputs.path) || '' }}
        cache: ${{ inputs.cache != 'disabled' }}
        cache-dependency-path: ${{ inputs.path }}/go.sum

    # run_checks.sh runs `go test` (arbitrary adopter test code) and
    # `govulncheck` (which walks the full callgraph). stop_commands_guard.sh
    # wraps the whole script so a malicious test or transitive package
    # printing `::add-mask::` / `::set-output::` to stdout cannot hijack
    # the job — see docs/SLSA_L3_AUDIT.md Finding 3.
    - name: Run quality checks
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        METADATA_DIR: ${{ inputs.metadata-dir }}
        GOVULN_VERSION: ${{ inputs.govulncheck-version }}
        RUN_RACE: ${{ inputs.run-race-detector }}
        RUN_GOFMT: ${{ inputs.run-gofmt-check }}
      run: |
        set -euo pipefail
        mkdir -p "$METADATA_DIR"
        "${{ github.action_path }}/../../../../lib/stop_commands_guard.sh" run \
          "${{ github.action_path }}/run_checks.sh" "$INPUT_PATH" "$METADATA_DIR" "$GOVULN_VERSION" "$RUN_RACE" "$RUN_GOFMT"
