name: Wrangle Python Build
description: |
  Build a Python package (wheel + sdist), run tests, generate SBOM,
  and compute artifact hashes for SLSA provenance. SLSA provenance
  generation is handled by a separate job in the reusable workflow;
  publishing lives in the adopter's own workflow because PyPI
  Trusted Publishing does not support reusable workflows.

inputs:
  path:
    description: "Relative path to the directory containing pyproject.toml"
    required: false
    default: "."
  python-version:
    description: "Python version override. If empty, detected from pyproject.toml."
    required: false
    default: ""
  run-tests:
    description: "Whether to run pytest before building"
    required: false
    default: "true"
  cache:
    description: |
      Whether the uv dependency cache (astral-sh/setup-uv's enable-cache)
      is used on the uv sub-path. "enabled" (default) lets setup-uv restore
      and save the shared uv cache; "disabled" passes enable-cache: false
      so uv downloads every dependency fresh. Validated against the
      enabled|disabled allowlist by validate_inputs.sh — any other value
      fails the build.

      This input only affects the uv sub-path (a project with uv.lock).
      The pip sub-path never opts into actions/setup-python's cache, so
      this input is a no-op there.

      The reusable workflow (build_and_publish_python.yml) sets this to
      "disabled" for release builds and "enabled" for PR builds. uv does
      not re-verify cached files against the lockfile on cache hits, and
      the uv cache is shared cross-build via GitHub's cache service, so a
      release build that consumed it could attest poisoned bytes.
      Disabling the cache for release builds keeps the uv path at SLSA
      v1.2 Build L3 — see docs/SLSA_L3_AUDIT.md Finding 1.

      Direct callers of this composite (not a supported L3 path) get
      caching by default; they are not claiming L3 provenance.
    required: false
    default: "enabled"
  sbom-tool:
    description: "SBOM tool to run (a curated tool, or one defined in tool-overrides). Default syft."
    required: false
    default: "syft"
  tool-overrides:
    description: "Optional workspace path to a .wrangle/tools.json merged over wrangle's catalog (see docs/SPEC.md)."
    required: false
    default: ""

outputs:
  name:
    description: "The package name (from the built wheel filename)"
    value: ${{ steps.metadata.outputs.name }}
  version:
    description: "The package version that was built"
    value: ${{ steps.metadata.outputs.version }}
  hashes:
    description: "Base64-encoded SHA-256 hashes of built artifacts (SLSA provenance subjects; feeds the VSA matrix)"
    value: ${{ steps.hash.outputs.hashes }}
  shortname:
    description: "Path-derived short name for artifact namespacing (e.g., '.' becomes '_')"
    value: ${{ steps.metadata.outputs.shortname }}
  metadata-dir:
    description: "Path to the metadata directory (relative to the workspace) containing the SBOM"
    value: ${{ steps.metadata.outputs.metadata-dir }}

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_CACHE: ${{ inputs.cache }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/validate_inputs.sh" "$INPUT_PATH" "$INPUT_CACHE"

    - name: Setup Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version || '' }}
        python-version-file: ${{ inputs.python-version == '' && format('{0}/pyproject.toml', inputs.path) || '' }}

    - name: Detect and setup uv
      id: tooling
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        if [[ -f "$INPUT_PATH/uv.lock" ]]; then
            printf 'use_uv=true\n' >> "$GITHUB_OUTPUT"
            printf 'Detected uv.lock — using uv for build\n'
        else
            printf 'use_uv=false\n' >> "$GITHUB_OUTPUT"
            printf 'No uv.lock — using standard PEP 517 tooling\n'
        fi

    - name: Install uv
      if: steps.tooling.outputs.use_uv == 'true'
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        # Release builds (cache: disabled) pass enable-cache: false so the
        # build consumes no shared uv cache — uv does not re-hash cached
        # files on cache hits, so a poisoned entry could be attested.
        # See docs/SLSA_L3_AUDIT.md Finding 1. validate_inputs.sh constrains
        # `cache` to enabled|disabled, so this resolves to exactly
        # true or false.
        enable-cache: ${{ inputs.cache != 'disabled' }}

    # install_deps.sh and run_tests.sh run ecosystem build tooling
    # (uv sync / pip install, pytest) that executes arbitrary build
    # backends, dependency hooks, and project test code. stop_commands_guard.sh
    # wraps each invocation so a malicious dependency or test printing a
    # `::add-mask::` / `::set-output::` workflow command to stdout cannot
    # hijack the build job — see docs/SLSA_L3_AUDIT.md Finding 3.
    - name: Install dependencies
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        USE_UV: ${{ steps.tooling.outputs.use_uv }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../../../lib/stop_commands_guard.sh" run \
          "${{ github.action_path }}/install_deps.sh" "$INPUT_PATH" "$USE_UV"

    - name: Run tests
      if: inputs.run-tests == 'true'
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        USE_UV: ${{ steps.tooling.outputs.use_uv }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../../../lib/stop_commands_guard.sh" run \
          "${{ github.action_path }}/run_tests.sh" "$INPUT_PATH" "$USE_UV"

    - name: Build package
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        USE_UV: ${{ steps.tooling.outputs.use_uv }}
      run: |
        set -euo pipefail
        cd "$INPUT_PATH"
        if [[ "$USE_UV" == "true" ]]; then
            uv build
        else
            python -m pip install --upgrade build
            python -m build
        fi
        printf 'Built artifacts:\n'
        ls -la dist/

    - name: Extract package metadata
      id: metadata
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/extract_metadata.sh" "$INPUT_PATH"

    - name: Compute artifact hashes
      id: hash
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        # Subshell + bare * (not ./*) so subject names in the resulting
        # provenance are filenames without a leading ./, which is what
        # slsa-verifier matches against downloaded artifacts.
        HASHES="$(cd "$INPUT_PATH/dist" && sha256sum -- * | base64 -w0)"
        printf 'hashes=%s\n' "$HASHES" >> "$GITHUB_OUTPUT"

    - name: Generate SBOM
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        METADATA_DIR: ${{ steps.metadata.outputs.metadata-dir }}
        GH_TOKEN: ${{ github.token }}
        WRANGLE_ROOT: ${{ github.action_path }}/../../..
        SBOM_TOOL: ${{ inputs.sbom-tool }}
        WRANGLE_TOOL_OVERRIDES: ${{ inputs.tool-overrides }}
      run: |
        set -euo pipefail
        "$WRANGLE_ROOT/lib/generate_sbom.sh" "$INPUT_PATH" "$METADATA_DIR" "$SBOM_TOOL"

    - name: Generate summary
      if: always()
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        VERSION: ${{ steps.metadata.outputs.version }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/generate_summary.sh" "$INPUT_PATH" "$VERSION"
