name: Wrangle npm Build
description: |
  Build an npm package (tarball via `npm pack` or `pnpm pack`), run tests,
  generate SBOM, and compute artifact hashes for SLSA provenance.
  Package manager is detected from the lockfile: `package-lock.json` /
  `npm-shrinkwrap.json` -> npm; `pnpm-lock.yaml` -> pnpm. SLSA provenance
  generation is handled by a separate job in the reusable workflow;
  publishing lives in the adopter's own workflow because npm Trusted
  Publishing's OIDC token must come from the caller, not a reusable
  workflow.

inputs:
  path:
    description: "Relative path to the directory containing package.json"
    required: false
    default: "."
  node-version:
    description: "Node.js version override. If empty, detected from .nvmrc, then package.json's engines.node, then a wrangle-default LTS."
    required: false
    default: ""
  run-tests:
    description: "Whether to run `npm test` / `pnpm test` if a non-default test script is declared in package.json"
    required: false
    default: "true"
  ignore-scripts:
    description: |
      When true, no package.json script runs: --ignore-scripts is passed
      to install (npm ci / pnpm install) AND pack (npm pack / pnpm pack),
      suppressing prepare/prepack/postpack/install lifecycle hooks
      (including those in transitive dev-deps), AND `<pm> run build` /
      `<pm> test` are skipped outright. Opt-in hardening for adopters
      who want the L3 attestation to bind to "what pack produces with
      no script execution at all." Defaults to false because common
      ecosystem tools (husky, prebuild-install) rely on these hooks and
      most adopters expect their declared build/test to run. If a
      finer-grained mode is needed (suppress hooks but still run the
      user's build), it can be added as a separate input.
    required: false
    default: "false"

outputs:
  version:
    description: "The package version that was built"
    value: ${{ steps.metadata.outputs.version }}
  tarball:
    description: "Filename of the produced .tgz (relative to <path>/dist/)"
    value: ${{ steps.build.outputs.tarball }}
  hashes:
    description: "Base64-encoded SHA-256 hashes of built artifacts (SLSA provenance subjects; feeds the VSA matrix)"
    value: ${{ steps.hash.outputs.hashes }}
  shortname:
    description: "Path-derived short name for artifact namespacing (e.g., '.' becomes '_')"
    value: ${{ steps.metadata.outputs.shortname }}
  metadata-dir:
    description: "Path to the metadata directory (relative to the workspace) containing the SBOM"
    value: ${{ steps.metadata.outputs.metadata-dir }}
  package-manager:
    description: "Package manager detected from lockfile ('npm' or 'pnpm')"
    value: ${{ steps.tooling.outputs.package-manager }}

runs:
  using: "composite"
  steps:
    - name: Validate inputs
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/validate_inputs.sh" "$INPUT_PATH"

    - name: Detect tooling
      id: tooling
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_NODE_VERSION: ${{ inputs.node-version }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/detect_tooling.sh" "$INPUT_PATH" "$INPUT_NODE_VERSION"

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ steps.tooling.outputs.effective-version }}
        node-version-file: ${{ steps.tooling.outputs.effective-version-file }}
        cache: ${{ steps.tooling.outputs.cache }}
        cache-dependency-path: |
          ${{ inputs.path }}/package-lock.json
          ${{ inputs.path }}/npm-shrinkwrap.json

    # Enable Corepack (bundled with Node 16.10+) so pnpm is available on
    # PATH. With Corepack enabled, invoking `pnpm` uses the version
    # pinned by package.json's `packageManager` field if set, otherwise
    # Corepack's bundled default. Adopters who want deterministic builds
    # should set `packageManager` per
    # https://nodejs.org/api/packages.html#packagemanager .
    #
    # Trust model: Corepack downloads pnpm from the npm registry and
    # verifies the downloaded package's integrity via the npm registry's
    # signed metadata (the same trust chain as `npm install`). Not
    # hermetic, but matches every other tool wrangle relies on.
    - name: Setup pnpm (via Corepack)
      if: steps.tooling.outputs.package-manager == 'pnpm'
      shell: bash
      run: |
        set -euo pipefail
        corepack enable
        pnpm --version

    # Run install (npm ci or pnpm install --frozen-lockfile), optional
    # build, optional test, pack into dist/, and discover the produced
    # tarball. Everything — including the dist/ glob, the count check,
    # and the tarball=<name> emit to $GITHUB_OUTPUT — runs inside
    # build_and_pack.sh so it all happens under stop_commands_guard.sh.
    # The script does not emit the tarball name on stdout; it writes
    # to $GITHUB_OUTPUT (a file the runner reads), which is unaffected
    # by the stop-commands suspension. Keeping discovery inside the
    # guard closes the "malicious hook plants dist/::add-mask::evil.tgz,
    # the post-script error printf echoes the filename, runner
    # interprets it as a workflow command" path that an unguarded
    # post-script discovery in this run: block would leave open.
    #
    # build_and_pack.sh runs ecosystem build tooling (npm/pnpm install,
    # build, test, pack) that executes arbitrary package.json scripts
    # and transitive dependency lifecycle hooks. stop_commands_guard.sh
    # wraps the whole thing so a malicious hook printing a `::add-mask::`
    # / `::set-output::` workflow command cannot hijack the build job —
    # see docs/SLSA_L3_AUDIT.md Finding 3.
    - name: Build and pack
      id: build
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        RUN_TESTS: ${{ inputs.run-tests }}
        IGNORE_SCRIPTS: ${{ inputs.ignore-scripts }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../../../lib/stop_commands_guard.sh" run \
          "${{ github.action_path }}/build_and_pack.sh" "$INPUT_PATH" "$RUN_TESTS" "$IGNORE_SCRIPTS"

    - name: Extract package metadata
      id: metadata
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        SHORTNAME="${INPUT_PATH////_}"
        METADATA_DIR="metadata/npm/${SHORTNAME}"
        mkdir -p "$METADATA_DIR"
        printf 'shortname=%s\n' "$SHORTNAME" >> "$GITHUB_OUTPUT"
        printf 'metadata-dir=%s\n' "$METADATA_DIR" >> "$GITHUB_OUTPUT"

        VERSION="$(jq -r .version "$INPUT_PATH/package.json")"
        printf 'version=%s\n' "$VERSION" >> "$GITHUB_OUTPUT"
        printf 'Package version: %s\n' "$VERSION"

    - name: Compute artifact hashes
      id: hash
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        # Subshell + bare * (not ./*) so subject names in the resulting
        # provenance are filenames without a leading ./, which is what
        # slsa-verifier matches against downloaded artifacts.
        HASHES="$(cd "$INPUT_PATH/dist" && sha256sum -- * | base64 -w0)"
        printf 'hashes=%s\n' "$HASHES" >> "$GITHUB_OUTPUT"

    - name: Install Cosign (for syft signature verification)
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      with:
        # Must match the cosign built from tools/go.mod — the version the suite tests.
        cosign-release: v3.0.6

    - name: Install syft
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../../..
      run: |
        set -euo pipefail
        "$WRANGLE_ROOT/tools/syft/install.sh"

    - name: Generate SBOM
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        METADATA_DIR: ${{ steps.metadata.outputs.metadata-dir }}
        WRANGLE_ROOT: ${{ github.action_path }}/../../..
      # syft over the project source. Same tool wrangle's python build
      # type uses; OWASP-known-conformant for SPDX. (Earlier SPEC drafts
      # picked the npm-CLI's in-tree SBOM command, but its conformance
      # was publicly criticized; switching to syft removes the question.)
      # Adopters consuming wrangle-attested packages with bundled native
      # code SHOULD layer binary scanners (Trivy, Grype) against installed
      # node_modules/ for full coverage — wrangle's source-tree SBOM does
      # not see compiled C/C++ artifacts that prebuild-install fetches at
      # consumer install time.
      run: |
        set -euo pipefail
        SBOM_PATH="${METADATA_DIR}/sbom.spdx.json"
        BIN_DIR="${WRANGLE_BIN_DIR:-${RUNNER_TEMP:-.}/.wrangle/bin}"
        "$BIN_DIR/syft" dir:"$INPUT_PATH" -o spdx-json > "$SBOM_PATH"
        "$WRANGLE_ROOT/lib/write_attest_manifest.sh" \
            "$METADATA_DIR" "https://spdx.dev/Document" "sbom.spdx.json"
        printf 'SBOM written to %s\n' "$SBOM_PATH"

    - name: Generate summary
      if: always()
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        VERSION: ${{ steps.metadata.outputs.version }}
        TARBALL: ${{ steps.build.outputs.tarball }}
        PACKAGE_MANAGER: ${{ steps.tooling.outputs.package-manager }}
      run: |
        set -euo pipefail
        {
            printf '## npm Build Results\n\n'
            printf '| | |\n|---|---|\n'
            printf '| **Package** | %s |\n' "$INPUT_PATH"
            printf '| **Package manager** | %s |\n' "$PACKAGE_MANAGER"
            printf '| **Version** | %s |\n' "$VERSION"
            printf '| **Tarball** | `%s` |\n' "$TARBALL"
        } >> "$GITHUB_STEP_SUMMARY"
