name: Wrangle Shell Build
description: |
  Build action for shell projects. Optionally runs a setup script to
  install test dependencies, then shellcheck (.bats files exclude the
  codes that misfire on bats idioms) and bats tests (if present).
  This is the build type wrangle uses on itself (dogfooding).

inputs:
  scan-path:
    description: >
      Relative path to the subdirectory to scan (shellcheck) and auto-detect
      bats tests within. Defaults to the workspace root. Useful for monorepos
      that only want wrangle's shell checks to run on a specific subtree, and
      for constraining test-fixture scans to the fixture directory.
    required: false
    default: "."
  bats-path:
    description: >
      Space-separated path(s) to bats test files or directories. If set,
      overrides auto-detection and runs bats against exactly these paths.
      If empty (default), bats auto-detects .bats files under scan-path.
    required: false
    default: ""
  setup-script:
    description: >
      Workspace-relative path to a bash script that installs test
      dependencies. Runs after shellcheck/bats are installed and before the
      checks. If empty (default), no setup runs. The script is arbitrary
      bash, so it executes under the same workflow-command guard as bats.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install shellcheck
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v shellcheck >/dev/null 2>&1; then
          # Version pinning via apt is fragile across Ubuntu releases.
          # We verify the tool is functional rather than pinning a
          # specific package version. For stricter control, adopters
          # can pre-install shellcheck in their runner image.
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
        fi
        printf 'shellcheck version: %s\n' "$(shellcheck --version | head -2 | tail -1)"

    - name: Install bats
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v bats >/dev/null 2>&1; then
          sudo apt-get update -qq && sudo apt-get install -y -qq bats
        fi
        printf 'bats version: %s\n' "$(bats --version)"

    # The setup-script is arbitrary adopter bash and its install hooks print
    # tool-controlled output, so it runs under stop_commands_guard.sh (#225 /
    # SLSA_L3_AUDIT.md Finding 3). Empty path is a no-op. Validation and guard
    # wiring live in run_setup.sh.
    - name: Run setup script
      shell: bash
      env:
        SETUP_SCRIPT: ${{ inputs.setup-script }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/run_setup.sh" "$SETUP_SCRIPT"

    # shellcheck echoes excerpts of caller-controlled source lines in its
    # diagnostics, so the invocation must run under stop_commands_guard.sh
    # to neutralize workflow commands on stdout (#225 / SLSA_L3_AUDIT.md
    # Finding 3). The scan-path validation and guard wiring live in
    # run_shellcheck.sh.
    - name: Run shellcheck
      shell: bash
      env:
        SCAN_PATH: ${{ inputs.scan-path }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/run_shellcheck.sh" "$SCAN_PATH"

    # bats EXECUTES caller-supplied .bats files (arbitrary bash), a direct
    # workflow-command-injection path. Both invocation paths (explicit
    # bats-path and auto-detected files) run under stop_commands_guard.sh
    # inside run_bats.sh — see SLSA_L3_AUDIT.md Finding 3.
    - name: Run bats tests
      shell: bash
      env:
        BATS_PATH: ${{ inputs.bats-path }}
        SCAN_PATH: ${{ inputs.scan-path }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/run_bats.sh" "$BATS_PATH" "$SCAN_PATH"
