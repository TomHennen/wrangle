# Act test for the shell build reusable workflow.
#
# Invokes .github/workflows/build_shell.yml — the actual adopter-facing
# contract — with scan-path pointed at a tiny fixture project. The shell
# action's shellcheck and bats steps run only against the fixture, so the
# test doesn't couple to wrangle's own source tree and doesn't require
# nuking the workspace.
name: Test shell build workflow
on: push

jobs:
  shell-build:
    uses: ./.github/workflows/build_shell.yml
    with:
      scan-path: build/actions/shell/test/fixtures/clean

  verify:
    needs: shell-build
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Assert shell-build succeeded
        run: |
          set -euo pipefail
          printf 'shell-build job succeeded — shellcheck and bats passed on fixture\n'
