name: Docker image builder
description: |
  Build and push a Docker image with BuildKit SBOM and provenance.
  SLSA L3 provenance and the signed VSA come from the
  build_and_publish_container.yml reusable workflow, not this action.

inputs:
  path:
    description: "Relative path within the repo to the folder containing a Dockerfile."
    required: true
  imagename:
    description: "Full image name (e.g., ghcr.io/owner/repo/image)"
    required: true
  registry:
    description: "Container registry (e.g., ghcr.io)"
    required: true
  github_token:
    description: "GitHub token with packages:write access"
    required: true
  cache:
    description: |
      BuildKit GitHub Actions cache policy. One of (validated against this
      allowlist by validate_inputs.sh — any other value fails the build):

        isolated  (default) cache-from + cache-to namespaced by a per-PR
                  scope (the GitHub-assigned PR number), so one PR cannot
                  write entries another PR reads. Rebuilds within a PR
                  still hit cache.
        enabled   cache-from + cache-to against the shared, cross-branch
                  type=gha scope.
        disabled  no BuildKit cache at all.
        read-only cache-from only — the build consumes the shared cache
                  but never writes it, so it cannot poison later builds.

      resolve_cache.sh maps the value to the docker/build-push-action
      cache-from / cache-to flags.

      The reusable workflow (build_and_publish_container.yml) forces
      "disabled" for release builds: a release build MUST NOT consume the
      shared cache, because BuildKit's type=gha cache is not re-verified on
      cache hits and is shared cross-build via GitHub's branch-scoped cache
      service, so a poisoned entry could alter the bytes wrangle's attest job
      signs over. Skipping the cache for release builds keeps the container
      path at SLSA v1.2 Build L3 — see docs/SLSA_L3_AUDIT.md Finding 2. For
      PR builds the reusable workflow passes its adopter-facing `pr-cache`
      input straight through, defaulting to "isolated".

      Direct callers of this composite (not a supported L3 path) get the
      same isolated default; they are not claiming L3 provenance.
    required: false
    default: "isolated"

outputs:
  digest:
    description: 'Image digest'
    value: ${{ steps.push.outputs.digest }}
  imagename:
    description: 'The normalized image name'
    value: ${{ steps.normalize.outputs.imagename }}
  sbom:
    description: 'Path to an SBOM that describes the container'
    value: ${{ steps.get_sbom.outputs.sbom }}
  metadata-dir:
    description: "Workspace-relative path of the unified metadata directory (`metadata/container/<shortname>/`) containing the SBOM and any scan output."
    value: ${{ steps.meta_dir.outputs.metadata-dir }}
  shortname:
    description: "Path-derived short name (`/` becomes `_`) used for artifact namespacing."
    value: ${{ steps.normalize.outputs.shortname }}

runs:
  using: "composite"
  steps:
    - name: Validate and normalize inputs
      id: normalize
      shell: bash
      env:
        INPUT_IMAGENAME: ${{ inputs.imagename }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_CACHE: ${{ inputs.cache }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/validate_inputs.sh" "$INPUT_PATH" "$INPUT_REGISTRY" "$INPUT_IMAGENAME" "$INPUT_CACHE"

    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: ${{ steps.normalize.outputs.imagename }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          # Adopters who version with non-semver tags (CalVer, date-sha,
          # git-describe) match no type=semver rule below; without a tag from
          # the ref the push fails with "tag is needed when pushing to
          # registry" (#292). Part of metadata-action's default tag set.
          type=ref,event=tag
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Log in to the Container registry
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    # Resolve the BuildKit cache-from / cache-to flags from the `cache`
    # policy. Done in a script (not a nested GHA expression) so the
    # per-PR scope can be sanitized before reaching the comma-delimited
    # cache config string. See resolve_cache.sh and docs/SLSA_L3_AUDIT.md
    # "Should wrangle care about PR-to-PR cache poisoning?".
    - name: Resolve BuildKit cache flags
      id: cacheflags
      shell: bash
      env:
        INPUT_CACHE: ${{ inputs.cache }}
        # Per-PR scope source — only consulted by the `isolated` policy.
        # On a pull_request event we key on `github.event.pull_request.number`
        # (GitHub-assigned, monotonically unique per PR, unforgeable by the
        # PR author), so two PRs that happen to share a source branch name
        # (e.g. both `patch-1` from different forks) get distinct scopes.
        # On non-PR events the PR number is empty and we fall back to
        # `ref_name` (a branch or tag name). Sanitized by resolve_cache.sh
        # before it reaches the BuildKit config.
        CACHE_SCOPE: ${{ github.event.pull_request.number && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/resolve_cache.sh" "$INPUT_CACHE" "$CACHE_SCOPE"

    # Suspend GitHub Actions workflow-command processing for the docker
    # build below. docker/build-push-action streams BuildKit's build
    # output (every `RUN` layer's stdout) to the step log; a malicious
    # Dockerfile could otherwise print a `::add-mask::` / `::add-path::` /
    # `::set-output::` line and hijack the build job. `begin` emits
    # `::stop-commands::<token>` with a per-run random token the docker
    # build cannot read (it is never exported into the build environment),
    # so the build cannot re-enable commands itself. The re-enable step
    # below closes the guard. See docs/SLSA_L3_AUDIT.md Finding 3.
    #
    # The guard spans two steps (not one `run:` wrapper) because the
    # docker build is a `uses:` step. This is sound: the runner's
    # stop-commands state is job-scoped, so `::stop-commands::` emitted
    # here stays in effect through the build step until the re-enable.
    - name: Suspend workflow commands for the docker build
      id: stopcmd
      shell: bash
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../../../lib/stop_commands_guard.sh" begin

    # TODO(#123): Investigate whether docker/build-push-action can accept
    # context via env, or whether zizmor will support marking validated step
    # outputs as safe, to eliminate the need for this suppression.
    - name: Build and push Docker image
      id: push
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with: # zizmor: ignore[template-injection] value is from steps.normalize.outputs.path, validated against ^[a-zA-Z0-9_./-]+$ and not shell-evaluated
        context: "{{defaultContext}}:${{ steps.normalize.outputs.path }}"
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # BuildKit GHA cache flags, resolved from the `cache` policy by the
        # cacheflags step (resolve_cache.sh). A release build receives the
        # 'disabled' policy from the reusable workflow, so both flags are
        # empty strings — docker/build-push-action treats empty as "no
        # cache", and the release build consumes no shared cross-build
        # state that could influence the bytes wrangle's attest job signs
        # over (SLSA v1.2 Build L3 isolation — docs/SLSA_L3_AUDIT.md
        # Finding 2). The per-PR scope inside these strings is sanitized by
        # resolve_cache.sh.
        cache-from: ${{ steps.cacheflags.outputs.cache-from }}
        cache-to: ${{ steps.cacheflags.outputs.cache-to }}
        sbom: true
        provenance: mode=max

    # Re-enable workflow-command processing suspended by the `stopcmd`
    # step. `if: always()` is mandatory: stop-commands is job-scoped in
    # the runner, so a failed docker build that left commands suspended
    # would silently disable `::add-mask::` secret redaction for every
    # later step in the job. `end` is a no-op when the token is empty
    # (the `stopcmd` step was skipped by an earlier-step failure).
    - name: Re-enable workflow commands after the docker build
      if: always()
      shell: bash
      env:
        STOP_COMMANDS_TOKEN: ${{ steps.stopcmd.outputs.stop-commands-token }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/../../../lib/stop_commands_guard.sh" end "$STOP_COMMANDS_TOKEN"

    # Create the metadata directory and emit its path BEFORE SBOM extraction.
    # If a later step fails (build, push, SBOM extract), the `if: always()`
    # artifact upload still has a valid (possibly empty) directory to upload —
    # useful for debug. Folding this into the SBOM-extract step would leave
    # `path:` resolving to an empty value when the SBOM step is skipped due
    # to an earlier failure.
    - name: Prepare metadata directory
      id: meta_dir
      shell: bash
      env:
        SHORTNAME: ${{ steps.normalize.outputs.shortname }}
      run: |
        set -euo pipefail
        METADATA_DIR="metadata/container/${SHORTNAME}"
        mkdir -p "$METADATA_DIR"
        printf 'metadata-dir=%s\n' "$METADATA_DIR" >> "$GITHUB_OUTPUT"

    - name: Extract SBOM from built image
      id: get_sbom
      shell: bash
      env:
        IMAGE: ${{ steps.normalize.outputs.imagename }}
        DIGEST: ${{ steps.push.outputs.digest }}
        METADATA_DIR: ${{ steps.meta_dir.outputs.metadata-dir }}
      run: |
        set -euo pipefail
        SBOM_PATH="${METADATA_DIR}/sbom.spdx.json"
        # Reference by digest, not tag — the :latest tag only exists on
        # main-branch builds, so bare image name fails on other branches.
        docker buildx imagetools inspect "${IMAGE}@${DIGEST}" --format "{{ json .SBOM.SPDX }}" > "$SBOM_PATH"
        printf 'sbom=%s\n' "$SBOM_PATH" >> "$GITHUB_OUTPUT"

    - name: Generate summary
      if: always()
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../../..
      run: |
        set -euo pipefail
        if [[ -f "$WRANGLE_ROOT/lib/format_sarif_summary.sh" ]]; then
          "$WRANGLE_ROOT/lib/format_sarif_summary.sh" "./metadata" >> "$GITHUB_STEP_SUMMARY"
        fi

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        # Convention shared with other build types: <type>-metadata-<shortname>,
        # path = the leaf metadata dir (so the artifact zip's contents are the
        # metadata files at the top level, not nested under metadata/<type>/...).
        # See docs/SPEC.md "Unified metadata layout."
        name: container-metadata-${{ steps.normalize.outputs.shortname }}
        # Reference the prepared dir from `meta_dir` (always runs), not from
        # `get_sbom` — if SBOM extraction is skipped due to an earlier failure,
        # `get_sbom.outputs.metadata-dir` is empty and the `if: always()`
        # upload would resolve to an unintended path.
        path: ${{ steps.meta_dir.outputs.metadata-dir }}/
