name: Docker image builder
description: |
  Build and push a Docker image with BuildKit SBOM and provenance.
  Cosign signing, SLSA L3 provenance, and SBOM vulnerability scanning
  are planned but not yet implemented (see implementation plan PR 9).

inputs:
  path:
    description: "Relative path within the repo to the folder containing a Dockerfile."
    required: true
  imagename:
    description: "Full image name (e.g., ghcr.io/owner/repo/image)"
    required: true
  registry:
    description: "Container registry (e.g., ghcr.io)"
    required: true
  github_token:
    description: "GitHub token with packages:write access"
    required: true
  cache:
    description: |
      Whether the BuildKit GitHub Actions cache (cache-from / cache-to
      type=gha) is used. "enabled" (default) restores and writes the
      shared cross-build cache; "disabled" builds with no BuildKit cache
      at all. Validated against the enabled|disabled allowlist by
      validate_inputs.sh — any other value fails the build.

      The reusable workflow (build_and_publish_container.yml) sets this to
      "disabled" for release builds and "enabled" for PR builds. A release
      build MUST NOT consume the shared cache: BuildKit's type=gha cache is
      not re-verified on cache hits and is shared cross-build via GitHub's
      branch-scoped cache service, so a poisoned entry could alter the
      bytes the SLSA generator signs over. Skipping the cache for release
      builds keeps the container path at SLSA v1.2 Build L3 — see
      docs/SLSA_L3_AUDIT.md Finding 2.

      Direct callers of this composite (not a supported L3 path) get
      caching by default; they are not claiming L3 provenance.
    required: false
    default: "enabled"

outputs:
  digest:
    description: 'Image digest'
    value: ${{ steps.push.outputs.digest }}
  imagename:
    description: 'The normalized image name'
    value: ${{ steps.normalize.outputs.imagename }}
  sbom:
    description: 'Path to an SBOM that describes the container'
    value: ${{ steps.get_sbom.outputs.sbom }}
  metadata-dir:
    description: "Workspace-relative path of the unified metadata directory (`metadata/container/<shortname>/`) containing the SBOM and any scan output."
    value: ${{ steps.meta_dir.outputs.metadata-dir }}
  shortname:
    description: "Path-derived short name (`/` becomes `_`) used for artifact namespacing."
    value: ${{ steps.normalize.outputs.shortname }}

runs:
  using: "composite"
  steps:
    - name: Validate and normalize inputs
      id: normalize
      shell: bash
      env:
        INPUT_IMAGENAME: ${{ inputs.imagename }}
        INPUT_PATH: ${{ inputs.path }}
        INPUT_REGISTRY: ${{ inputs.registry }}
        INPUT_CACHE: ${{ inputs.cache }}
      run: |
        set -euo pipefail
        "${{ github.action_path }}/validate_inputs.sh" "$INPUT_PATH" "$INPUT_REGISTRY" "$INPUT_IMAGENAME" "$INPUT_CACHE"

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: ${{ steps.normalize.outputs.imagename }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

    - name: Log in to the Container registry
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    # TODO(#123): Investigate whether docker/build-push-action can accept
    # context via env, or whether zizmor will support marking validated step
    # outputs as safe, to eliminate the need for this suppression.
    - name: Build and push Docker image
      id: push
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with: # zizmor: ignore[template-injection] value is from steps.normalize.outputs.path, validated against ^[a-zA-Z0-9_./-]+$ and not shell-evaluated
        context: "{{defaultContext}}:${{ steps.normalize.outputs.path }}"
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        # BuildKit GHA cache, gated on the `cache` input. When cache is not
        # 'enabled' both keys resolve to empty strings, which docker/
        # build-push-action treats as "no cache" — release builds consume no
        # shared cross-build state, so a poisoned cache entry cannot influence
        # the bytes the SLSA generator signs over (SLSA v1.2 Build L3
        # isolation — docs/SLSA_L3_AUDIT.md Finding 2). `inputs.cache` is
        # validated to enabled|disabled by validate_inputs.sh and is only
        # compared against a literal here (never expanded into a shell or
        # into the image), so it carries no injection surface.
        #
        # The truthy branch MUST be on the `&&` side: GHA treats '' as
        # falsy, so `cond && '' || 'type=gha'` would always yield 'type=gha'.
        cache-from: ${{ inputs.cache == 'enabled' && 'type=gha' || '' }}
        cache-to: ${{ inputs.cache == 'enabled' && 'type=gha,mode=max' || '' }}
        sbom: true
        provenance: mode=max

    # Create the metadata directory and emit its path BEFORE SBOM extraction.
    # If a later step fails (build, push, SBOM extract), the `if: always()`
    # artifact upload still has a valid (possibly empty) directory to upload —
    # useful for debug. Folding this into the SBOM-extract step would leave
    # `path:` resolving to an empty value when the SBOM step is skipped due
    # to an earlier failure.
    - name: Prepare metadata directory
      id: meta_dir
      shell: bash
      env:
        SHORTNAME: ${{ steps.normalize.outputs.shortname }}
      run: |
        set -euo pipefail
        METADATA_DIR="metadata/container/${SHORTNAME}"
        mkdir -p "$METADATA_DIR"
        printf 'metadata-dir=%s\n' "$METADATA_DIR" >> "$GITHUB_OUTPUT"

    - name: Extract SBOM from built image
      id: get_sbom
      shell: bash
      env:
        IMAGE: ${{ steps.normalize.outputs.imagename }}
        DIGEST: ${{ steps.push.outputs.digest }}
        METADATA_DIR: ${{ steps.meta_dir.outputs.metadata-dir }}
      run: |
        set -euo pipefail
        SBOM_PATH="${METADATA_DIR}/sbom.spdx.json"
        # Reference by digest, not tag — the :latest tag only exists on
        # main-branch builds, so bare image name fails on other branches.
        docker buildx imagetools inspect "${IMAGE}@${DIGEST}" --format "{{ json .SBOM.SPDX }}" > "$SBOM_PATH"
        printf 'sbom=%s\n' "$SBOM_PATH" >> "$GITHUB_OUTPUT"

    - name: Generate summary
      if: always()
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../../..
      run: |
        set -euo pipefail
        if [[ -f "$WRANGLE_ROOT/lib/format_sarif_summary.sh" ]]; then
          "$WRANGLE_ROOT/lib/format_sarif_summary.sh" "./metadata" >> "$GITHUB_STEP_SUMMARY"
        fi

    - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        # Convention shared with other build types: <type>-metadata-<shortname>,
        # path = the leaf metadata dir (so the artifact zip's contents are the
        # metadata files at the top level, not nested under metadata/<type>/...).
        # See docs/SPEC.md "Unified metadata layout."
        name: container-metadata-${{ steps.normalize.outputs.shortname }}
        # Reference the prepared dir from `meta_dir` (always runs), not from
        # `get_sbom` — if SBOM extraction is skipped due to an earlier failure,
        # `get_sbom.outputs.metadata-dir` is empty and the `if: always()`
        # upload would resolve to an unintended path.
        path: ${{ steps.meta_dir.outputs.metadata-dir }}/
