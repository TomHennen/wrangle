name: Wrangle Dependency Review
description: |
  Run actions/dependency-review-action within wrangle as the PR-time
  blocking layer for vulnerable dependency introductions. Wraps the
  upstream action and converts its vulnerable-changes JSON output to
  SARIF for the wrangle metadata directory. This is the "action pattern"
  — see tools/zizmor/action.yml for the same shape.

  Only runs on pull_request events: the upstream action requires
  github.event.pull_request.base.sha / head.sha to compute the diff.

inputs:
  fail-on-severity:
    description: >
      Block the PR on advisories at or above this severity.
      One of: low, moderate, high, critical.
    required: false
    default: "high"
  comment-summary-in-pr:
    description: >
      Post the dependency review summary as a PR comment.
      Default never to avoid requiring pull-requests: write on the
      adopter's workflow. Set to "on-failure" or "always" if the
      adopter grants pull-requests: write.
    required: false
    default: "never"

runs:
  using: "composite"
  steps:
    - name: Log attribution banner
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        "$WRANGLE_ROOT/lib/tool_banner.sh" dependency-review

    # The upstream action's native config file (#221: tools honor their
    # native configs rather than plumbing options through actions/scan).
    - name: Detect native config file
      id: cfg
      shell: bash
      env:
        TOOL_DIR: ${{ github.action_path }}
      run: |
        set -euo pipefail
        "$TOOL_DIR/detect_config.sh"

    - name: Run Dependency Review
      id: depreview
      # continue-on-error so SARIF collection runs even when the upstream
      # action exits non-zero on findings. lib/check_results.sh is the
      # actual pass/fail gate via the SARIF we produce below — keeping
      # behavior consistent with how zizmor/osv are gated.
      uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
      continue-on-error: true
      with:
        # Inline inputs take precedence over config-file keys (upstream
        # spreads inline over external), so the two below stay
        # authoritative; the config file supplies everything else
        # (e.g. allow-ghsas).
        config-file: ${{ steps.cfg.outputs.path }}
        fail-on-severity: ${{ inputs.fail-on-severity }}
        comment-summary-in-pr: ${{ inputs.comment-summary-in-pr }}
        # wrangle gates only on vulnerabilities (the SARIF below), not licenses,
        # so disable the upstream license + scorecard channels. Beyond being
        # unused, the license check is unreliable: it emits a noisy "could not
        # detect a license" list — lots of false positives — for gomod deps
        # whose license GitHub's dependency graph doesn't surface (#294).
        license-check: false
        show-openssf-scorecard: false

    - name: Collect dependency review output
      if: always()
      shell: bash
      # dep-review's vulnerable-changes output is routed through env: (not
      # interpolated into the run: block). collect_outputs.sh converts it
      # to SARIF + markdown in the wrangle metadata dir. Logic lives in the
      # script, not inline here — see CLAUDE.md "Inline Shell".
      env:
        TOOL_DIR: ${{ github.action_path }}
        VULNERABLE_CHANGES: ${{ steps.depreview.outputs.vulnerable-changes }}
      run: |
        "$TOOL_DIR/collect_outputs.sh" "${GITHUB_WORKSPACE}/.wrangle/metadata/dependency-review"

    # Mark tool error so check_results.sh fails closed. continue-on-error
    # above swallows genuine errors (API down, network failure) into the
    # same outcome as findings; the upstream action distinguishes them by
    # populating vulnerable-changes on findings and leaving it empty on
    # error. mark_error.sh writes the marker on the latter. Without it,
    # an errored run produces an empty SARIF indistinguishable from "no
    # vulnerable changes" — fail open.
    #
    # Known gap: the upstream action's `outcome=success` mode can also
    # produce nothing useful (Dependency Graph disabled, forked PR without
    # diff base) — same shape as a clean PR. Gating mark_error.sh on
    # `always()` would mark every clean PR as error. The proper fix needs
    # an upstream signal we don't currently have.
    - name: Mark dependency-review tool error
      if: always() && steps.depreview.outcome == 'failure'
      shell: bash
      # VULNERABLE_CHANGES is upstream JSON, attacker-influenceable via PR
      # contents — it must reach a parser, never a shell. mark_error.sh
      # only pipes it into jq; preserve that invariant in future edits.
      env:
        TOOL_DIR: ${{ github.action_path }}
        METADATA_DIR: ${{ github.workspace }}/.wrangle/metadata/dependency-review
        OUTCOME: ${{ steps.depreview.outcome }}
        VULNERABLE_CHANGES: ${{ steps.depreview.outputs.vulnerable-changes }}
      run: |
        "$TOOL_DIR/mark_error.sh"
