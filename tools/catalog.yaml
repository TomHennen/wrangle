# tools/catalog.yaml — wrangle's curated tool catalog (docs/tool_container_design.md §3.6).
# One entry per tool, keyed by the short name the `tools:` selection uses.
# Capabilities default closed: an absent network/secret means none. A tool not
# listed here (or one with delivery: adapter) runs the in-process adapter path.
tools:
  osv:
    kind: scan
    delivery: image
    image: ghcr.io/tomhennen/wrangle/osv@sha256:2c5ee9994a09ceb4b6957b6f528e63dcf2c83862fc2b626d1e2602e6f117ec54
    network: egress          # osv refreshes its advisory DB from osv.dev
