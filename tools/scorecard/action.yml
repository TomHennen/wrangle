name: Wrangle Scorecard
description: |
  Run OSSF Scorecard within wrangle. Scorecard is itself a GitHub Action
  (not a standalone binary), so it follows the "wrapped composite action"
  pattern instead of the adapter pattern used by OSV and Zizmor. New tools
  that are standalone binaries should use the adapter pattern; tools that
  are GitHub Actions should follow this Scorecard pattern.

runs:
  using: "composite"
  steps:
    - name: Log attribution banner
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        "$WRANGLE_ROOT/lib/tool_banner.sh" scorecard

    - name: Create output directory
      shell: bash
      run: mkdir -p "${GITHUB_WORKSPACE}/.wrangle/metadata/scorecard"

    - name: Run Scorecard
      # Scorecard commonly fails on PR events — it requires GITHUB_TOKEN
      # with specific scopes and only fully works on default branch pushes.
      # continue-on-error prevents this from blocking result collection.
      continue-on-error: true
      uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
      with:
        results_file: ${{ github.workspace }}/.wrangle/metadata/scorecard/output.json
        results_format: json
        publish_results: false

    - name: Attest and format results
      if: always()
      shell: bash
      env:
        SCORECARD_DIR: ${{ github.action_path }}
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        set -euo pipefail
        METADATA_DIR="${GITHUB_WORKSPACE}/.wrangle/metadata/scorecard"
        if [[ -f "$METADATA_DIR/output.json" ]]; then
          "$WRANGLE_ROOT/lib/write_attest_manifest.sh" \
            "$METADATA_DIR" "https://scorecard.dev/result/v0.1" "output.json"
          "$SCORECARD_DIR/json_to_markdown.sh" "$METADATA_DIR/output.json" > "$METADATA_DIR/output.md"
        fi
