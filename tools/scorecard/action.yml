name: Wrangle Scorecard
description: |
  Run OSSF Scorecard within wrangle. Scorecard is itself a GitHub Action
  (not a standalone binary), so it follows the "wrapped composite action"
  pattern instead of the adapter pattern used by OSV and Zizmor. New tools
  that are standalone binaries should use the adapter pattern; tools that
  are GitHub Actions should follow this Scorecard pattern.

runs:
  using: "composite"
  steps:
    - name: Log attribution banner
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        "$WRANGLE_ROOT/lib/tool_banner.sh" scorecard

    - name: Create output directory
      shell: bash
      run: mkdir -p "${GITHUB_WORKSPACE}/.wrangle/metadata/scorecard"

    - name: Run Scorecard
      # Scorecard commonly fails on PR events — it requires GITHUB_TOKEN
      # with specific scopes and only fully works on default branch pushes.
      # continue-on-error prevents this from blocking SARIF collection.
      continue-on-error: true
      uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
      with:
        results_file: ${{ github.workspace }}/.wrangle/metadata/scorecard/output.sarif
        results_format: sarif
        publish_results: false

    - name: Ensure SARIF exists
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        SARIF_FILE="${GITHUB_WORKSPACE}/.wrangle/metadata/scorecard/output.sarif"
        if [[ ! -f "$SARIF_FILE" ]]; then
          # Scorecard didn't produce output (e.g., failed on PR event).
          # Create empty SARIF so downstream summary steps don't fail.
          jq -n '{
            "version": "2.1.0",
            "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
            "runs": [{"tool": {"driver": {"name": "scorecard"}}, "results": []}]
          }' > "$SARIF_FILE"
        fi

    - name: Format results
      if: always()
      shell: bash
      env:
        SCORECARD_DIR: ${{ github.action_path }}
      run: |
        set -euo pipefail
        SARIF_FILE="${GITHUB_WORKSPACE}/.wrangle/metadata/scorecard/output.sarif"
        MD_FILE="${GITHUB_WORKSPACE}/.wrangle/metadata/scorecard/output.md"
        if [[ -f "$SARIF_FILE" ]]; then
          "$SCORECARD_DIR/sarif_to_markdown.sh" "$SARIF_FILE" > "$MD_FILE"
        fi
