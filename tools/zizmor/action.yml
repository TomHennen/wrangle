name: Wrangle Zizmor
description: |
  Run Zizmor workflow security linter within wrangle.
  Wraps the upstream zizmorcore/zizmor-action, which handles
  installation and execution. This is the "action pattern" —
  used for tools that have official GitHub Actions.

inputs:
  version:
    description: "Zizmor version to use (pinned for delayed adoption)"
    required: false
    default: "v1.25.2"

runs:
  using: "composite"
  steps:
    - name: Log attribution banner
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        "$WRANGLE_ROOT/lib/tool_banner.sh" zizmor

    - name: Create wrangle output directory
      shell: bash
      run: mkdir -p "${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor"

    - name: Run Zizmor
      id: zizmor
      # advanced-security: true makes the upstream action produce SARIF
      # (--format sarif) and upload it to the Security tab. We also copy
      # the SARIF to the metadata dir for the step summary collector.
      # continue-on-error ensures SARIF collection runs even when zizmor
      # finds issues (exit code 14).
      uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
      continue-on-error: true
      with:
        version: ${{ inputs.version }}
        advanced-security: true

    - name: Collect SARIF output
      if: always()
      shell: bash
      # Route step output through env: to prevent expression injection.
      # Logic lives in collect_sarif.sh, not inline here — see CLAUDE.md
      # "Inline Shell in GitHub Actions". The script disambiguates a real
      # tool error from "found issues" and writes the error marker that
      # lib/check_results.sh consumes to fail closed (issue #222).
      env:
        TOOL_DIR: ${{ github.action_path }}
        SARIF_SRC: ${{ steps.zizmor.outputs.output-file }}
        OUTCOME: ${{ steps.zizmor.outcome }}
      run: |
        "$TOOL_DIR/collect_sarif.sh" "${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor"

    - name: Generate human-readable output
      if: always()
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        set -euo pipefail
        SARIF="${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor/output.sarif"
        MD="${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor/output.md"
        if [[ -f "$SARIF" ]]; then
          "$WRANGLE_ROOT/lib/sarif_to_md.sh" "$SARIF" > "$MD"
        fi
