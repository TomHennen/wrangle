name: Wrangle Zizmor
description: |
  Run Zizmor workflow security linter within wrangle.
  Wraps the upstream zizmorcore/zizmor-action, which handles
  installation and execution. This is the "action pattern" —
  used for tools that have official GitHub Actions.

inputs:
  version:
    description: "Zizmor version to use (pinned for delayed adoption)"
    required: false
    default: "v1.25.2"

runs:
  using: "composite"
  steps:
    - name: Log attribution banner
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        "$WRANGLE_ROOT/lib/tool_banner.sh" zizmor

    - name: Create wrangle output directory
      shell: bash
      run: mkdir -p "${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor"

    - name: Run Zizmor
      id: zizmor
      # advanced-security: true runs zizmor in SARIF mode (--format sarif)
      # and uploads the result to the Security tab; we also copy the SARIF
      # to the metadata dir for the step summary collector. In SARIF mode
      # zizmor exits 0 even with findings, so continue-on-error is what
      # keeps a failed upload (no Advanced Security) from failing the job —
      # check_results.sh is the gate.
      uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
      continue-on-error: true
      with:
        version: ${{ inputs.version }}
        advanced-security: true

    - name: Collect SARIF output
      if: always()
      shell: bash
      # Step output routed via env: to prevent expression injection.
      # collect_sarif.sh disambiguates "found issues" from "tool error"
      # and writes the marker check_results.sh consumes to fail closed.
      env:
        TOOL_DIR: ${{ github.action_path }}
        SARIF_SRC: ${{ steps.zizmor.outputs.output-file }}
        OUTCOME: ${{ steps.zizmor.outcome }}
      run: |
        "$TOOL_DIR/collect_sarif.sh" "${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor"

    - name: Generate human-readable output
      if: always()
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        set -euo pipefail
        SARIF="${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor/output.sarif"
        MD="${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor/output.md"
        if [[ -f "$SARIF" ]]; then
          "$WRANGLE_ROOT/lib/sarif_to_md.sh" "$SARIF" > "$MD"
        fi
