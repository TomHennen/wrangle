name: Wrangle Zizmor
description: |
  Run Zizmor workflow security linter within wrangle.
  Wraps the upstream zizmorcore/zizmor-action, which handles
  installation and execution. This is the "action pattern" —
  used for tools that have official GitHub Actions.

inputs:
  version:
    description: "Zizmor version to use (pinned for delayed adoption)"
    required: false
    default: "v1.25.2"

runs:
  using: "composite"
  steps:
    - name: Log attribution banner
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        "$WRANGLE_ROOT/lib/tool_banner.sh" zizmor

    - name: Create wrangle output directory
      shell: bash
      run: mkdir -p "${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor"

    - name: Run Zizmor
      id: zizmor
      # advanced-security: true makes the upstream action produce SARIF
      # (--format sarif) and upload it to the Security tab. We also copy
      # the SARIF to the metadata dir for the step summary collector.
      # continue-on-error ensures SARIF collection runs even when zizmor
      # finds issues (exit code 14).
      uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
      continue-on-error: true
      with:
        version: ${{ inputs.version }}
        advanced-security: true

    - name: Collect SARIF output
      if: always()
      shell: bash
      # Route step output through env: to prevent expression injection.
      # OUTCOME lets us distinguish a real zizmor error (no SARIF produced)
      # from "found issues" (zizmor exits 14 but writes valid SARIF first).
      # See issue #222: without this, a tool error produces an empty SARIF
      # that check_results.sh reads as "0 findings" — fail open.
      env:
        SARIF_SRC: ${{ steps.zizmor.outputs.output-file }}
        OUTCOME: ${{ steps.zizmor.outcome }}
      run: |
        set -euo pipefail
        META="${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor"
        SARIF_DST="$META/output.sarif"
        if [[ -n "$SARIF_SRC" ]] && [[ -f "$SARIF_SRC" ]]; then
            cp "$SARIF_SRC" "$SARIF_DST"
        else
            # No SARIF produced. If the upstream step failed, this is a
            # tool error (not "ran clean"): drop a marker so check_results.sh
            # fails closed for :fail policy. Findings cause exit 14 *after*
            # SARIF is written, so they take the cp branch above.
            if [[ "$OUTCOME" == "failure" ]]; then
                printf 'upstream zizmor-action exited non-zero with no SARIF output (outcome=%s)\n' \
                    "$OUTCOME" > "$META/error"
            fi
            # Create an empty SARIF so the summary collector and Code
            # Scanning upload still have a file to read.
            jq -n '{
                "version": "2.1.0",
                "$schema": "https://raw.githubusercontent.com/oasis-tcs/sarif-spec/main/sarif-2.1/schema/sarif-schema-2.1.0.json",
                "runs": [{"tool": {"driver": {"name": "zizmor"}}, "results": []}]
            }' > "$SARIF_DST"
        fi

    - name: Generate human-readable output
      if: always()
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        set -euo pipefail
        SARIF="${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor/output.sarif"
        MD="${GITHUB_WORKSPACE}/.wrangle/metadata/zizmor/output.md"
        if [[ -f "$SARIF" ]]; then
          "$WRANGLE_ROOT/lib/sarif_to_md.sh" "$SARIF" > "$MD"
        fi
