# osv-scanner native config for manifests in this directory (tools/go.mod).
# Discovered by the scanner itself — wrangle's scan adapter adds nothing.
#
# All three advisories are in github.com/docker/docker, pulled in by
# osv-scanner's own module graph (`go mod why -m`: cmd/osv-scanner).
# They are unfixable by version bump: the docker/docker module line was
# re-namespaced and every version of the old path is flagged — the fix
# exists only as github.com/moby/moby/v2 2.0.0-beta.14, which osv-scanner
# upstream (main, as of 2026-06-09) has not migrated to. Remove these
# entries when an osv-scanner release imports moby/moby/v2.

