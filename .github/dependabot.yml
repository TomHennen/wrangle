version: 2
updates:
  - package-ecosystem: "github-actions"
    # Glob finds all action.yml files: .github/workflows/, actions/scan/,
    # build/actions/container/, tools/scorecard/, tools/zizmor/, etc.
    # New composite actions are picked up automatically.
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    # Watches tools/wrangle-shell-lint/requirements.txt — currently the
    # only pinned-hash Python dep (ast-grep-cli, installed via pipx in
    # test/Dockerfile). Dependabot regenerates the file with fresh
    # `--hash=...` lines so the version + hash bump is one atomic commit.
    directory: "/tools/wrangle-shell-lint"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
