version: 2
updates:
  - package-ecosystem: "github-actions"
    # github-actions only auto-discovers workflow files and composite action.yml
    # at directories listed explicitly — a "/**" glob does not recurse into
    # nested action.yml, so composites were silently never bumped. "/" covers
    # .github/workflows; every other directory holding an action.yml is listed.
    # A new composite needs an entry here (a divergence test backstops a miss).
    directories:
      - "/"
      - "/actions/attest_metadata_oci"
      - "/actions/attest_provenance"
      - "/actions/prep"
      - "/actions/publish_release"
      - "/actions/scan"
      - "/actions/verify"
      - "/actions/verify-vsa"
      - "/actions/verify_release"
      - "/build/actions/container"
      - "/build/actions/go/build"
      - "/build/actions/go/checks"
      - "/build/actions/npm"
      - "/build/actions/python"
      - "/build/actions/shell"
      - "/tools/dependency-review"
      - "/tools/scorecard"
      - "/tools/zizmor"
    # An action pinned in several of these directories must move in one PR;
    # group-by dependency-name bumps every copy together so no two files diverge.
    groups:
      across-directories:
        patterns:
          - "*"
        group-by: dependency-name
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    directories:
      - "/tools/**"
    groups:
      across-directories:
        patterns:
          - "*"
        group-by: dependency-name
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: "gomod"
    directories:
      - "/**"
    exclude-paths:
      - "tools/osv/testdata/**"
    groups:
      across-directories:
        patterns:
          - "*"
        group-by: dependency-name
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  # Tool-image and test Dockerfiles: keep pinned base-image digests fresh.
  - package-ecosystem: "docker"
    directories:
      - "/**"
    groups:
      across-directories:
        patterns:
          - "*"
        group-by: dependency-name
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
