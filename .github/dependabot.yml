version: 2
updates:
  # Workflows in .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  # Composite actions outside .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/build/actions/container"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/actions/scan"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/tools/scorecard"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    directory: "/tools/zizmor"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
