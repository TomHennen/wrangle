version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Do not auto-merge. Allow 7-day window for supply chain attack
    # discovery before adopting new action versions (per SPEC.md).
    open-pull-requests-limit: 5
