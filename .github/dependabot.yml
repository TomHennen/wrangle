version: 2
updates:
  - package-ecosystem: "github-actions"
    # Glob finds all action.yml files: .github/workflows/, actions/scan/,
    # build/actions/container/, tools/scorecard/, tools/zizmor/, etc.
    # New composite actions are picked up automatically.
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  # zizmor is installed via pipx in test/Dockerfile from a hash-pinned
  # requirements.txt. Dependabot bumps the version and all sha256 hashes
  # in one PR — keeps Dockerfile install and tools/zizmor/action.yml in
  # sync without manual checksum work.
  - package-ecosystem: "pip"
    directory: "/tools/zizmor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
