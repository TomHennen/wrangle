version: 2
updates:
  - package-ecosystem: "github-actions"
    # Glob finds all action.yml files: .github/workflows/, actions/scan/,
    # build/actions/container/, tools/scorecard/, tools/zizmor/, etc.
    # New composite actions are picked up automatically.
    directories:
      - "/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    directories:
      - "/tools/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: "gomod"
    # Scoped to /tools (non-recursive) on purpose: this repo houses deliberately
    # vulnerable Go fixtures (e.g. tools/osv/testdata) that must never be bumped.
    directories:
      - "/tools"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
