name: publish tool images

# Build, publish, and attest wrangle's containerized tool images. One matrix
# entry per tool — enroll a new tool by adding a line. The trigger is
# deliberately broad (any tools/ or lib/ change) so we over-build rather than
# miss a build: a tool image's build context is the repo root (the Dockerfile
# builds from tools/go.mod and bundles adapter glue from lib/). See
# docs/tool_container_design.md.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - tools/**
      - lib/**

permissions: {}

jobs:
  publish:
    permissions:
      contents: read          # checkout + source scan
      id-token: write         # OIDC for keyless Cosign signing
      packages: write         # push image + provenance to GHCR
      attestations: write     # GitHub-issued SLSA provenance
      actions: read           # source scan reads the Actions API
      security-events: write  # source-scan SARIF -> Security tab
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: tools/osv
            imagename: ghcr.io/tomhennen/wrangle/osv
          # The attest/verify toolbox (ampel + bnd + cosign + wrangle-attest in
          # one image). Built like the scan images, but it is not a sandboxed
          # adapter — it is the SLSA-L3 signing path that needs network + the
          # OIDC token at run time. Publishing the image here is inert; wiring a
          # signing job to RUN it is a separate, flagged step (#596).
          - path: tools/attest-toolbox
            imagename: ghcr.io/tomhennen/wrangle/attest-toolbox
          - path: tools/wrangle-lint
            imagename: ghcr.io/tomhennen/wrangle/wrangle-lint
          - path: tools/zizmor
            imagename: ghcr.io/tomhennen/wrangle/zizmor
    uses: ./.github/workflows/build_and_publish_container.yml
    with:
      path: ${{ matrix.path }}
      dockerfile: ${{ matrix.path }}/Dockerfile
      imagename: ${{ matrix.imagename }}
      registry: ghcr.io
      release-events: main-and-tags
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
