name: Release Gate

# Blocking release precondition (#596, #592): the operator runs this by hand before
# `gh release create` (cut-release runbook Phase 4) and cuts only on a green run.
# It runs tools/release_preflight.sh, which sequences every code-level gate — the
# self-ref pin checks (reachability, content freshness, main first-parent history)
# and both catalog-freshness checks — fail-closed. Any non-zero blocks: exit 1 (a
# pin is frozen on a merged side branch, or a digest is stale/behind :latest) and
# exit 2 (registry/attestation unreachable = precondition UNVERIFIED) alike. This
# is the opposite polarity to the weekly advisories (catalog_freshness.yml,
# catalog_provenance_freshness.yml), which warn on exit 2 so a transient blip
# can't page — correct for a heads-up, wrong for a gate.
#
# Dispatch-only on purpose: there is no automated release/tag workflow to hook
# (releases are a manual `gh release create` against an immutable tag), and a
# push/tag trigger would run after the tag exists (too late to block) and paint a
# transient exit-2 red X on an already-cut, legitimately-vetted release.

on:
  workflow_dispatch:

permissions: {}

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Pin history walks main's first-parent line; provenance freshness diffs
          # each image's build commit against HEAD.
          fetch-depth: 0

      # origin/main is not a ref after a dispatch checkout, and the first-parent
      # membership test needs it.
      - name: Fetch origin/main for the first-parent check
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main

      - name: Release preflight (pins + catalog, fail-closed)
        env:
          GH_TOKEN: ${{ github.token }}   # provenance freshness reads each image's build attestation
        run: ./tools/release_preflight.sh
