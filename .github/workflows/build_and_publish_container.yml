name: "Build and publish a container using best practices."

on:
  workflow_call:
    inputs:
      path:
        description: "A path, within the repo, to the folder containiner a Dockerfile you want to build."
        required: true
        type: string
      imagename:
        description: "The full path, including registry, specifying where the image should be published."
        required: true
        type: string
      registry:
        required: true
        type: string
      release-events:
        description: |
          Which events should trigger SLSA provenance generation and
          verification. One of:
            - non-pull-request (default): every event except pull_request*.
            - tag-only: push to refs/tags/* only.
            - main-and-tags: push to refs/heads/main or refs/tags/*.
            - <comma-separated event_name list>: matches if github.event_name
              is in the list. See actions/release_gate for full vocabulary.
          Note: this gate currently controls provenance generation and
          verification, not the docker push (which happens mid-composite
          in build/actions/container and is gated by the workflow's own
          trigger conditions). See docs/SPEC.md for the asymmetry rationale.
        required: false
        type: string
        default: non-pull-request
      pr-cache:
        description: |
          BuildKit cache policy for PR / non-release builds. Release builds
          always run cache-free regardless of this input — they produce
          SLSA L3 provenance and MUST NOT consume the shared, unverified-
          on-hit BuildKit type=gha cache (docs/SLSA_L3_AUDIT.md Finding 2).

          This input only tunes the PR / dev-build path, trading PR-build
          speed against PR-to-PR cache-poisoning exposure (a malicious PR
          poisoning a shared cache entry that a later PR build reads — see
          docs/SLSA_L3_AUDIT.md "Should wrangle care about PR-to-PR cache
          poisoning?"). One of:
            - isolated (default): each PR gets its own cache scope, keyed
              by the GitHub-assigned PR number. PR A cannot write entries
              PR B reads; rebuilds within a PR still hit cache. Safe
              default — closes PR-to-PR poisoning without disabling cache.
            - enabled: PR builds share the cross-branch BuildKit cache.
              Fastest; a malicious PR can poison entries that later PR
              builds read.
            - read-only: PR builds read the shared cache but never write
              it. PRs consume entries but cannot poison them.
            - disabled: PR builds also run cache-free.
        required: false
        type: string
        default: isolated
    secrets:
      gh_token:
        description: "GitHub token with write access"
        required: true
    outputs:
      digest:
        description: "Image digest pushed to the registry."
        value: ${{ jobs.build.outputs.digest }}
      imagename:
        description: "Normalized (lowercased) image name."
        value: ${{ jobs.build.outputs.imagename }}
      metadata-artifact-name:
        description: "Name of the workflow artifact (a zip of `metadata/container/<shortname>/`'s contents) containing the SBOM and any scan output. Format: `container-metadata-<shortname>`. Adopters fetch via `actions/download-artifact` — the metadata files land at the top level of the configured `path:`, not under `metadata/container/<shortname>/`."
        value: ${{ jobs.build.outputs.metadata-artifact-name }}
      should-release:
        description: |
          "true" if the current event matches release-events; "false" otherwise.
          Wrangle gates the attest and vsa jobs on this internally; callers can
          gate downstream release-time jobs on it too.
        value: ${{ jobs.gate.outputs.should-release }}

jobs:
  # Refuse trigger patterns known to expose this workflow to supply-chain
  # attack classes (pull_request_target, workflow_run via pull_request_target).
  # The guard MUST stay first under `jobs:`; every other job lists `guard`
  # in its `needs:` so a refused invocation skips the entire workflow —
  # critical for the container build type, whose docker push happens
  # mid-composite (no verify step could roll back a pushed image).
  # Full trigger contract: docs/SPEC.md#trigger-model.
  guard:
    runs-on: ubuntu-latest
    permissions: {}    # reads env only — no workspace, no API, no secrets
    steps:
      # TODO: replace with $/actions/preflight_guard when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/preflight_guard@cb043076b426c1e22b1305e39b7a59dc3a696f98 # main 2026-06-04

  gate:
    needs: [guard]
    runs-on: ubuntu-latest
    permissions: {}    # release_gate reads only env; no workspace, no API
    outputs:
      should-release: ${{ steps.gate.outputs.should-release }}
    steps:
      # No checkout: release_gate resolves via ${{ github.action_path }}.
      # TODO: replace with $/actions/release_gate when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/release_gate@cb043076b426c1e22b1305e39b7a59dc3a696f98 # main 2026-06-04
        id: gate
        with:
          events: ${{ inputs.release-events }}

  build:
    # needs `gate` so the build can read should-release and disable the
    # BuildKit cache for release builds (SLSA L3 isolation — see the
    # `cache:` input below and docs/SLSA_L3_AUDIT.md Finding 2).
    needs: [guard, gate]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      imagename: ${{ steps.build.outputs.imagename }}
      metadata-artifact-name: container-metadata-${{ steps.build.outputs.shortname }}
    runs-on: ubuntu-latest
    steps:
    # TODO: replace with $/build/actions/container when GitHub ships $/ syntax (#136)
    - name: "build and publish"
      id: build
      uses: TomHennen/wrangle/build/actions/container@cb043076b426c1e22b1305e39b7a59dc3a696f98 # main 2026-06-04
      with:
        path: ${{ inputs.path }}
        imagename: ${{ inputs.imagename }}
        registry: ${{ inputs.registry }}
        github_token: ${{ secrets.GITHUB_TOKEN }}
        # Release builds (should-release == 'true') always run cache-free:
        # they produce L3 provenance, so the build must not consume a
        # shared, cross-build, unverified-on-hit cache — see
        # docs/SLSA_L3_AUDIT.md Finding 2. PR builds get the adopter's
        # `pr-cache` policy, which defaults to "isolated" (per-PR scope,
        # so PRs cannot poison each other) and can be widened to a fully
        # shared cache or tightened to read-only / disabled.
        cache: ${{ needs.gate.outputs.should-release == 'true' && 'disabled' || inputs.pr-cache }}

  # Generate SLSA L3 build provenance via GitHub's attestation API, naming THIS
  # reusable workflow as builder.id (its job_workflow_ref) and the Sigstore
  # signing identity — closing the build-confusion gap (the generic generator's
  # builder.id named the generator, not the workflow that ran the build). This is
  # wrangle's sole container provenance; the attestation is pushed to the registry
  # as an OCI referrer and read by the vsa job via the oci: collector, which
  # verifies its Sigstore signature against the policy.
  attest:
    if: ${{ needs.gate.outputs.should-release == 'true' }}
    needs: [guard, gate, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC for Sigstore keyless signing
      attestations: write   # write the attestation to GitHub's store
      packages: write       # push the attestation referrer to ghcr
      contents: read
    steps:
      # push-to-registry authenticates to ghcr with the job's GITHUB_TOKEN, like
      # the build and vsa jobs. Same pin as the vsa job's login — bump together.
      - name: Log in to ghcr for the attestation push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        id: attest
        with:
          subject-name: ${{ needs.build.outputs.imagename }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true

  # Emit a signed SLSA Verification Summary Attestation (VSA) for the image.
  # ampel evaluates the image's SLSA provenance against the container PolicySet
  # (verifying the bundle's Sigstore signature against the PolicySet's identity
  # binding — fail-closed) and bnd signs the result keyless with this workflow's
  # OIDC identity, emitting the single signed VSA a downstream consumer trusts.
  #
  # Like go/container's other post-build checks this runs AFTER the docker push,
  # so the image is already live; fail: true still fails the workflow conclusion
  # (blocking downstream caller jobs) and surfaces a policy/tooling regression.
  #
  # Collector: oci: lists the image's OCI 1.1 referrers and selects the signed
  # attest-build-provenance bundle (predicate slsa.dev/provenance/v1) the attest
  # job pushed (push-to-registry). The unsigned BuildKit attestation is an
  # index platform entry, NOT a referrer, so oci: never sees it. Needs `attest`
  # so the referrer exists before the collector reads it. Exercised only by the
  # integration dispatch.
  vsa:
    if: ${{ needs.gate.outputs.should-release == 'true' }}
    needs: [guard, gate, build, attest]
    runs-on: ubuntu-latest
    # No contents: write — unlike npm/go, the container VSA is NOT attached to a
    # GitHub release (containers produce none); it's pushed to the registry as an
    # OCI referrer instead. The container caller grants only contents: read, so
    # requesting contents: write here would be a startup-failing escalation.
    permissions:
      id-token: write    # bnd keyless-signs the VSA via this workflow's OIDC identity
      packages: write    # pull provenance for the collector AND push the VSA referrer to ghcr
    steps:
      - id: vsaname
        shell: bash
        env:
          IMAGENAME: ${{ needs.build.outputs.imagename }}
          DIGEST: ${{ needs.build.outputs.digest }}
        run: |
          set -euo pipefail
          printf 'name=%s-%s\n' "${IMAGENAME##*/}" "${DIGEST#sha256:}" >> "$GITHUB_OUTPUT"

      # cosign attach (in actions/verify) pushes the VSA referrer to ghcr, which
      # needs registry auth. Same pin as the verify job's cosign-installer — bump
      # in lockstep.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Use the job's own GITHUB_TOKEN (packages: write above), like the build
      # job — not the passed gh_token, which zizmor's secrets-outside-env flags
      # for use without a dedicated environment.
      - name: Log in to ghcr for the VSA push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # TODO: replace with $/actions/verify when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/verify@24e24b114e45e5ed1c9a2cd31c8b5ba5c521ecc9 # feat/attest-build-provenance-316 2026-06-06
        with:
          subject: ${{ needs.build.outputs.digest }}
          policy: policies/wrangle-provenance-container-v1.hjson
          collector: oci:${{ needs.build.outputs.imagename }}@${{ needs.build.outputs.digest }}
          # resourceUri is the OCI image ref a container consumer fetches and
          # pins when verifying the VSA; the subject digest is the cryptographic bind.
          context: buildPoint:git+https://github.com/${{ github.repository }},vsa.resourceUri:${{ needs.build.outputs.imagename }}@${{ needs.build.outputs.digest }}
          artifact-name: ${{ steps.vsaname.outputs.name }}
          fail: "true"
          # Push the signed VSA to the registry as an OCI referrer (containers
          # have no GitHub release to attach it to).
          oci-target: ${{ needs.build.outputs.imagename }}@${{ needs.build.outputs.digest }}
          attach-to-release: "false"
