name: "Build and publish a container using best practices."

on:
  workflow_call:
    inputs:
      path:
        description: "A path, within the repo, to the folder containiner a Dockerfile you want to build."
        required: true
        type: string
      imagename:
        description: "The full path, including registry, specifying where the image should be published."
        required: true
        type: string
      registry:
        required: true
        type: string
      release-events:
        description: |
          Which events should trigger SLSA provenance generation and
          verification. One of:
            - non-pull-request (default): every event except pull_request*.
            - tag-only: push to refs/tags/* only.
            - main-and-tags: push to refs/heads/main or refs/tags/*.
            - <comma-separated event_name list>: matches if github.event_name
              is in the list. See actions/release_gate for full vocabulary.
          Note: this gate currently controls provenance generation and
          verification, not the docker push (which happens mid-composite
          in build/actions/container and is gated by the workflow's own
          trigger conditions). See docs/SPEC.md for the asymmetry rationale.
        required: false
        type: string
        default: non-pull-request
      pr-cache:
        description: |
          BuildKit cache policy for PR / non-release builds. Release builds
          always run cache-free regardless of this input — they produce
          SLSA L3 provenance and MUST NOT consume the shared, unverified-
          on-hit BuildKit type=gha cache (docs/SLSA_L3_AUDIT.md Finding 2).

          This input only tunes the PR / dev-build path, trading PR-build
          speed against PR-to-PR cache-poisoning exposure (a malicious PR
          poisoning a shared cache entry that a later PR build reads — see
          docs/SLSA_L3_AUDIT.md "Should wrangle care about PR-to-PR cache
          poisoning?"). One of:
            - isolated (default): each PR gets its own cache scope, keyed
              by the GitHub-assigned PR number. PR A cannot write entries
              PR B reads; rebuilds within a PR still hit cache. Safe
              default — closes PR-to-PR poisoning without disabling cache.
            - enabled: PR builds share the cross-branch BuildKit cache.
              Fastest; a malicious PR can poison entries that later PR
              builds read.
            - read-only: PR builds read the shared cache but never write
              it. PRs consume entries but cannot poison them.
            - disabled: PR builds also run cache-free.
        required: false
        type: string
        default: isolated
      scan-tools:
        description: |
          Space-separated source-scan tools (suffix :info for
          non-blocking). A load-bearing (:fail) finding blocks the
          build (and therefore the push). Empty string disables scanning.
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review wrangle-lint"
      go-cache:
        description: >
          Set to "enabled" to cache the Go module + build caches the
          source-scan tools build from source (osv-scanner et al. —
          #343) on PR / non-release runs. Release builds always run
          cache-free regardless: the scan gates an attested release, so
          its tools build cold and a poisoned cache cannot forge a
          passing scan (docs/SLSA_L3_AUDIT.md). Default off — the cache
          is ~1.5–3 GB against this repo's Actions cache quota.
        required: false
        type: string
        default: ""
    secrets:
      gh_token:
        description: "GitHub token with write access"
        required: true
    outputs:
      digest:
        description: "Image digest pushed to the registry."
        value: ${{ jobs.build.outputs.digest }}
      imagename:
        description: "Normalized (lowercased) image name."
        value: ${{ jobs.build.outputs.imagename }}
      metadata-artifact-name:
        description: "Name of the unified metadata workflow artifact (a zip of `metadata/container[/<shortname>]/`'s contents): SBOM, the `scan/` tool output, and on release the `<image-digest>.intoto.jsonl` bundle. Format: `container-metadata[-<shortname>]`. Adopters fetch via `actions/download-artifact` — files land at the top level of the configured `path:`. See docs/SPEC.md \"Unified metadata layout\"."
        value: ${{ jobs.build.outputs.metadata-artifact-name }}
      should-release:
        description: |
          "true" if the current event matches release-events; "false" otherwise.
          Wrangle gates the attest and verify jobs on this internally; callers can
          gate downstream release-time jobs on it too.
        value: ${{ jobs.gate.outputs.should-release }}

jobs:
  # Refuse trigger patterns known to expose this workflow to supply-chain
  # attack classes (pull_request_target, workflow_run via pull_request_target).
  # The guard MUST stay first under `jobs:`; every other job lists `guard`
  # in its `needs:` so a refused invocation skips the entire workflow —
  # critical for the container build type, whose docker push happens
  # mid-composite (no verify step could roll back a pushed image).
  # Full trigger contract: docs/SPEC.md#trigger-model.
  guard:
    runs-on: ubuntu-latest
    permissions: {}    # reads env only — no workspace, no API, no secrets
    steps:
      # TODO: replace with $/actions/preflight_guard when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/preflight_guard@041a3fcc56df40113f1b0f6f319c707a6283c5ff # main 2026-06-19

  gate:
    needs: [guard]
    runs-on: ubuntu-latest
    permissions: {}    # release_gate reads only env; no workspace, no API
    outputs:
      should-release: ${{ steps.gate.outputs.should-release }}
    steps:
      # No checkout: release_gate resolves via ${{ github.action_path }}.
      # TODO: replace with $/actions/release_gate when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/release_gate@041a3fcc56df40113f1b0f6f319c707a6283c5ff # main 2026-06-19
        id: gate
        with:
          events: ${{ inputs.release-events }}

  # Source scan. The container push happens mid-composite in `build` and
  # is not release-gated, so a load-bearing (:fail) finding must block
  # `build` itself on every event — hence `build` needs `scan`.
  scan:
    needs: [guard, gate]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    outputs:
      artifact-name: ${{ steps.names.outputs.scan }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ inputs.scan-tools != '' }}
        with:
          persist-credentials: false

      # Derive the scan artifact name from the path so it matches the build
      # job's (which passes its shortname): the composite runs from the wrangle
      # checkout and sources lib/shortname.sh, which this job's ADOPTER checkout
      # lacks. Sharing the derivation keeps the names from drifting.
      # TODO: replace with $/actions/package_metadata when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/package_metadata@530c5131a764b6fa84da6f794bbb250d03b7ab29 # feat/469-unify-metadata-artifact 2026-06-19
        id: names
        if: ${{ inputs.scan-tools != '' }}
        with:
          build-type: container
          path: ${{ inputs.path }}

      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/scan@530c5131a764b6fa84da6f794bbb250d03b7ab29 # feat/469-unify-metadata-artifact 2026-06-19
        if: ${{ inputs.scan-tools != '' }}
        with:
          tools: ${{ inputs.scan-tools }}
          # The build job folds this into the unified container-metadata.
          artifact-name: ${{ steps.names.outputs.scan }}
          # Cold on release: the scan gates an attested build, so a
          # poisoned tool cache must not be able to forge a passing scan.
          go-cache: ${{ needs.gate.outputs.should-release == 'true' && '' || inputs.go-cache }}

  build:
    # needs `gate` so the build can read should-release and disable the
    # BuildKit cache for release builds (SLSA L3 isolation — see the
    # `cache:` input below and docs/SLSA_L3_AUDIT.md Finding 2).
    # needs `scan` so a load-bearing finding blocks the mid-composite push.
    needs: [guard, gate, scan]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      imagename: ${{ steps.build.outputs.imagename }}
      shortname: ${{ steps.build.outputs.shortname }}
      metadata-artifact-name: ${{ steps.build.outputs.metadata-artifact-name }}
      metadata-pre-artifact-name: ${{ steps.build.outputs.metadata-pre-artifact-name }}
      metadata-dir: ${{ steps.build.outputs.metadata-dir }}
    runs-on: ubuntu-latest
    steps:
    # TODO: replace with $/build/actions/container when GitHub ships $/ syntax (#136)
    - name: "build and publish"
      id: build
      uses: TomHennen/wrangle/build/actions/container@fa08d98b55fef0d5ad28cf026d56d08c137e0eb2 # feat/469-unify-metadata-artifact 2026-06-19
      with:
        path: ${{ inputs.path }}
        imagename: ${{ inputs.imagename }}
        registry: ${{ inputs.registry }}
        github_token: ${{ secrets.GITHUB_TOKEN }}
        # The workflow owns the unified metadata upload (folding in the scan
        # job's output and the verify job's bundle), so disable the composite's
        # own upload.
        upload-metadata: "false"
        # Release builds (should-release == 'true') always run cache-free:
        # they produce L3 provenance, so the build must not consume a
        # shared, cross-build, unverified-on-hit cache — see
        # docs/SLSA_L3_AUDIT.md Finding 2. PR builds get the adopter's
        # `pr-cache` policy, which defaults to "isolated" (per-PR scope,
        # so PRs cannot poison each other) and can be widened to a fully
        # shared cache or tightened to read-only / disabled.
        cache: ${{ needs.gate.outputs.should-release == 'true' && 'disabled' || inputs.pr-cache }}

    # Fold the untrusted scan job's output into the metadata dir as inert data.
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      if: ${{ always() && inputs.scan-tools != '' }}
      continue-on-error: true   # scan upload is best-effort
      with:
        name: ${{ needs.scan.outputs.artifact-name }}
        path: ${{ steps.build.outputs.metadata-dir }}/scan/

    # Non-release: this is the final unified metadata (sbom + scan/). On
    # release the verify job appends the bundle and owns the final upload.
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: ${{ needs.gate.outputs.should-release == 'true' && steps.build.outputs.metadata-pre-artifact-name || steps.build.outputs.metadata-artifact-name }}
        path: ${{ steps.build.outputs.metadata-dir }}/
        if-no-files-found: warn

  # Generate SLSA L3 build provenance via GitHub's attestation API, naming THIS
  # reusable workflow as builder.id (its job_workflow_ref) and the Sigstore
  # signing identity
  attest:
    if: ${{ needs.gate.outputs.should-release == 'true' }}
    needs: [guard, gate, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC for Sigstore keyless signing
      attestations: write   # write the attestation to GitHub's store
      packages: write       # push the attestation referrer to ghcr
      contents: read
    steps:
      # push-to-registry authenticates to ghcr with the job's GITHUB_TOKEN, like
      # the build and verify jobs. Same pin as the verify job's login — bump together.
      - name: Log in to ghcr for the attestation push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        id: attest
        with:
          subject-name: ${{ needs.build.outputs.imagename }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true   # store the provenance as an OCI referrer on the image

  # Emit a signed VSA per subject and push each as its own by-digest OCI referrer.
  # Runs after the push, so fail: true fails the workflow conclusion (blocking
  # downstream caller jobs) rather than rolling back the live image. Needs
  # `attest` so the provenance referrer the collector reads already exists.
  verify:
    if: ${{ needs.gate.outputs.should-release == 'true' }}
    needs: [guard, gate, build, attest]
    runs-on: ubuntu-latest
    # No contents: write — the container caller grants only contents: read, so
    # requesting it here would be a startup-failing escalation; the bundle ships
    # as a workflow artifact and an OCI referrer, not a release asset.
    permissions:
      id-token: write       # bnd keyless-signs the VSA via this workflow's OIDC identity
      attestations: write   # post the VSA to the GitHub attestation store
      packages: write       # pull provenance and push the bundle referrer to ghcr
    steps:
      # Round-tripping the bundle through ghcr needs registry auth. Same pin as
      # the attest job's cosign-installer — bump in lockstep.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Must match the cosign built from tools/go.mod — the version the suite tests.
          cosign-release: v3.0.6

      # Use the job's own GITHUB_TOKEN (packages: write above), like the build
      # job — not the passed gh_token, which zizmor's secrets-outside-env flags
      # for use without a dedicated environment.
      - name: Log in to ghcr for the bundle round-trip
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The composite stages sbom + scan/ and runs actions/verify, computing the
      # artifact names and metadata dir from build-type + shortname. With
      # oci-target set it skips the dist/provenance workflow-artifact downloads —
      # the provenance is seeded from the registry referrer instead.
      # TODO: replace with $/actions/verify_release when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/verify_release@530c5131a764b6fa84da6f794bbb250d03b7ab29 # feat/469-unify-metadata-artifact 2026-06-19
        with:
          build-type: container
          shortname: ${{ needs.build.outputs.shortname }}
          subjects: ${{ needs.build.outputs.digest }}
          policy: policies/wrangle-provenance-container-v1.hjson
          collector: oci:${{ needs.build.outputs.imagename }}@${{ needs.build.outputs.digest }}
          # resourceUri is the OCI image ref a container consumer fetches and
          # pins when verifying the VSA; the subject digest is the cryptographic bind.
          context: buildPoint:git+https://github.com/${{ github.repository }},vsa.resourceUri:${{ needs.build.outputs.imagename }}@${{ needs.build.outputs.digest }}
          # Seed each bundle from this digest's provenance referrer and push the
          # bundle back as its own by-digest referrer (fail-closed).
          oci-target: ${{ needs.build.outputs.imagename }}@${{ needs.build.outputs.digest }}
          attach-to-release: "false"
