name: "Build and publish a container using best practices."

on:
  workflow_call:
    inputs:
      path:
        description: "The path within the repo that should be used when building the image."
        required: true
        type: string
      dockerfile:
        description: "Path to the Dockerfile. Defaults to {path}/Dockerfile. When set, the build context becomes the repo root, so the Dockerfile can COPY files from outside {path}."
        required: false
        type: string
        default: ""
      imagename:
        description: "The full path, including registry, specifying where the image should be published."
        required: true
        type: string
      registry:
        required: true
        type: string
      release-events:
        description: |
          Which events should trigger SLSA provenance generation and
          verification. One of:
            - non-pull-request (default): every event except pull_request*.
            - tag-only: push to refs/tags/* only.
            - main-and-tags: push to refs/heads/main or refs/tags/*.
            - <comma-separated event_name list>: matches if github.event_name
              is in the list. See actions/prep/release_gate.sh for full vocabulary.
          Note: this gate currently controls provenance generation and
          verification, not the docker push (which happens mid-composite
          in build/actions/container and is gated by the workflow's own
          trigger conditions). See docs/SPEC.md for the asymmetry rationale.
        required: false
        type: string
        default: non-pull-request
      pr-cache:
        description: |
          BuildKit cache policy for PR / non-release builds. Release builds
          always run cache-free regardless of this input — they produce
          SLSA L3 provenance and MUST NOT consume the shared, unverified-
          on-hit BuildKit type=gha cache (docs/SLSA_L3_AUDIT.md Finding 2).

          This input only tunes the PR / dev-build path, trading PR-build
          speed against PR-to-PR cache-poisoning exposure (a malicious PR
          poisoning a shared cache entry that a later PR build reads — see
          docs/SLSA_L3_AUDIT.md "Should wrangle care about PR-to-PR cache
          poisoning?"). One of:
            - isolated (default): each PR gets its own cache scope, keyed
              by the GitHub-assigned PR number. PR A cannot write entries
              PR B reads; rebuilds within a PR still hit cache. Safe
              default — closes PR-to-PR poisoning without disabling cache.
            - enabled: PR builds share the cross-branch BuildKit cache.
              Fastest; a malicious PR can poison entries that later PR
              builds read.
            - read-only: PR builds read the shared cache but never write
              it. PRs consume entries but cannot poison them.
            - disabled: PR builds also run cache-free.
        required: false
        type: string
        default: isolated
      scan-tools:
        description: |
          Space-separated source-scan tools (suffix :info for
          non-blocking). A load-bearing (:fail) finding blocks the
          build (and therefore the push). Empty string disables scanning.
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review wrangle-lint"
      policy:
        description: |
          wrangle PolicySet the release is verified against (path under
          policies/ or an ampel locator). Default wrangle-default-container-v1
          requires provenance + SBOM + clean osv/zizmor/wrangle-lint scans;
          adopters who drop any of those from scan-tools must pass a lighter
          policy (e.g. policies/wrangle-provenance-container-v1.hjson).
        required: false
        type: string
        default: policies/wrangle-default-container-v1.hjson
      attest-and-verify:
        description: |
          enabled (default): sign and verify SLSA provenance + a VSA and push
          them as OCI referrers on the image. disabled: leave the pushed image
          unattested (tests and scans still gate the build) — use on private
          repos, which can't attest (#600).
        required: false
        type: string
        default: enabled
    secrets:
      gh_token:
        description: >
          Deprecated no-op — no job consumes it; every job authenticates with
          its own GITHUB_TOKEN. Kept optional so callers still passing it don't
          break; stop passing it, it is slated for removal.
        required: false
    outputs:
      digest:
        description: "Image digest pushed to the registry."
        value: ${{ jobs.build.outputs.digest }}
      imagename:
        description: "Normalized (lowercased) image name."
        value: ${{ jobs.build.outputs.imagename }}
      metadata-artifact-name:
        description: "Name of the unified metadata workflow artifact. Format: `container-metadata[-<shortname>]`. Contents and layout: docs/metadata_layout.md."
        value: ${{ jobs.build.outputs.metadata-artifact-name }}
      should-release:
        description: |
          "true" if the current event matches release-events; "false" otherwise.
          Wrangle gates the attest and verify jobs on this internally; callers can
          gate downstream release-time jobs on it too.
        value: ${{ jobs.prep.outputs.should-release }}

jobs:
  # MUST stay first under `jobs:`: prep's guard refuses unsafe triggers
  # before any other job runs, and every job `needs: [prep]`. prep also
  # decides should-release and derives the shared package names.
  # docs/SPEC.md#trigger-model.
  prep:
    runs-on: ubuntu-latest
    permissions: {}    # guard/gate/names read env only — no workspace, no API, no secrets
    outputs:
      should-release: ${{ steps.prep.outputs.should-release }}
      should-attest: ${{ steps.prep.outputs.should-attest }}
      shortname: ${{ steps.prep.outputs.shortname }}
      scan: ${{ steps.prep.outputs.scan }}
    steps:
      # TODO: replace with $/actions/prep when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/prep@ffa41fdb1821739c3fa7f18865c32f6482dddade # feat/482-vsa-sign-verify-flip 2026-07-12
        id: prep
        with:
          build-type: container
          path: ${{ inputs.path }}
          release-events: ${{ inputs.release-events }}
          attest-and-verify: ${{ inputs.attest-and-verify }}

  # Source scan. The container push happens mid-composite in `build` and
  # is not release-gated, so a load-bearing (:fail) finding must block
  # `build` itself on every event — hence `build` needs `scan`.
  scan:
    needs: [prep]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/scan@ffa41fdb1821739c3fa7f18865c32f6482dddade # feat/482-vsa-sign-verify-flip 2026-07-12
        if: ${{ inputs.scan-tools != '' }}
        with:
          checkout: "true"
          tools: ${{ inputs.scan-tools }}
          # The build job folds this into the unified container-metadata.
          artifact-name: ${{ needs.prep.outputs.scan }}
          retention-days: 1

  build:
    # needs `scan` so a load-bearing finding blocks the mid-composite push.
    needs: [prep, scan]
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      imagename: ${{ steps.build.outputs.imagename }}
      metadata-artifact-name: ${{ steps.build.outputs.metadata-artifact-name }}
      metadata-pre-artifact-name: ${{ steps.build.outputs.metadata-pre-artifact-name }}
      metadata-dir: ${{ steps.build.outputs.metadata-dir }}
    runs-on: ubuntu-latest
    steps:
    # TODO: replace with $/build/actions/container when GitHub ships $/ syntax (#136)
    - name: "build and publish"
      id: build
      uses: TomHennen/wrangle/build/actions/container@ffa41fdb1821739c3fa7f18865c32f6482dddade # feat/482-vsa-sign-verify-flip 2026-07-12
      with:
        path: ${{ inputs.path }}
        dockerfile: ${{ inputs.dockerfile }}
        imagename: ${{ inputs.imagename }}
        registry: ${{ inputs.registry }}
        github_token: ${{ secrets.GITHUB_TOKEN }}
        # The workflow owns the unified metadata upload (folding in the scan
        # job's output and the verify job's bundle), so disable the composite's
        # own upload.
        upload-metadata: "false"
        # Release builds (should-release == 'true') always run cache-free:
        # they produce L3 provenance, so the build must not consume a
        # shared, cross-build, unverified-on-hit cache — see
        # docs/SLSA_L3_AUDIT.md Finding 2. PR builds get the adopter's
        # `pr-cache` policy, which defaults to "isolated" (per-PR scope,
        # so PRs cannot poison each other) and can be widened to a fully
        # shared cache or tightened to read-only / disabled.
        cache: ${{ needs.prep.outputs.should-release == 'true' && 'disabled' || inputs.pr-cache }}

    # Fold the untrusted scan job's output into the metadata dir as inert data.
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      if: ${{ always() && inputs.scan-tools != '' }}
      continue-on-error: true   # scan upload is best-effort
      with:
        name: ${{ needs.prep.outputs.scan }}
        path: ${{ steps.build.outputs.metadata-dir }}/scan/

    # On an attested release the verify job appends the signed bundle and owns
    # the final metadata upload; otherwise (non-release or unattested) this
    # sbom + scan/ is itself the final metadata artifact.
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always()
      with:
        name: ${{ needs.prep.outputs.should-attest == 'true' && steps.build.outputs.metadata-pre-artifact-name || steps.build.outputs.metadata-artifact-name }}
        path: ${{ steps.build.outputs.metadata-dir }}/
        if-no-files-found: warn

  # Generate SLSA L3 build provenance via GitHub's attestation API, naming THIS
  # reusable workflow as builder.id (its job_workflow_ref) and the Sigstore
  # signing identity, then sign the SBOM + scan/v1 metadata over the same image
  # digest and push it to the store + as OCI referrers — persisted independent of
  # the verdict (#550). Both run here, in the same job_workflow_ref identity the
  # PolicySet binds, so the move from verify carries no policy change.
  attest:
    if: ${{ needs.prep.outputs.should-attest == 'true' }}
    needs: [prep, build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC for Sigstore keyless signing (provenance + metadata)
      attestations: write   # write the attestations to GitHub's store
      packages: write       # push the provenance + metadata referrers to ghcr
      contents: read
    steps:
      # push-to-registry / cosign attach authenticate to ghcr with the job's
      # GITHUB_TOKEN, like the build and verify jobs. Same pin as the verify
      # job's login — bump together.
      - name: Log in to ghcr for the attestation push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        id: attest
        with:
          subject-name: ${{ needs.build.outputs.imagename }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true   # store the provenance as an OCI referrer on the image

      # Sign the SBOM + scan/v1 metadata over the image digest, push each as a
      # by-digest OCI referrer + to the attestation store, and assemble the
      # image's bundle the verify job appends the VSA to. cosign is built from
      # tools/go.mod here.
      # TODO: replace with $/actions/attest_metadata_oci when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/attest_metadata_oci@ffa41fdb1821739c3fa7f18865c32f6482dddade # feat/482-vsa-sign-verify-flip 2026-07-12
        with:
          shortname: ${{ needs.prep.outputs.shortname }}
          subject-digest: ${{ needs.build.outputs.digest }}
          oci-target: ${{ needs.build.outputs.imagename }}@${{ needs.build.outputs.digest }}

  # Emit a signed VSA per subject and push each as its own by-digest OCI referrer.
  # Runs after the push, so fail: true fails the workflow conclusion (blocking
  # downstream caller jobs) rather than rolling back the live image. Needs
  # `attest` so the provenance referrer the collector reads already exists.
  verify:
    if: ${{ needs.prep.outputs.should-attest == 'true' }}
    needs: [prep, build, attest]
    runs-on: ubuntu-latest
    # No contents: write — the container caller grants only contents: read, so
    # requesting it here would be a startup-failing escalation; the bundle ships
    # as a workflow artifact and an OCI referrer, not a release asset.
    permissions:
      id-token: write       # wrangle-attest keyless-signs the VSA via this workflow's OIDC identity
      attestations: write   # post the VSA to the GitHub attestation store
      packages: write       # push the VSA referrer to ghcr
    steps:
      # Pushing the VSA referrer to ghcr needs registry auth. Same pin as
      # the attest job's cosign-installer — bump in lockstep.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Must match the cosign built from tools/go.mod — the version the suite tests.
          cosign-release: v3.0.6

      # Use the job's own GITHUB_TOKEN (packages: write above), like the build job.
      - name: Log in to ghcr for the VSA referrer push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # oci-target pushes the VSA referrer; the dist download is skipped (the image is the artifact).
      # TODO: replace with $/actions/verify_release when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/verify_release@ffa41fdb1821739c3fa7f18865c32f6482dddade # feat/482-vsa-sign-verify-flip 2026-07-12
        with:
          build-type: container
          shortname: ${{ needs.prep.outputs.shortname }}
          subjects: ${{ needs.build.outputs.digest }}
          policy: ${{ inputs.policy }}
          collector: oci:${{ needs.build.outputs.imagename }}@${{ needs.build.outputs.digest }}
          # resourceUri is the OCI image ref a container consumer fetches and
          # pins when verifying the VSA; the subject digest is the cryptographic bind.
          context: buildPoint:git+https://github.com/${{ github.repository }},vsa.resourceUri:${{ needs.build.outputs.imagename }}@${{ needs.build.outputs.digest }}
          # Push each signed VSA as its own by-digest referrer (fail-closed).
          oci-target: ${{ needs.build.outputs.imagename }}@${{ needs.build.outputs.digest }}
