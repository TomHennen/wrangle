name: "Build and test an npm package with best practices."

# Build + SLSA provenance reusable workflow. Publishing is NOT included
# because npm Trusted Publishing's OIDC token's workflow_ref claim is
# bound to the caller workflow's filename — a reusable workflow does
# not satisfy that constraint. See:
# https://docs.npmjs.com/trusted-publishers/ (Troubleshooting)
# https://github.com/npm/documentation/issues/1755
#
# Adopters add a publish job in their own calling workflow. Verifying
# wrangle's L3 SLSA provenance before publish is recommended (and is
# the pattern shown in gh_workflow_examples/build_npm.yml) but optional.

on:
  workflow_call:
    inputs:
      path:
        description: "Relative path to the directory containing package.json"
        required: false
        type: string
        default: "."
      node-version:
        description: |
          Node.js version override. If empty, detected from .nvmrc, then
          package.json's engines.node, then a wrangle-default LTS (currently
          Node 22). Adopters who care about a specific version should set
          one of the first three explicitly rather than rely on the fallback.
        required: false
        type: string
        default: ""
      run-tests:
        description: "Whether to run `npm test` if a non-default test script is declared"
        required: false
        type: boolean
        default: true
      ignore-scripts:
        description: |
          When true, no package.json script runs: --ignore-scripts is
          passed to npm ci AND npm pack (suppressing prepare/prepack/
          postpack/install lifecycle hooks, including those in transitive
          dev-deps), AND `npm run build` / `npm test` are skipped outright.
          Opt-in hardening for adopters who want the L3 attestation to bind
          to "what npm pack produces with no script execution at all."
          Defaults to false because common ecosystem tools (husky,
          prebuild-install) rely on these hooks and most adopters expect
          their declared build/test to run.
        required: false
        type: boolean
        default: false
      release-events:
        description: |
          Which events should trigger release-time actions (SLSA provenance,
          verification, and — in the caller's publish job — package publish).
          One of:
            - non-pull-request (default): every event except pull_request*.
            - tag-only: push to refs/tags/* only.
            - main-and-tags: push to refs/heads/main or refs/tags/*.
            - <comma-separated event_name list>: matches if github.event_name
              is in the list. See actions/prep/release_gate.sh for full vocabulary.
        required: false
        type: string
        default: non-pull-request
      ref:
        description: |
          Git ref to check out for the build. If empty (default), uses
          the triggering commit SHA (github.sha) — which is what almost
          every adopter wants.

          This input exists for the narrower case where an earlier job
          in the same workflow run has pushed a commit to the branch
          (e.g., a release-please-style version-bump prep job, or
          wrangle's own integration-test fixture in wrangle-test) and
          the build needs to pick up that new commit rather than the
          original triggering SHA. Pass `github.ref` for that case.
        required: false
        type: string
        default: ""
      scan-tools:
        description: |
          Space-separated source-scan tools (suffix :info for
          non-blocking). A load-bearing (:fail) finding fails the run,
          blocking the caller's publish. Empty string disables scanning.
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review wrangle-lint"
      go-cache:
        description: >
          Set to "enabled" to cache the Go module + build caches the
          source-scan tools build from source (osv-scanner et al. —
          #343) on PR / non-release runs. Release builds always run
          cache-free regardless: the scan gates an attested release, so
          its tools build cold and a poisoned cache cannot forge a
          passing scan (docs/SLSA_L3_AUDIT.md). Default off — the cache
          is ~1.5–3 GB against this repo's Actions cache quota.
        required: false
        type: string
        default: ""
      policy:
        description: |
          wrangle PolicySet the release is verified against (path under
          policies/ or an ampel locator). Default wrangle-default-npm-v1
          requires provenance + SBOM + clean osv/zizmor/wrangle-lint scans;
          adopters who drop any of those from scan-tools must pass a lighter
          policy (e.g. policies/wrangle-provenance-npm-v1.hjson).
        required: false
        type: string
        default: policies/wrangle-default-npm-v1.hjson
      sbom-tool:
        description: "Wrangle's default SBOM tool, or one you define yourself in `.wrangle/tools.json`."
        required: false
        type: string
        default: sbom
    outputs:
      hashes:
        description: "Base64-encoded SHA-256 hashes of built artifacts (for SLSA provenance)"
        value: ${{ jobs.build.outputs.hashes }}
      version:
        description: "The package version that was built"
        value: ${{ jobs.build.outputs.version }}
      resource-uri:
        description: "The purl the VSA's resourceUri names (pkg:npm/<name>@<version>). Pipe into actions/verify-vsa's resource-uri input."
        value: ${{ jobs.build.outputs.resource-uri }}
      tarball:
        description: "Filename of the produced .tgz (relative to the dist/ artifact root)"
        value: ${{ jobs.build.outputs.tarball }}
      dist-artifact-name:
        description: "Name of the uploaded dist/ artifact (download with this name to publish)"
        value: ${{ jobs.prep.outputs.dist }}
      metadata-artifact-name:
        description: "Name of the unified metadata workflow artifact. Format: `npm-metadata[-<shortname>]`. Contents and layout: docs/metadata_layout.md."
        value: ${{ jobs.prep.outputs.metadata }}
      should-release:
        description: |
          "true" if the current event matches release-events and the caller
          should perform release-time actions (publish, attestation upload,
          etc.); "false" otherwise. Wrangle gates the attest and verify jobs on
          this internally; the caller's publish job should gate on it too.
        value: ${{ jobs.prep.outputs.should-release }}

jobs:
  # MUST stay first under `jobs:`: prep's guard refuses unsafe triggers
  # before any other job runs, and every job `needs: [prep]`. prep also
  # decides should-release and derives the shared package names.
  # docs/SPEC.md#trigger-model.
  prep:
    runs-on: ubuntu-latest
    permissions: {}    # guard/gate/names read env only — no workspace, no API, no secrets
    outputs:
      should-release: ${{ steps.prep.outputs.should-release }}
      shortname: ${{ steps.prep.outputs.shortname }}
      dist: ${{ steps.prep.outputs.dist }}
      scan: ${{ steps.prep.outputs.scan }}
      metadata: ${{ steps.prep.outputs.metadata }}
      metadata-pre: ${{ steps.prep.outputs.metadata-pre }}
    steps:
      # TODO: replace with $/actions/prep when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/prep@5e8587d11a086a9681f445ad789f115f57f5cc62 # followup-toolbox-ampel-bump 2026-07-04
        id: prep
        with:
          build-type: npm
          path: ${{ inputs.path }}
          release-events: ${{ inputs.release-events }}

  # Source scan. A load-bearing (:fail) finding fails this job, failing
  # the run so the caller's publish (gated on this workflow via needs:)
  # is blocked — decoupled scan/build runs can't gate publish.
  scan:
    needs: [prep]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/scan@5e8587d11a086a9681f445ad789f115f57f5cc62 # followup-toolbox-ampel-bump 2026-07-04
        if: ${{ inputs.scan-tools != '' }}
        with:
          checkout: "true"
          ref: ${{ inputs.ref || '' }}
          tools: ${{ inputs.scan-tools }}
          # The build job folds this into the unified npm-metadata.
          artifact-name: ${{ needs.prep.outputs.scan }}
          retention-days: 1
          # Cold on release: the scan gates an attested build, so a
          # poisoned tool cache must not be able to forge a passing scan.
          go-cache: ${{ needs.prep.outputs.should-release != 'true' && inputs.go-cache || '' }}

  build:
    # needs `scan` to fold the untrusted scan output into the metadata dir.
    needs: [prep, scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read    # minimal — no OIDC, no publish
    outputs:
      hashes: ${{ steps.build.outputs.hashes }}
      name: ${{ steps.pkgname.outputs.name }}
      version: ${{ steps.build.outputs.version }}
      # Single composition site for the purl: the verify job bakes this into
      # the VSA's resourceUri and the workflow re-exports it for publish gates.
      resource-uri: pkg:npm/${{ steps.pkgname.outputs.name }}@${{ steps.build.outputs.version }}
      tarball: ${{ steps.build.outputs.tarball }}
      metadata-dir: ${{ steps.build.outputs.metadata-dir }}
      # JSON array of dist filenames the verify job binds one VSA to each.
      dist-files: ${{ steps.distfiles.outputs.files }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || '' }}

      # TODO: replace with $/build/actions/npm when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/build/actions/npm@5e8587d11a086a9681f445ad789f115f57f5cc62 # followup-toolbox-ampel-bump 2026-07-04
        id: build
        with:
          path: ${{ inputs.path }}
          node-version: ${{ inputs.node-version }}
          run-tests: ${{ inputs.run-tests }}
          ignore-scripts: ${{ inputs.ignore-scripts }}
          sbom-tool: ${{ inputs.sbom-tool }}

      # The npm composite doesn't emit the package name; read it from
      # package.json for the VSA resourceUri purl. Scoped names (@scope/pkg) pass through.
      - id: pkgname
        shell: bash
        env:
          INPUT_PATH: ${{ inputs.path }}
        run: |
          set -euo pipefail
          printf 'name=%s\n' "$(jq -r .name "$INPUT_PATH/package.json")" >> "$GITHUB_OUTPUT"

      # Emit the dist filenames as a JSON array; the verify job binds one VSA per file.
      # Derived from the build's base64 `hashes` output (the "<sha256>  <name>" lines the
      # provenance covers), reduced to basenames.
      - id: distfiles
        shell: bash
        env:
          HASHES: ${{ steps.build.outputs.hashes }}
        run: |
          set -euo pipefail
          files="$(printf '%s' "$HASHES" | base64 -d | awk '{ sub(/^.*\//, "", $2); print $2 }' | jq -R . | jq -cs .)"
          # Fail closed: an empty array leaves the verify job with no subject to
          # bind a VSA to, silently dropping the release-gating verification.
          # Never let the gate collapse silently.
          if [[ "$files" == "[]" ]]; then
              printf 'no dist files to attest — refusing to emit a VSA-less bundle\n' >&2
              exit 1
          fi
          printf 'files=%s\n' "$files" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.prep.outputs.dist }}
          path: ${{ inputs.path }}/dist/

      # Fold the untrusted scan job's output into the metadata dir as inert data.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ inputs.scan-tools != '' }}
        continue-on-error: true   # scan upload is best-effort
        with:
          name: ${{ needs.prep.outputs.scan }}
          path: ${{ steps.build.outputs.metadata-dir }}/scan/

      # Non-release: this is the final unified metadata (sbom + scan/). On
      # release the verify job appends the bundle and owns the final upload.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.prep.outputs.should-release == 'true' && needs.prep.outputs.metadata-pre || needs.prep.outputs.metadata }}
          path: ${{ steps.build.outputs.metadata-dir }}/
          if-no-files-found: error
          # Short-retain only the premeta transient (release path); the
          # non-release artifact is the final deliverable, kept at repo default.
          retention-days: ${{ needs.prep.outputs.should-release == 'true' && '1' || '' }}

  # Generate SLSA L3 build provenance via GitHub's attestation API, naming THIS
  # reusable workflow as builder.id (its job_workflow_ref) and the Sigstore
  # signing identity, then sign the SBOM + scan/v1 metadata over the built dist
  # and post it to the attestation store — persisted independent of the verdict
  attest:
    if: ${{ needs.prep.outputs.should-release == 'true' }}
    # needs `scan` so a load-bearing finding blocks attestation + the caller's publish.
    needs: [prep, build, scan]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC for Sigstore keyless signing
      attestations: write   # write the attestation to GitHub's store
      contents: read        # download-artifact reads the same-run dist
    outputs:
      bundles-artifact-name: ${{ steps.attest.outputs.bundles-artifact-name }}
    steps:
      # TODO: replace with $/actions/attest_provenance when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/attest_provenance@5e8587d11a086a9681f445ad789f115f57f5cc62 # followup-toolbox-ampel-bump 2026-07-04
        id: attest
        with:
          build-type: npm
          shortname: ${{ needs.prep.outputs.shortname }}
          subject-path: dist/*

  # Emit one signed SLSA Verification Summary Attestation (VSA) per dist artifact
  # and append it to the SLSA provenance, producing one per-artifact
  # <artifact>.intoto.jsonl bundle. bnd signs each VSA keyless with this workflow's
  # OIDC identity; a FAILED policy fails the step (fail: true) and blocks the
  # caller's publish via needs: propagation. The SBOM + scan/v1 metadata is
  # signed in the attest job; verify evaluates it and binds the verdict.
  verify:
    if: ${{ needs.prep.outputs.should-release == 'true' }}
    needs: [prep, build, attest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # bnd keyless-signs each VSA via this workflow's OIDC identity
      attestations: write   # post each VSA to the GitHub attestation store
      contents: write       # create the release if absent and attach the bundle on tag pushes
    steps:
      # TODO: replace with $/actions/verify_release when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/verify_release@5e8587d11a086a9681f445ad789f115f57f5cc62 # followup-toolbox-ampel-bump 2026-07-04
        with:
          build-type: npm
          shortname: ${{ needs.prep.outputs.shortname }}
          dist-files: ${{ needs.build.outputs.dist-files }}
          policy: ${{ inputs.policy }}
          # No extra collector input: the attest-assembled bundle is fed to ampel as the jsonl collector; only container adds an oci: collector.
          # resourceUri is the npm purl consumers pin when verifying the VSAs;
          # each subject digest is the cryptographic bind.
          context: buildPoint:git+https://github.com/${{ github.repository }},vsa.resourceUri:${{ needs.build.outputs.resource-uri }}
          fail: "true"
