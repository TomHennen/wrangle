name: Integration Test

on:
  pull_request:
    branches: ["**"]

concurrency:
  group: integration-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dispatch:
    # Only run for internal PRs from human contributors. Skip for:
    # - Fork PRs: no secret access (GitHub's baseline security model)
    # - Dependabot PRs: GitHub strips secrets from the dependabot actor
    # See test/integration/SPEC.md for the full rationale.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository
      && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    environment: integration-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Dispatch companion repo and wait
        env:
          GH_TOKEN: ${{ secrets.TEST_REPO_PAT }}
          WRANGLE_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WRANGLE_RUN_ID: ${{ github.run_id }}
        run: ./test/integration/dispatch.sh "$WRANGLE_SHA" "$PR_NUMBER" "$WRANGLE_RUN_ID"

      - name: Cleanup ephemeral tag and release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.TEST_REPO_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WRANGLE_RUN_ID: ${{ github.run_id }}
        run: |
          TAG="pr-${PR_NUMBER}-${WRANGLE_RUN_ID}"
          REPO="${COMPANION_REPO:-tomhennen/wrangle-test}"
          printf 'Best-effort cleanup of tag %s\n' "$TAG"
          gh api "repos/${REPO}/git/refs/tags/${TAG}" --method DELETE 2>/dev/null || true
          gh release delete "$TAG" --repo "$REPO" --yes 2>/dev/null || true
