name: "Build and test a Python package with best practices."

# Build + SLSA provenance reusable workflow. Publishing is NOT included
# because PyPI Trusted Publishing does not support reusable workflows —
# the OIDC token's workflow_ref must point to the adopter's own workflow.
# See: https://github.com/pypi/warehouse/issues/11096
#
# Adopters add a publish job in their own calling workflow. Verifying
# SLSA provenance before publish is recommended (and is the pattern
# shown in gh_workflow_examples/build_python.yml) but optional.

on:
  workflow_call:
    inputs:
      path:
        description: "Relative path to the directory containing pyproject.toml"
        required: false
        type: string
        default: "."
      python-version:
        description: "Python version override. If empty, detected from pyproject.toml."
        required: false
        type: string
        default: ""
      run-tests:
        description: "Whether to run pytest before building"
        required: false
        type: boolean
        default: true
      release-events:
        description: |
          Which events should trigger release-time actions (SLSA provenance,
          verification, and — in the caller's publish job — package publish).
          One of:
            - non-pull-request (default): every event except pull_request*.
            - tag-only: push to refs/tags/* only.
            - main-and-tags: push to refs/heads/main or refs/tags/*.
            - <comma-separated event_name list>: matches if github.event_name
              is in the list. See actions/release_gate for full vocabulary.
        required: false
        type: string
        default: non-pull-request
      ref:
        description: |
          Git ref to check out for the build. If empty (default), uses
          the triggering commit SHA (github.sha) — which is what almost
          every adopter wants.

          This input exists for the narrower case where an earlier job
          in the same workflow run has pushed a commit to the branch
          (e.g., a release-please-style version-bump prep job, or
          wrangle's own integration-test fixture in wrangle-test) and
          the build needs to pick up that new commit rather than the
          original triggering SHA. Pass `github.ref` for that case.
        required: false
        type: string
        default: ""
      verify-provenance:
        description: |
          When true (default), wrangle runs `slsa-verifier verify-artifact`
          against the just-built dist before declaring the workflow
          successful. If verification fails, the workflow fails — and the
          caller's publish job is blocked via standard `needs:` propagation,
          so a tampered dist between build and publish cannot be released.
          Set to false to skip wrangle's verification (e.g., adopters with
          a custom verification flow). Skipping makes the dist's integrity
          between wrangle's build and the caller's publish an
          adopter-managed concern.
        required: false
        type: boolean
        default: true
    outputs:
      hashes:
        description: "Base64-encoded SHA-256 hashes of built artifacts (for SLSA provenance)"
        value: ${{ jobs.build.outputs.hashes }}
      version:
        description: "The package version that was built"
        value: ${{ jobs.build.outputs.version }}
      dist-artifact-name:
        description: "Name of the uploaded dist/ artifact (download with this name to publish)"
        value: ${{ jobs.build.outputs.dist-artifact-name }}
      provenance-artifact-name:
        description: "Name of the SLSA provenance workflow artifact (= the provenance filename). Empty when should-release is false."
        value: ${{ jobs.provenance.outputs.provenance-name }}
      metadata-artifact-name:
        description: "Name of the workflow artifact (a zip of `metadata/python/<shortname>/`'s contents) containing the SBOM and metadata. Format: `python-metadata-<shortname>`. Adopters fetch via `actions/download-artifact` — the metadata files land at the top level of the configured `path:`, not under `metadata/python/<shortname>/`. See docs/SPEC.md \"Unified metadata layout\"."
        value: ${{ jobs.build.outputs.metadata-artifact-name }}
      should-release:
        description: |
          "true" if the current event matches release-events and the caller
          should perform release-time actions (publish, attestation upload,
          etc.); "false" otherwise. Wrangle gates the provenance job on
          this internally; the caller's publish job should gate on it too.
        value: ${{ jobs.gate.outputs.should-release }}

jobs:
  # Refuse trigger patterns known to expose this workflow to supply-chain
  # attack classes (pull_request_target, workflow_run via pull_request_target).
  # The guard MUST stay first under `jobs:`; every other job lists `guard`
  # in its `needs:` so a refused invocation skips the entire workflow.
  # Full trigger contract: docs/SPEC.md#trigger-model.
  guard:
    runs-on: ubuntu-latest
    permissions: {}    # reads env only — no workspace, no API, no secrets
    steps:
      # TODO: replace with $/actions/preflight_guard when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/preflight_guard@c5cbf9e1e135ddb98c3d3230ee47bf36ba5329e5 # main 2026-05-28

  # Decide whether release-time actions (provenance, publish) should run
  # for this event. Cheap separate job so the result is available to
  # both the provenance job below and the caller's publish job via
  # outputs.should-release.
  gate:
    needs: [guard]
    runs-on: ubuntu-latest
    permissions: {}    # release_gate reads only env; no workspace, no API
    outputs:
      should-release: ${{ steps.gate.outputs.should-release }}
    steps:
      # No checkout: release_gate resolves via ${{ github.action_path }}.
      # TODO: replace with $/actions/release_gate when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/release_gate@c5cbf9e1e135ddb98c3d3230ee47bf36ba5329e5 # main 2026-05-28
        id: gate
        with:
          events: ${{ inputs.release-events }}

  build:
    # needs `gate` so the build can read should-release and disable the
    # uv cache for release builds (SLSA L3 isolation — see the `cache:`
    # input below and docs/SLSA_L3_AUDIT.md Finding 1).
    needs: [guard, gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read    # minimal — no OIDC, no publish
    outputs:
      hashes: ${{ steps.build.outputs.hashes }}
      version: ${{ steps.build.outputs.version }}
      shortname: ${{ steps.build.outputs.shortname }}
      dist-artifact-name: ${{ steps.names.outputs.dist }}
      metadata-artifact-name: ${{ steps.names.outputs.metadata }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || '' }}

      # TODO: replace with $/build/actions/python when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/build/actions/python@c5cbf9e1e135ddb98c3d3230ee47bf36ba5329e5 # main 2026-05-28
        id: build
        with:
          path: ${{ inputs.path }}
          python-version: ${{ inputs.python-version }}
          run-tests: ${{ inputs.run-tests }}
          # Disable the uv cache on release builds. should-release == 'true'
          # means this event produces L3 provenance, so the build must not
          # consume a shared, cross-build, unverified-on-hit cache — see
          # docs/SLSA_L3_AUDIT.md Finding 1. PR builds keep the cache for
          # fast iteration; they produce no provenance, so cache poisoning
          # is not an L3 concern at that layer.
          cache: ${{ needs.gate.outputs.should-release == 'true' && 'disabled' || 'enabled' }}

      # Namespace artifact names by the path-derived shortname so multiple
      # python builds in one workflow don't collide.
      - id: names
        shell: bash
        env:
          SHORTNAME: ${{ steps.build.outputs.shortname }}
        run: |
          set -euo pipefail
          printf 'dist=python-dist-%s\n' "$SHORTNAME" >> "$GITHUB_OUTPUT"
          printf 'metadata=python-metadata-%s\n' "$SHORTNAME" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.names.outputs.dist }}
          path: ${{ inputs.path }}/dist/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.names.outputs.metadata }}
          path: ${{ steps.build.outputs.metadata-dir }}/
          if-no-files-found: error

  # Generate SLSA L3 provenance for the built artifacts. The generator
  # runs in an isolated reusable workflow that the caller cannot tamper
  # with — this is what makes the provenance non-falsifiable. Gated on
  # the release-events input so adopters can tighten when provenance is
  # produced (e.g., tag-only) without forking the workflow.
  #
  # contents: write is required because the generator's upload-assets
  # job declares it. GitHub validates every called job's permissions
  # at startup regardless of the job's `if:` condition, so granting
  # write is mandatory even when upload-assets is false. Since the
  # write permission is unavoidable, we use it: upload-assets is
  # enabled on tag pushes so provenance and dist are attached as
  # release assets (permanent, discoverable). Off-tag the generator
  # only uploads provenance as a workflow artifact (90-day retention).
  provenance:
    if: ${{ needs.gate.outputs.should-release == 'true' }}
    needs: [guard, gate, build]
    permissions:
      actions: read    # detect the GitHub Actions environment
      id-token: write  # OIDC for Sigstore signing
      contents: write  # required by generator's upload-assets job at startup
    # MUST use tag, not SHA — the SLSA generator validates its own invocation
    # ref. See https://github.com/TomHennen/wrangle/issues/147
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses] tag required by SLSA generator's OIDC verification
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      # Namespace the provenance filename by shortname so multiple python
      # builds in one workflow don't collide on the default `multiple.intoto.jsonl`.
      # actions/download-artifact picks non-deterministically when two artifacts
      # share a name in the same run, and the verify job below would download
      # the wrong build's provenance. The README documents that the actual
      # filename is exposed via `provenance-artifact-name` so adopters don't
      # need to reconstruct the convention themselves.
      provenance-name: python-${{ needs.build.outputs.shortname }}.intoto.jsonl
      upload-assets: ${{ startsWith(github.ref, 'refs/tags/') }}

  # Verify the just-built dist matches the just-generated provenance.
  # Catches "dist tampered with after build, before publish" — the same
  # guarantee the example workflow used to provide via per-adopter
  # boilerplate, now owned by wrangle. Failing here fails the workflow,
  # which (via standard `needs:` propagation) blocks the caller's
  # publish job. Adopters with custom verification flows pass
  # `verify-provenance: false` and wire their own.
  verify:
    if: ${{ needs.gate.outputs.should-release == 'true' && inputs.verify-provenance }}
    needs: [guard, gate, build, provenance]
    runs-on: ubuntu-latest
    permissions: {}    # default token; download-artifact reads same-run artifacts
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.dist-artifact-name }}
          path: dist/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: provenance/

      # See actions/install_slsa_verifier for retry policy and alarm
      # preservation rationale.
      # TODO: replace with $/actions/install_slsa_verifier when $/ syntax ships (#136)
      - uses: TomHennen/wrangle/actions/install_slsa_verifier@c5cbf9e1e135ddb98c3d3230ee47bf36ba5329e5 # main 2026-05-28

      - name: Verify SLSA provenance
        env:
          SOURCE_URI: github.com/${{ github.repository }}
          PROVENANCE_NAME: ${{ needs.provenance.outputs.provenance-name }}
        run: |
          set -euo pipefail
          slsa-verifier verify-artifact \
              --provenance-path "provenance/${PROVENANCE_NAME}" \
              --source-uri "$SOURCE_URI" \
              dist/*
