name: "Build and test a Python package with best practices."

# Build-only reusable workflow. Publishing is NOT included because
# PyPI Trusted Publishing does not support reusable workflows — the
# OIDC token's workflow_ref must point to the adopter's own workflow.
# See: https://github.com/pypi/warehouse/issues/11096
#
# Adopters add a publish job in their own calling workflow. See
# gh_workflow_examples/build_python.yml for the complete pattern.

on:
  workflow_call:
    inputs:
      path:
        description: "Relative path to the directory containing pyproject.toml"
        required: false
        type: string
        default: "."
      python-version:
        description: "Python version override. If empty, detected from pyproject.toml."
        required: false
        type: string
        default: ""
      run-tests:
        description: "Whether to run pytest before building"
        required: false
        type: boolean
        default: true
    outputs:
      hashes:
        description: "Base64-encoded SHA-256 hashes of built artifacts (for SLSA provenance)"
        value: ${{ jobs.build.outputs.hashes }}
      version:
        description: "The package version that was built"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read    # minimal — no OIDC, no publish
    outputs:
      hashes: ${{ steps.build.outputs.hashes }}
      version: ${{ steps.build.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # TODO: replace with $/build/actions/python when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/build/actions/python@ae27083d8f95ab83aa1f098a88352f0e0f1da057 # implement-python-build 2026-04-24
        id: build
        with:
          path: ${{ inputs.path }}
          python-version: ${{ inputs.python-version }}
          run-tests: ${{ inputs.run-tests }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: python-dist
          path: ${{ inputs.path }}/dist/
