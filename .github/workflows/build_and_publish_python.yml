name: "Build and test a Python package with best practices."

# Build + SLSA provenance reusable workflow. Publishing is NOT included
# because PyPI Trusted Publishing does not support reusable workflows —
# the OIDC token's workflow_ref must point to the adopter's own workflow.
# See: https://github.com/pypi/warehouse/issues/11096
#
# Adopters add a publish job in their own calling workflow. Verifying
# SLSA provenance before publish is recommended (and is the pattern
# shown in gh_workflow_examples/build_python.yml) but optional.

on:
  workflow_call:
    inputs:
      path:
        description: "Relative path to the directory containing pyproject.toml"
        required: false
        type: string
        default: "."
      python-version:
        description: "Python version override. If empty, detected from pyproject.toml."
        required: false
        type: string
        default: ""
      run-tests:
        description: "Whether to run pytest before building"
        required: false
        type: boolean
        default: true
      release-events:
        description: |
          Which events should trigger release-time actions (SLSA provenance,
          verification, and — in the caller's publish job — package publish).
          One of:
            - non-pull-request (default): every event except pull_request*.
            - tag-only: push to refs/tags/* only.
            - main-and-tags: push to refs/heads/main or refs/tags/*.
            - <comma-separated event_name list>: matches if github.event_name
              is in the list. See actions/release_gate for full vocabulary.
        required: false
        type: string
        default: non-pull-request
      ref:
        description: |
          Git ref to check out for the build. If empty (default), uses
          the triggering commit SHA (github.sha) — which is what almost
          every adopter wants.

          This input exists for the narrower case where an earlier job
          in the same workflow run has pushed a commit to the branch
          (e.g., a release-please-style version-bump prep job, or
          wrangle's own integration-test fixture in wrangle-test) and
          the build needs to pick up that new commit rather than the
          original triggering SHA. Pass `github.ref` for that case.
        required: false
        type: string
        default: ""
      scan-tools:
        description: |
          Space-separated source-scan tools (suffix :info for
          non-blocking). A load-bearing (:fail) finding fails the run,
          blocking the caller's publish. Empty string disables scanning.
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review"
    outputs:
      hashes:
        description: "Base64-encoded SHA-256 hashes of built artifacts (for SLSA provenance)"
        value: ${{ jobs.build.outputs.hashes }}
      version:
        description: "The package version that was built"
        value: ${{ jobs.build.outputs.version }}
      resource-uri:
        description: "The purl the VSA's resourceUri names (pkg:generic/<name>@<version>). Pipe into actions/verify-vsa's resource-uri input."
        value: ${{ jobs.build.outputs.resource-uri }}
      dist-artifact-name:
        description: "Name of the uploaded dist/ artifact (download with this name to publish)"
        value: ${{ jobs.build.outputs.dist-artifact-name }}
      provenance-artifact-name:
        description: "Name of the workflow artifact containing the SLSA provenance bundle — one JSON object per line, covering all dist subjects. Empty when should-release is false."
        value: ${{ jobs.attest.outputs.bundle-artifact-name }}
      metadata-artifact-name:
        description: "Name of the workflow artifact (a zip of `metadata/python/<shortname>/`'s contents) containing the SBOM and metadata. Format: `python-metadata-<shortname>`. Adopters fetch via `actions/download-artifact` — the metadata files land at the top level of the configured `path:`, not under `metadata/python/<shortname>/`. See docs/SPEC.md \"Unified metadata layout\"."
        value: ${{ jobs.build.outputs.metadata-artifact-name }}
      should-release:
        description: |
          "true" if the current event matches release-events and the caller
          should perform release-time actions (publish, attestation upload,
          etc.); "false" otherwise. Wrangle gates the attest and verify jobs on
          this internally; the caller's publish job should gate on it too.
        value: ${{ jobs.gate.outputs.should-release }}

jobs:
  # Refuse trigger patterns known to expose this workflow to supply-chain
  # attack classes (pull_request_target, workflow_run via pull_request_target).
  # The guard MUST stay first under `jobs:`; every other job lists `guard`
  # in its `needs:` so a refused invocation skips the entire workflow.
  # Full trigger contract: docs/SPEC.md#trigger-model.
  guard:
    runs-on: ubuntu-latest
    permissions: {}    # reads env only — no workspace, no API, no secrets
    steps:
      # TODO: replace with $/actions/preflight_guard when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/preflight_guard@15b64ecbe38ca59cd24964eb9403d428075ffa37 # main 2026-06-10

  # Decide whether release-time actions (provenance, publish) should run
  # for this event. Cheap separate job so the result is available to
  # both the attest/verify jobs below and the caller's publish job via
  # outputs.should-release.
  gate:
    needs: [guard]
    runs-on: ubuntu-latest
    permissions: {}    # release_gate reads only env; no workspace, no API
    outputs:
      should-release: ${{ steps.gate.outputs.should-release }}
    steps:
      # No checkout: release_gate resolves via ${{ github.action_path }}.
      # TODO: replace with $/actions/release_gate when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/release_gate@15b64ecbe38ca59cd24964eb9403d428075ffa37 # main 2026-06-10
        id: gate
        with:
          events: ${{ inputs.release-events }}

  # Source scan. A load-bearing (:fail) finding fails this job, failing
  # the run so the caller's publish (gated on this workflow via needs:)
  # is blocked — decoupled scan/build runs can't gate publish.
  scan:
    needs: [guard]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        if: ${{ inputs.scan-tools != '' }}
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || '' }}

      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/scan@15b64ecbe38ca59cd24964eb9403d428075ffa37 # main 2026-06-10
        if: ${{ inputs.scan-tools != '' }}
        with:
          tools: ${{ inputs.scan-tools }}

  build:
    # needs `gate` so the build can read should-release and disable the
    # uv cache for release builds (SLSA L3 isolation — see the `cache:`
    # input below and docs/SLSA_L3_AUDIT.md Finding 1).
    needs: [guard, gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read    # minimal — no OIDC, no publish
    outputs:
      hashes: ${{ steps.build.outputs.hashes }}
      name: ${{ steps.build.outputs.name }}
      version: ${{ steps.build.outputs.version }}
      # Single composition site for the purl: the verify job bakes this into
      # the VSA's resourceUri and the workflow re-exports it for publish gates.
      resource-uri: pkg:generic/${{ steps.build.outputs.name }}@${{ steps.build.outputs.version }}
      shortname: ${{ steps.build.outputs.shortname }}
      dist-artifact-name: ${{ steps.names.outputs.dist }}
      metadata-artifact-name: ${{ steps.names.outputs.metadata }}
      # JSON array of dist filenames, so the verify job can fan out one VSA per artifact.
      dist-files: ${{ steps.distfiles.outputs.files }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || '' }}

      # TODO: replace with $/build/actions/python when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/build/actions/python@15b64ecbe38ca59cd24964eb9403d428075ffa37 # main 2026-06-10
        id: build
        with:
          path: ${{ inputs.path }}
          python-version: ${{ inputs.python-version }}
          run-tests: ${{ inputs.run-tests }}
          # Disable the uv cache on release builds. should-release == 'true'
          # means this event produces L3 provenance, so the build must not
          # consume a shared, cross-build, unverified-on-hit cache — see
          # docs/SLSA_L3_AUDIT.md Finding 1. PR builds keep the cache for
          # fast iteration; they produce no provenance, so cache poisoning
          # is not an L3 concern at that layer.
          cache: ${{ needs.gate.outputs.should-release == 'true' && 'disabled' || 'enabled' }}

      # Namespace artifact names by the path-derived shortname so multiple
      # python builds in one workflow don't collide.
      - id: names
        shell: bash
        env:
          SHORTNAME: ${{ steps.build.outputs.shortname }}
        run: |
          set -euo pipefail
          printf 'dist=python-dist-%s\n' "$SHORTNAME" >> "$GITHUB_OUTPUT"
          printf 'metadata=python-metadata-%s\n' "$SHORTNAME" >> "$GITHUB_OUTPUT"

      # Emit the dist filenames as a JSON array for the verify job's matrix.
      # Derived from the build's base64 `hashes` output (the "<sha256>  <name>" lines the
      # provenance covers), reduced to basenames.
      - id: distfiles
        shell: bash
        env:
          HASHES: ${{ steps.build.outputs.hashes }}
        run: |
          set -euo pipefail
          files="$(printf '%s' "$HASHES" | base64 -d | awk '{ sub(/^.*\//, "", $2); print $2 }' | jq -R . | jq -cs .)"
          # Fail closed: an empty array would expand the verify matrix to zero
          # shards, skipping the release-gating verify job — and a skipped job
          # propagates as success. Never let the gate collapse silently.
          if [[ "$files" == "[]" ]]; then
              printf 'no dist files to attest — refusing to emit an empty VSA matrix\n' >&2
              exit 1
          fi
          printf 'files=%s\n' "$files" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.names.outputs.dist }}
          path: ${{ inputs.path }}/dist/

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.names.outputs.metadata }}
          path: ${{ steps.build.outputs.metadata-dir }}/
          if-no-files-found: error

  # Generate SLSA L3 build provenance via GitHub's attestation API, naming THIS
  # reusable workflow as builder.id (its job_workflow_ref) and the Sigstore
  # signing identity
  attest:
    if: ${{ needs.gate.outputs.should-release == 'true' }}
    # needs `scan` so a load-bearing finding blocks attestation + the caller's publish.
    needs: [guard, gate, build, scan]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC for Sigstore keyless signing
      attestations: write   # write the attestation to GitHub's store
      contents: read        # download-artifact reads the same-run dist
    outputs:
      bundle-artifact-name: python-provenance-bundle-${{ needs.build.outputs.shortname }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.dist-artifact-name }}
          path: dist/

      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        id: attest
        with:
          subject-path: dist/*

      # Stage the signed provenance bundle as a workflow artifact for the verify
      # job; jq -c normalizes it to one JSON object per line for ampel's jsonl:
      # collector.
      - name: Stage the provenance bundle for the VSA
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          set -euo pipefail
          set -f
          jq -c . "$BUNDLE_PATH" > "$RUNNER_TEMP/provenance.jsonl"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-provenance-bundle-${{ needs.build.outputs.shortname }}
          path: ${{ runner.temp }}/provenance.jsonl
          if-no-files-found: error

  # Emit a signed SLSA Verification Summary Attestation (VSA) per dist artifact.
  # ampel evaluates the attest-build-provenance bundle against the
  # wrangle-provenance-python-v1 PolicySet (which binds wrangle's builder identity
  # and verifies the bundle's Sigstore signature — fail-closed) and bnd signs the
  # result keyless with this workflow's OIDC identity; a FAILED policy fails the
  # step (fail: true) and blocks the caller's publish via needs: propagation.
  # Provenance-only for now — SBOM/OSV tenets follow once those are produced as
  # signed attestations a registered identity covers.
  verify:
    if: ${{ needs.gate.outputs.should-release == 'true' }}
    needs: [guard, gate, build, attest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # bnd keyless-signs the VSA via this workflow's OIDC identity
      contents: write    # attach the VSA to the release on tag pushes
    strategy:
      fail-fast: false
      matrix:
        artifact: ${{ fromJSON(needs.build.outputs.dist-files) }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.dist-artifact-name }}
          path: dist/

      # The one multi-subject provenance bundle the attest job staged; each
      # matrix shard reads it and self-selects its own subject digest.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-provenance-bundle-${{ needs.build.outputs.shortname }}
          path: provenance/

      # TODO: replace with $/actions/verify when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/verify@15b64ecbe38ca59cd24964eb9403d428075ffa37 # main 2026-06-10
        with:
          subject: dist/${{ matrix.artifact }}
          policy: policies/wrangle-provenance-python-v1.hjson
          collector: jsonl:provenance/provenance.jsonl
          # resourceUri names the package the VSA covers (pkg:generic, matching
          # the policy harness — pypi purl normalization isn't load-bearing while
          # no consumer reads it). The subject digest is the cryptographic bind.
          context: buildPoint:git+https://github.com/${{ github.repository }},vsa.resourceUri:${{ needs.build.outputs.resource-uri }}
          artifact-name: ${{ matrix.artifact }}
          fail: "true"
