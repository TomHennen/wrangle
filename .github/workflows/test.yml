name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

# Cancel superseded PR runs; the run_id fallback keeps each main push in its own group (never cancelled).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The suite runs in a container whose GOCACHE/GOMODCACHE live under this
      # dir, so persisting it across runs spares the gotest layer from
      # rebuilding wrangle-attest's ~700MB module graph cold every run (#542).
      # Keyed on the test image's Go version (test/Dockerfile) + tools/go.sum.
      # Test-only: the suite produces no attested artifact, so this stays off
      # release builds' L3 cache-isolation surface (SPEC.md).
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/gocache
          key: gotest-${{ runner.os }}-${{ hashFiles('test/Dockerfile', 'tools/go.sum') }}
          restore-keys: gotest-${{ runner.os }}-

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Prebuild the test image with a GitHub Actions layer cache so the
      # ephemeral runner reuses the toolchain layers (Go, actionlint, …) instead
      # of redownloading them every run (#308). load makes the image available to
      # the docker run in test.sh, which skips its own build on the prebuilt env.
      # provenance/sbom off: this is a test tool that attests nothing, so its
      # cache stays off release builds' L3 cache-isolation surface (docs/SLSA_L3_AUDIT.md).
      - name: Prebuild test image (cached)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: test/Dockerfile
          tags: wrangle-test
          load: true
          push: false
          provenance: false
          sbom: false
          cache-from: type=gha,scope=wrangle-test
          cache-to: type=gha,mode=max,scope=wrangle-test

      - name: Run tests
        env:
          WRANGLE_GOCACHE_DIR: ${{ runner.temp }}/gocache
          WRANGLE_TEST_IMAGE_PREBUILT: "1"
        run: ./test.sh

  # Real keyless signing through the engine: the unit suite is hermetic
  # (local-key) and the dispatch e2e proves the full bnd-push + ampel round-trip,
  # so this job covers the one path neither does — that wrangle-attest --sign
  # produces a valid Fulcio/Rekor-backed Sigstore bundle with ambient GitHub
  # OIDC. Tag-gated so it never runs in the hermetic unit suite.
  keyless-attest:
    # Fork-PR runs are never issued OIDC tokens, and the test hard-fails
    # (not skips) without one — so gate to contexts that can mint the token.
    if: >-
      github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # mint the ambient OIDC token the keyless signer exchanges at Fulcio
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: tools/go.mod
          cache-dependency-path: tools/go.sum

      - name: Keyless sign integration test
        run: ./test/keyless_attest.sh

  # End-to-end exercise of the verify-vsa composite action itself (the
  # script's logic is bats-covered; this covers the composite wiring: ampel
  # running in the attest-toolbox container, the bundle artifact download by
  # pattern, and the verify step) against the real consumer fixtures —
  # including the fail-closed paths: tampered bytes and a wrong origin repo
  # must fail the action.
  verify-vsa-action:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # The checked-in VSA fixtures are release-tag-signed (captured from a curated
    # release showcase run), so this job verifies them against the shipped strict
    # default — exactly what an adopter's gate does.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The action reads the bundles from the run's workflow artifacts (now from
      # the unified <type>-metadata-<shortname> artifact), so stage the real
      # fixture VSA as a per-artifact <artifact>.intoto.jsonl under a *-metadata-*
      # name (a single-statement bundle is a valid one-line JSONL; ampel
      # self-selects by subject).
      - name: Stage the consumer fixtures
        run: |
          mkdir -p dist vsa-upload
          cp test/consumer/fixtures/npm-package.tgz dist/
          cp test/consumer/fixtures/npm-vsa.intoto.jsonl vsa-upload/npm-package.tgz.intoto.jsonl

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-metadata-fixture
          path: vsa-upload/npm-package.tgz.intoto.jsonl

      - name: Verify the fixture (expect pass)
        uses: ./actions/verify-vsa
        with:
          path: dist/
          resource-uri: pkg:npm/@tomhennen/wrangle-integration-fixture@0.0.1-dev.27500274491
          repo: TomHennen/wrangle-test

      - name: Tamper with the dist
        run: printf 'x' >> dist/npm-package.tgz

      # Identical to the passing step except for the tampered bytes, so the
      # digest mismatch is the only thing this can fail on.
      - name: Verify the tampered dist (expect failure)
        id: tampered
        continue-on-error: true  # negative test: the assert step below requires outcome == failure
        uses: ./actions/verify-vsa
        with:
          path: dist/
          resource-uri: pkg:npm/@tomhennen/wrangle-integration-fixture@0.0.1-dev.27500274491
          repo: TomHennen/wrangle-test

      - name: Assert the tampered verify failed
        env:
          OUTCOME: ${{ steps.tampered.outcome }}
        run: test "$OUTCOME" = "failure"

      - name: Restore the dist
        run: cp test/consumer/fixtures/npm-package.tgz dist/

      # Identical to the passing step except for the origin repo: the fixture
      # was built in TomHennen/wrangle-test, so an attacker's repo must fail.
      - name: Verify with a wrong origin repo (expect failure)
        id: wrongrepo
        continue-on-error: true  # negative test: the assert step below requires outcome == failure
        uses: ./actions/verify-vsa
        with:
          path: dist/
          resource-uri: pkg:npm/@tomhennen/wrangle-integration-fixture@0.0.1-dev.27500274491
          repo: attacker/evil

      - name: Assert the wrong-repo verify failed
        env:
          OUTCOME: ${{ steps.wrongrepo.outcome }}
        run: test "$OUTCOME" = "failure"

      # Identical to the passing step except for the resource URI: the VSA
      # names the fixture's purl, so a different package must fail.
      - name: Verify with a wrong resource URI (expect failure)
        id: wronguri
        continue-on-error: true  # negative test: the assert step below requires outcome == failure
        uses: ./actions/verify-vsa
        with:
          path: dist/
          resource-uri: pkg:npm/@attacker/evil@9.9.9
          repo: TomHennen/wrangle-test

      - name: Assert the wrong-resource-URI verify failed
        env:
          OUTCOME: ${{ steps.wronguri.outcome }}
        run: test "$OUTCOME" = "failure"
