name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run tests
        run: ./test.sh

  # End-to-end exercise of the verify-vsa composite action itself (the
  # script's logic is bats-covered; this covers the composite wiring: the
  # cosign install, the VSA artifact download by pattern, and the verify
  # step) against the real consumer fixtures — including the fail-closed
  # paths: tampered bytes and a wrong origin repo must fail the action.
  verify-vsa-action:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # The action reads VSAs from the run's workflow artifacts, so stage
      # the real fixture VSA under the name wrangle's verify job would use.
      - name: Stage the consumer fixtures
        run: |
          mkdir -p dist vsa-upload
          cp test/consumer/fixtures/npm-package.tgz dist/
          cp test/consumer/fixtures/npm-vsa.intoto.jsonl vsa-upload/npm-package.tgz.intoto.jsonl

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: npm-package.tgz.intoto.jsonl
          path: vsa-upload/npm-package.tgz.intoto.jsonl

      - name: Verify the fixture (expect pass)
        uses: ./actions/verify-vsa
        with:
          path: dist/
          repo: TomHennen/wrangle-test
          signer-workflow: TomHennen/wrangle/.github/workflows/build_and_publish_npm.yml

      - name: Tamper with the dist
        run: printf 'x' >> dist/npm-package.tgz

      - name: Verify the tampered dist (expect failure)
        id: tampered
        continue-on-error: true  # negative test: the assert step below requires outcome == failure
        uses: ./actions/verify-vsa
        with:
          path: dist/
          repo: TomHennen/wrangle-test

      - name: Assert the tampered verify failed
        env:
          OUTCOME: ${{ steps.tampered.outcome }}
        run: test "$OUTCOME" = "failure"

      - name: Restore the dist
        run: cp test/consumer/fixtures/npm-package.tgz dist/

      # The fixture was built in wrangle-test; binding any other repo must fail.
      - name: Verify with a wrong origin repo (expect failure)
        id: wrongrepo
        continue-on-error: true  # negative test: the assert step below requires outcome == failure
        uses: ./actions/verify-vsa
        with:
          path: dist/
          repo: TomHennen/wrangle

      - name: Assert the wrong-repo verify failed
        env:
          OUTCOME: ${{ steps.wrongrepo.outcome }}
        run: test "$OUTCOME" = "failure"

  # One job for everything that needs a real binary or network: osv-scanner
  # (e2e) and ampel/bnd (policy harness + run_verify). The Docker unit suite
  # above is hermetic; these need the real tools, so they share one checkout +
  # install rather than a job each. Each test fails (not skips) under CI when
  # its prerequisite is missing — see skip_or_fail.
  integration:
    name: integration (real binaries)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          # check_pin_ancestry needs full history to test reachability of pinned shas.
          fetch-depth: 0

      # Fail if any wrangle self-ref action pin is unreachable from HEAD — catches
      # a bootstrap pin (test/integration/SPEC.md §Known limitations) orphaned by a
      # squash merge before the auto-showcase tries to resolve it. Runs on the
      # runner (needs git + history), not in the Docker unit suite.
      - name: Check action pin ancestry
        run: ./tools/check_pin_ancestry.sh

      # Go version from tools/go.mod (single source of truth; matches actions/verify).
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/go.mod

      # slsa-verifier is required by tools/osv/install.sh — osv-scanner's sole
      # verification method is SLSA provenance.
      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      # cosign backs run_verify's `cosign attach attestation` arg-vector check —
      # the container VSA's registry push. Same pin as the container workflow.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install bats and jq
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends bats jq

      # Install osv-scanner and build ampel + bnd, using the env from lib/env.sh.
      - name: Install tools
        run: |
          source lib/env.sh
          ./tools/osv/install.sh
          GOBIN="$WRANGLE_BIN_DIR" go -C tools install tool
          printf '%s\n' "$WRANGLE_BIN_DIR" >> "$GITHUB_PATH"

      - name: Verify tools are on PATH
        run: |
          osv-scanner --version
          ampel version

      - name: osv-scanner e2e
        run: bats -f "osv e2e:" tools/osv/test.bats

      # Drift detector for the HJSON+CEL+context policies (docs/ampel_research.md
      # §5): ampel resolves the SHA-pinned upstream locators over github.com.
      - name: ampel policy harness
        run: bats policies/test.bats

      # ampel + bnd + cosign are on PATH, so run_verify's integration assertions
      # (including the cosign-attach arg-vector) run rather than skip.
      - name: verify-script tests
        run: bats actions/verify/test_run_verify.bats actions/verify/test_validate_verify_inputs.bats

      # Runs the documented consumer commands (cosign + ampel) against the real
      # checked-in VSA — the regression backstop for the consumer-verify docs.
      - name: consumer VSA-verify tests
        run: bats test/consumer/verify_consumer_vsa.bats
