name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run tests
        run: ./test.sh

  # Runs only the `osv e2e: ...` bats test against the real osv-scanner
  # binary installed via tools/osv/install.sh. Separated from the Docker
  # unit suite above so the unit container doesn't need network access
  # to osv.dev or a slsa-verifier binary baked in. Dogfoods install.sh
  # and the e2e assertion in one job — keeps the e2e from being a
  # silent skip everywhere (see PR #234 discussion).
  osv-e2e:
    name: osv-scanner e2e (real binary)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # slsa-verifier is required by tools/osv/install.sh — osv-scanner's
      # sole verification method is SLSA provenance.
      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Install bats and jq
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends bats jq

      - name: Install osv-scanner via tools/osv/install.sh
        env:
          WRANGLE_BIN_DIR: ${{ runner.temp }}/.wrangle/bin
        run: |
          ./tools/osv/install.sh
          printf '%s\n' "$WRANGLE_BIN_DIR" >> "$GITHUB_PATH"

      - name: Verify osv-scanner is on PATH
        run: osv-scanner --version

      # Run only the e2e test. The unit tests run in the Docker container
      # above and don't need the real binary. `tee` preserves the bats TAP
      # output for the post-step skip check.
      - name: Run osv e2e test
        run: |
          set -o pipefail
          bats --tap -f "osv e2e:" tools/osv/test.bats | tee /tmp/osv-e2e.tap

      # Fail loudly if the e2e test skipped. The e2e test contains
      # network-unreachability skip paths as a safety net for sandboxed
      # local dev; in CI we have network access and an installed binary,
      # so any skip here means the test silently degraded and must be
      # investigated — not ignored.
      - name: Reject silent skip
        run: |
          if grep -E '^ok [0-9]+ .* # skip' /tmp/osv-e2e.tap; then
              printf 'FATAL: osv e2e test was skipped in CI — install or network broken, or the assertion silently degraded\n' >&2
              exit 1
          fi

  # Dogfoods tools/ampel/install.sh against the real release on a runner with
  # network + sigstore reach. The Docker unit suite shims gh, so this job is
  # the only place ampel's live provenance check (gh attestation verify of the
  # attest-build-provenance sigstore bundle) actually runs: the scan action's
  # install step can't validate it pre-merge because the dogfooding self-ref
  # pin only bumps after merge (#136). gh is preinstalled on the runner.
  ampel-install:
    name: ampel install (real provenance verification)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install ampel via tools/ampel/install.sh
        env:
          WRANGLE_BIN_DIR: ${{ runner.temp }}/.wrangle/bin
          GH_TOKEN: ${{ github.token }}
        run: |
          ./tools/ampel/install.sh
          printf '%s\n' "$WRANGLE_BIN_DIR" >> "$GITHUB_PATH"

      # Proves the verified binary landed on PATH — install.sh only reaches
      # the final mv after gh attestation verify returns 0.
      - name: Verify ampel is on PATH
        run: ampel version

  # Runs the policy harness (policies/test.bats) against the real ampel binary.
  # It's an integration test, not a unit test: ampel resolves the SHA-pinned
  # upstream policy locators over github.com at verify time, so the offline
  # unit container (test.sh) can't run it. This is the drift detector for the
  # HJSON+CEL+context policies (docs/ampel_research.md §5).
  ampel-policies:
    name: ampel policies (real binary)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install bats and jq
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends bats jq

      - name: Install ampel via tools/ampel/install.sh
        env:
          WRANGLE_BIN_DIR: ${{ runner.temp }}/.wrangle/bin
          GH_TOKEN: ${{ github.token }}
        run: |
          ./tools/ampel/install.sh
          printf '%s\n' "$WRANGLE_BIN_DIR" >> "$GITHUB_PATH"

      - name: Run policy harness
        run: |
          set -o pipefail
          bats --tap policies/test.bats | tee /tmp/ampel-policies.tap

      # The harness skips locally when ampel or network is missing; in CI both
      # are present, so any skip means it silently degraded — fail loudly.
      - name: Reject silent skip
        run: |
          if grep -E '^ok [0-9]+ .* # skip' /tmp/ampel-policies.tap; then
              printf 'FATAL: ampel policy test skipped in CI — install or network broken\n' >&2
              exit 1
          fi

  # Smoke-tests the actions/verify composite end to end against a fixture:
  # wraps the upstream ampel verify, emits + signs the VSA (keyless OIDC),
  # renames it to the in-toto bundle filename, and uploads it. check-change
  # cannot dogfood this action pre-merge (the self-ref scan pin only bumps
  # after merge, #136), so this is its only pre-merge coverage.
  verify-action:
    name: verify action smoke (real VSA)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # keyless sigstore signing of the VSA
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Verify a good fixture and emit a VSA
        uses: ./actions/verify
        with:
          subject: "sha256:2b27ffb5258939a2700ecf4667a040192e717bfee6446dcad995563fed8a9c0a"
          policy: policies/wrangle-default-v1.hjson
          collector: jsonl:policies/testdata/good.bundle.jsonl
          artifact-name: wrangle-app-1.0.0.tgz
          context: "buildPoint:git+https://github.com/${{ github.repository }},vsa.resourceUri:pkg:generic/wrangle-app@1.0.0"
          attach-to-release: "false"

      # Assert a non-empty, well-formed VSA bundle landed. Signing integrity
      # itself rests on the upstream bnd step's exit code (it fails the action
      # on a signing error); a deeper decode of the signed DSSE payload is a
      # follow-up once the bundle shape is pinned.
      - name: VSA was produced
        run: |
          test -s wrangle-app-1.0.0.tgz.intoto.jsonl
          jq -e . wrangle-app-1.0.0.tgz.intoto.jsonl >/dev/null
