name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run tests
        run: ./test.sh

  # Runs only the `osv e2e: ...` bats test against the real osv-scanner
  # binary installed via tools/osv/install.sh. Separated from the Docker
  # unit suite above so the unit container doesn't need network access
  # to osv.dev or a slsa-verifier binary baked in. Dogfoods install.sh
  # and the e2e assertion in one job — keeps the e2e from being a
  # silent skip everywhere (see PR #234 discussion).
  osv-e2e:
    name: osv-scanner e2e (real binary)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # slsa-verifier is required by tools/osv/install.sh — osv-scanner's
      # sole verification method is SLSA provenance.
      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Install bats and jq
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends bats jq

      - name: Install osv-scanner via tools/osv/install.sh
        env:
          WRANGLE_BIN_DIR: ${{ runner.temp }}/.wrangle/bin
        run: |
          ./tools/osv/install.sh
          printf '%s\n' "$WRANGLE_BIN_DIR" >> "$GITHUB_PATH"

      - name: Verify osv-scanner is on PATH
        run: osv-scanner --version

      # Only the e2e test runs here; the unit tests run in the Docker container
      # above and don't need the real binary. The test's setup fails instead of
      # skipping when CI is set but the binary/network is missing, so a silent
      # degradation surfaces as a failure rather than a green skip.
      - name: Run osv e2e test
        run: bats -f "osv e2e:" tools/osv/test.bats

  # Runs the policy harness (policies/test.bats) against a real ampel binary
  # built from the tools/go.mod tool manifest — the same `go install` path
  # actions/verify uses, so this job also dogfoods that build. It's an
  # integration test, not a unit test: ampel resolves the SHA-pinned upstream
  # policy locators over github.com at verify time, so the offline unit
  # container (test.sh) can't run it. This is the drift detector for the
  # HJSON+CEL+context policies (docs/ampel_research.md §5).
  ampel-policies:
    name: ampel policies (real binary)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Go version is read from tools/go.mod, the single source of truth for
      # the ampel/bnd build (matches actions/verify).
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tools/go.mod

      - name: Install bats and jq
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q --no-install-recommends bats jq

      # Build ampel + bnd from the pinned tool manifest, exactly as
      # actions/verify does (go install from a canonical module path; build
      # integrity via go.sum + sum.golang.org).
      - name: Build ampel from tools/go.mod
        env:
          WRANGLE_BIN_DIR: ${{ runner.temp }}/.wrangle/bin
          # Set explicitly so the runner config can't disable sum-db verification.
          GOPROXY: https://proxy.golang.org,direct
          GOSUMDB: sum.golang.org
        run: |
          GOBIN="$WRANGLE_BIN_DIR" go -C tools install tool
          printf '%s\n' "$WRANGLE_BIN_DIR" >> "$GITHUB_PATH"

      - name: Verify ampel is on PATH
        run: ampel version

      # The harness setup fails instead of skipping when CI is set but ampel or
      # github.com is missing, so a silent degradation surfaces as a failure.
      - name: Run policy harness
        run: bats policies/test.bats

      # ampel + bnd are on PATH here, so run_verify.sh's integration assertions
      # (which discover the real binaries) actually execute rather than skip.
      - name: Run verify-script tests
        run: bats test/test_run_verify.bats
