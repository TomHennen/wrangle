name: Build Shell

# Wrangle dogfooding its own shell build type: source scan + shellcheck over
# the whole tree + every bats suite (unit and integration; real binaries +
# network, installed by the setup-script). Subsumes the standalone scan
# trigger — build_shell.yml embeds the same scan job.

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-shell:
    permissions:
      actions: read
      contents: read
      security-events: write
    # ./ resolves to this repo at the PR branch ref, so PR CI tests
    # the actual code in the PR (not main).
    uses: ./.github/workflows/build_shell.yml
    with:
      # bats-path is left empty on purpose: auto-detect runs EVERY .bats in
      # the tree — unit and integration suites alike — with their tool
      # dependencies installed by the setup script.
      setup-script: test/setup_integration.sh
      # Fan the bats suite out across the runner's cores (ubuntu-latest: 4).
      bats-jobs: "4"
      # Cache the Go tools built from source: go-tools-dir for the
      # setup-script's tools in the shell-build job. cache-setup-tools also
      # caches the linked tool binaries so they aren't relinked when go.sum
      # is stable.
      go-tools-dir: tools
      cache-setup-tools: enabled
    # The integration bats include the pull-time VSA gate's real-gh test
    # (test/image/test_verify_tool_image_real_gh.bats); gh needs a token to
    # read the public attestation. The job's own read-only token suffices.
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  # Wrangle-internal (self-ref pins are not an adopter concern, so this
  # lives in the dogfood caller, not the reusable build_shell.yml). Fails
  # if any wrangle self-ref pin is unreachable from HEAD — catches a
  # bootstrap pin (test/integration/SPEC.md §Known limitations) orphaned
  # by a squash merge before the auto-showcase tries to resolve it.
  pin-ancestry:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # check_pin_ancestry needs full history to test reachability of pinned shas.
          fetch-depth: 0

      - name: Check action pin ancestry
        run: ./tools/check_pin_ancestry.sh

      # Stale-but-reachable detection (#552): a pin can be an ancestor yet
      # resolve OLD action code. An action-change PR converges its own pins
      # in-PR (the merge commit keeps them reachable), so the chain is fresh
      # at merge.
      - name: Check action pin freshness
        run: ./tools/check_pin_freshness.sh

      # Static catalog hygiene (#596): every curated tool image is digest-pinned
      # on the wrangle namespace and capabilities are default-closed. Network-free,
      # so it runs every PR; the registry adoption-lag check is a release gate.
      - name: Validate tool catalog
        run: ./tools/check_catalog.sh
