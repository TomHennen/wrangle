name: "Build, test, and release a Go project with best practices."

# Build, attest, and release a Go project — reusable workflow.
#
# Builds your Go project with goreleaser, attests it (SLSA provenance +
# SBOM + scans, plus a signed VSA), and uploads the attested archives +
# checksums.txt + .intoto.jsonl bundles to the GitHub Release for the tag.
# wrangle creates the release if one doesn't exist yet.
#
# goreleaser runs with --skip=publish, so its own publishers (GitHub
# release, Docker, Homebrew, deb/rpm/snap, announce) are skipped — wrangle
# publishes only what it can attest. Run those from your own job if you
# need them. The job/permission split (adopter code never holds
# contents: write) is in build/actions/go/SPEC.md.

on:
  workflow_call:
    inputs:
      path:
        description: "Relative path to the directory containing go.mod and .goreleaser.yml"
        required: false
        type: string
        default: "."
      go-version:
        description: "Go version override. If empty, read from go.mod's `go` directive."
        required: false
        type: string
        default: ""
      run-tests:
        description: |
          Whether to run the `checks` job (gofmt/vet/test/govulncheck).
          Defaults to true. Setting false skips the checks job; the
          release job still runs but quality gates are unenforced.
          Adopters who want strict block-on-failure leave this true.
        required: false
        type: boolean
        default: true
      run-race-detector:
        description: |
          Whether `go test` runs with `-race`. Defaults to true. Set
          to false when CGO is disabled (race detector requires cgo).
        required: false
        type: boolean
        default: true
      run-gofmt-check:
        description: |
          Whether to run `gofmt -l` before the build. Defaults to true.
          Files with `// Code generated ... DO NOT EDIT.` headers are
          auto-skipped; set false only when that convention doesn't
          cover the adopter's generators.
        required: false
        type: boolean
        default: true
      release-events:
        description: |
          Which events should trigger wrangle's full pipeline (build,
          tests, SBOM, provenance). One of:
            - tag-only (default): push to refs/tags/* only.
            - non-pull-request: every event except pull_request* (runs
              the pipeline on main pushes too, in --snapshot mode).
            - main-and-tags: push to refs/heads/main or refs/tags/*.
            - <comma-separated event_name list>: matches if
              github.event_name is in the list. See
              actions/prep/release_gate.sh for full vocabulary.

          wrangle uploads attested artifacts only on TAG PUSHES (it
          attaches to the tag's release, creating it if absent). The default
          `tag-only` is therefore also the cheapest setting — the
          pipeline runs only when it would do something meaningful. Use
          `non-pull-request` or `main-and-tags` for early failure
          detection on non-tag events (at the cost of a snapshot
          goreleaser run on every matching push).
        required: false
        type: string
        default: tag-only
      ref:
        description: |
          Git ref to check out. If empty (default), uses
          the triggering commit SHA (github.sha) — which is what
          almost every adopter wants. Pass `github.ref` for the rare
          case where an earlier job in the same workflow run has
          pushed a commit that the build should pick up.
        required: false
        type: string
        default: ""
      install-zig:
        description: |
          When true, install zig (via mlugg/setup-zig) before goreleaser
          runs. Set true when your .goreleaser.yml uses CGO_ENABLED=1
          with multi-arch / multi-OS targets — see
          build/actions/go/README.md "Cross-compiling with cgo."
          Default false: most projects don't need cgo cross-compile,
          and skipping the install saves ~20-30s + ~50MB.
        required: false
        type: boolean
        default: false
      scan-tools:
        description: |
          Space-separated source-scan tools (suffix :info for
          non-blocking). A load-bearing (:fail) finding blocks the
          release. Empty string disables scanning.
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review wrangle-lint"
      policy:
        description: |
          wrangle PolicySet the release is verified against (path under
          policies/ or an ampel locator). Default wrangle-default-go-v1
          requires provenance + SBOM + clean osv/zizmor/wrangle-lint scans;
          adopters who drop any of those from scan-tools must pass a lighter
          policy (e.g. policies/wrangle-provenance-go-v1.hjson).
        required: false
        type: string
        default: policies/wrangle-default-go-v1.hjson
      sbom-tool:
        description: "Wrangle's default SBOM tool, or one you define yourself in `.wrangle/tools.json`."
        required: false
        type: string
        default: sbom
      attest-and-verify:
        description: |
          enabled (default): sign and verify SLSA provenance + a VSA for the
          release. disabled: publish the release unattested (tests and scans
          still gate it) — use on private repos, which can't attest (#600).
        required: false
        type: string
        default: enabled
    outputs:
      hashes:
        description: "Base64-encoded SHA-256 hashes of built artifacts (for SLSA provenance)"
        value: ${{ jobs.release.outputs.hashes }}
      version:
        description: "The release version (tag) goreleaser used, or 'snapshot' for non-tag builds"
        value: ${{ jobs.release.outputs.version }}
      dist-artifact-name:
        description: "Name of the uploaded dist/ artifact (download with this name to retrieve binaries + checksums.txt)"
        value: ${{ jobs.prep.outputs.dist }}
      metadata-artifact-name:
        description: "Name of the unified metadata workflow artifact. Format: `go-metadata[-<shortname>]`. Contents and layout: docs/metadata_layout.md."
        value: ${{ jobs.prep.outputs.metadata }}
      should-release:
        description: |
          "true" if the current event matches release-events; "false"
          otherwise. Wrangle gates the attest and verify jobs on this internally.
        value: ${{ jobs.prep.outputs.should-release }}

jobs:
  # MUST stay first under `jobs:`: prep's guard refuses unsafe triggers
  # before any other job runs, and every job `needs: [prep]`. prep also
  # decides should-release and derives the shared package names.
  # docs/SPEC.md#trigger-model.
  prep:
    runs-on: ubuntu-latest
    permissions: {}    # guard/gate/names read env only — no workspace, no API, no secrets
    outputs:
      should-release: ${{ steps.prep.outputs.should-release }}
      should-attest: ${{ steps.prep.outputs.should-attest }}
      shortname: ${{ steps.prep.outputs.shortname }}
      dist: ${{ steps.prep.outputs.dist }}
      scan: ${{ steps.prep.outputs.scan }}
      checks: ${{ steps.prep.outputs.checks }}
      metadata: ${{ steps.prep.outputs.metadata }}
      metadata-pre: ${{ steps.prep.outputs.metadata-pre }}
    steps:
      # TODO: replace with $/actions/prep when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/prep@4c787f006ad44e642a91df79683b713125d78a57 # feat/482-vsa-sign-verify-flip 2026-07-12
        id: prep
        with:
          build-type: go
          path: ${{ inputs.path }}
          release-events: ${{ inputs.release-events }}
          attest-and-verify: ${{ inputs.attest-and-verify }}

  # Source scan. A load-bearing (:fail) finding fails this job, which
  # blocks the release on release events (see release.if) — decoupled
  # scan/build runs can't gate publish.
  scan:
    needs: [prep]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/scan@4c787f006ad44e642a91df79683b713125d78a57 # feat/482-vsa-sign-verify-flip 2026-07-12
        if: ${{ inputs.scan-tools != '' }}
        with:
          checkout: "true"
          ref: ${{ inputs.ref || '' }}
          tools: ${{ inputs.scan-tools }}
          # The release job folds this into the unified go-metadata.
          artifact-name: ${{ needs.prep.outputs.scan }}
          retention-days: 1

  # Quality gates with `contents: read` only. `go test` executes
  # arbitrary adopter test code; the minimum-permissions posture
  # denies it any write capability against the repo.
  checks:
    if: ${{ inputs.run-tests }}
    needs: [prep]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # Internal transient: the release job folds govulncheck.json into the
      # unified go-metadata under scan/govulncheck/.
      checks-artifact-name: ${{ needs.prep.outputs.checks }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || '' }}

      # TODO: replace with $/build/actions/go/checks when GitHub ships $/ syntax (#136)
      # Self-pinned to PR HEAD until merge — bump-self-refs follow-up
      # repoints to the squashed merge SHA after this lands.
      - uses: TomHennen/wrangle/build/actions/go/checks@4c787f006ad44e642a91df79683b713125d78a57 # feat/482-vsa-sign-verify-flip 2026-07-12
        id: checks
        with:
          path: ${{ inputs.path }}
          go-version: ${{ inputs.go-version }}
          run-race-detector: ${{ inputs.run-race-detector }}
          run-gofmt-check: ${{ inputs.run-gofmt-check }}
          # Caches are disabled on release builds (the same `should-release`
          # signal that gates the attest/verify jobs) — Go's build cache trusts pre-
          # derived compiled output without re-derivation (same shape as
          # the uv-cache L3 gap). PR builds keep caching for fast
          # iteration; no provenance is produced.
          cache: ${{ needs.prep.outputs.should-release == 'true' && 'disabled' || 'enabled' }}

      # Transient handoff to the release job, which folds govulncheck.json into
      # the unified metadata under scan/govulncheck/.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.prep.outputs.checks }}
          path: ${{ steps.checks.outputs.metadata-dir }}/
          if-no-files-found: warn   # govulncheck JSON is informational; not having it is OK
          retention-days: 1

  # Goreleaser invocation (--skip=publish) + SBOM + hash. contents: read
  # because goreleaser publishes nothing — it only builds dist/, which is
  # handed to the verify job as a workflow artifact. Sequenced after
  # `checks` so quality gates have already passed.
  #
  # The `if:` is load-bearing for the run-tests: false path. With
  # `if: ${{ inputs.run-tests }}` on the checks job, run-tests: false
  # SKIPS checks. By default, a job whose needed-job is *skipped*
  # (not failed) also skips — so without this explicit if:, setting
  # run-tests: false would cascade through release/provenance/verify
  # and nothing would build. Documented behavior is "checks skipped,
  # release proceeds with quality gates unenforced," so allow skipped
  # explicitly. A failed prep still blocks release.
  release:
    needs: [prep, checks, scan]
    if: >
      always() && !cancelled() &&
      needs.prep.result == 'success' &&
      (needs.checks.result == 'success' || needs.checks.result == 'skipped') &&
      (needs.scan.result == 'success' || needs.prep.outputs.should-release != 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read     # goreleaser runs --skip=publish; it writes nothing to the repo
    outputs:
      hashes: ${{ steps.release.outputs.hashes }}
      version: ${{ steps.release.outputs.version }}
      module: ${{ steps.module.outputs.module }}
      metadata-dir: ${{ steps.release.outputs.metadata-dir }}
      # JSON array of dist filenames the verify job binds one VSA to each.
      dist-files: ${{ steps.distfiles.outputs.files }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-tags: true       # goreleaser reads tags for version resolution
          fetch-depth: 0         # goreleaser reads recent commit history
          ref: ${{ inputs.ref || '' }}

      # TODO: replace with $/build/actions/go/build when GitHub ships $/ syntax (#136)
      # Self-pinned to PR HEAD until merge.
      - uses: TomHennen/wrangle/build/actions/go/build@4c787f006ad44e642a91df79683b713125d78a57 # feat/482-vsa-sign-verify-flip 2026-07-12
        id: release
        with:
          path: ${{ inputs.path }}
          go-version: ${{ inputs.go-version }}
          cache: ${{ needs.prep.outputs.should-release == 'true' && 'disabled' || 'enabled' }}
          install-zig: ${{ inputs.install-zig }}
          sbom-tool: ${{ inputs.sbom-tool }}

      # The module path is the VSA resourceUri purl namespace; read it from the
      # toolchain. head -n1 keeps a go.work workspace (multiple modules) from
      # writing a multi-line, malformed GITHUB_OUTPUT value.
      - id: module
        shell: bash
        env:
          INPUT_PATH: ${{ inputs.path }}
        run: |
          set -euo pipefail
          printf 'module=%s\n' "$(go -C "$INPUT_PATH" list -m | head -n1)" >> "$GITHUB_OUTPUT"

      # Emit the dist filenames as a JSON array; the verify job binds one VSA per file.
      # Derived from the build's base64 `hashes` output (the "<sha256>  <name>" lines the
      # provenance covers, from dist/checksums.txt), reduced to basenames.
      - id: distfiles
        shell: bash
        env:
          HASHES: ${{ steps.release.outputs.hashes }}
        run: |
          set -euo pipefail
          files="$(printf '%s' "$HASHES" | base64 -d | awk '{ sub(/^.*\//, "", $2); print $2 }' | jq -R . | jq -cs .)"
          # Fail closed: an empty array leaves the verify job with no subject to
          # bind a VSA to, silently dropping the release-gating verification.
          # Never let the gate collapse silently.
          if [[ "$files" == "[]" ]]; then
              printf 'no dist files to attest — refusing to emit a VSA-less bundle\n' >&2
              exit 1
          fi
          printf 'files=%s\n' "$files" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.prep.outputs.dist }}
          path: ${{ inputs.path }}/dist/
          if-no-files-found: error

      # Fold the untrusted scan job's output into the metadata dir as inert data.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ inputs.scan-tools != '' }}
        continue-on-error: true   # scan upload is best-effort
        with:
          name: ${{ needs.prep.outputs.scan }}
          path: ${{ steps.release.outputs.metadata-dir }}/scan/

      # Fold govulncheck.json (from the checks job) into scan/govulncheck/.
      # Best-effort: the checks job is skipped when run-tests is false.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ inputs.run-tests }}
        continue-on-error: true
        with:
          name: ${{ needs.prep.outputs.checks }}
          path: ${{ steps.release.outputs.metadata-dir }}/scan/govulncheck/

      # On an attested release the verify job appends the signed bundle and owns
      # the final metadata upload; otherwise (non-release or unattested) this
      # sbom + scan/ is itself the final metadata artifact.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.prep.outputs.should-attest == 'true' && needs.prep.outputs.metadata-pre || needs.prep.outputs.metadata }}
          path: ${{ steps.release.outputs.metadata-dir }}/
          if-no-files-found: error

  # Generate SLSA L3 build provenance via GitHub's attestation API, naming THIS
  # reusable workflow as builder.id (its job_workflow_ref) and the Sigstore
  # signing identity, then sign the SBOM + scan/v1 metadata over the built dist
  # and post it to the attestation store — persisted independent of the verdict
  attest:
    if: ${{ needs.prep.outputs.should-attest == 'true' }}
    needs: [prep, release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC for Sigstore keyless signing
      attestations: write   # write the attestation to GitHub's store
      contents: read        # download-artifact reads the same-run dist
    outputs:
      bundles-artifact-name: ${{ steps.attest.outputs.bundles-artifact-name }}
    steps:
      # Subjects come from dist/checksums.txt, not a dist/* glob: goreleaser
      # writes non-artifact bookkeeping into dist/ that is not released. This is
      # the same canonical subject set the VSA binds to.
      # TODO: replace with $/actions/attest_provenance when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/attest_provenance@4c787f006ad44e642a91df79683b713125d78a57 # feat/482-vsa-sign-verify-flip 2026-07-12
        id: attest
        with:
          build-type: go
          shortname: ${{ needs.prep.outputs.shortname }}
          subject-checksums: dist/checksums.txt

  # Emit one signed SLSA Verification Summary Attestation (VSA) per dist archive
  # and append it to the SLSA provenance, producing one per-artifact
  # <archive>.intoto.jsonl bundle consumers fetch. wrangle-attest signs each VSA keyless with
  # this workflow's OIDC identity. fail: true blocks the publish job (which needs
  # verify), so a failed policy means the bytes are never uploaded.
  verify:
    if: ${{ needs.prep.outputs.should-attest == 'true' }}
    needs: [prep, release, attest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # wrangle-attest keyless-signs each VSA via this workflow's OIDC identity
      attestations: write   # post each VSA to the GitHub attestation store
    steps:
      # TODO: replace with $/actions/verify_release when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/verify_release@4c787f006ad44e642a91df79683b713125d78a57 # feat/482-vsa-sign-verify-flip 2026-07-12
        with:
          build-type: go
          shortname: ${{ needs.prep.outputs.shortname }}
          dist-files: ${{ needs.release.outputs.dist-files }}
          policy: ${{ inputs.policy }}
          # No extra collector input: the attest-assembled bundle is fed to ampel as the jsonl collector; only container adds an oci: collector.
          # resourceUri is the golang module purl consumers pin when verifying;
          # each subject digest is the cryptographic bind.
          context: buildPoint:git+https://github.com/${{ github.repository }},vsa.resourceUri:pkg:golang/${{ needs.release.outputs.module }}@${{ needs.release.outputs.version }}

  # Least-privileged publish: sole contents:write job, no signing scopes, no
  # adopter code (goreleaser's publishers stay off). The if: gates publish on
  # verify success; unattested mode skips verify, so should-attest guards that escape.
  publish:
    if: >
      always() && !cancelled() &&
      needs.prep.outputs.should-release == 'true' &&
      needs.release.result == 'success' &&
      (needs.prep.outputs.should-attest != 'true' || needs.verify.result == 'success')
    needs: [prep, release, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release if absent and upload the asset set
    steps:
      # TODO: replace with $/actions/publish_release when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/publish_release@4c787f006ad44e642a91df79683b713125d78a57 # feat/482-vsa-sign-verify-flip 2026-07-12
        with:
          build-type: go
          shortname: ${{ needs.prep.outputs.shortname }}
          attest-and-verify: ${{ inputs.attest-and-verify }}
