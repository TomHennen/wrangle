name: "Build, test, and release a Go project with best practices."

# Build + SLSA provenance reusable workflow for Go.
#
# Goreleaser owns its native publish: on tag pushes it creates the
# GitHub Release, attaches archives + checksums, and runs whatever
# downstream verbs the adopter's .goreleaser.yml configures (Docker
# pushes, Homebrew taps, deb/rpm/snap, announce, etc.). The SLSA
# generator's upload-assets job appends the provenance file shortly
# after. This is "publish first, attest second" — same shape as
# wrangle's container build type (docker push, then provenance), with
# the same small content-addressable-hash window between the two.
#
# Wrangle does NOT force goreleaser into --skip=publish: doing so
# would neuter every downstream goreleaser feature, which is most of
# why adopters reach for goreleaser in the first place.
#
# This means there is no caller-bound publish job here (unlike python
# and npm, which have PyPI/npm Trusted Publishing's caller-bound OIDC
# constraint). A single `uses:` line is the full integration.

on:
  workflow_call:
    inputs:
      path:
        description: "Relative path to the directory containing go.mod and .goreleaser.yml"
        required: false
        type: string
        default: "."
      go-version:
        description: "Go version override. If empty, read from go.mod's `go` directive."
        required: false
        type: string
        default: ""
      run-tests:
        description: "Whether to run gofmt/vet/test/govulncheck before the build"
        required: false
        type: boolean
        default: true
      run-race-detector:
        description: |
          Whether `go test` runs with `-race`. Defaults to true. Set
          to false when CGO is disabled (race detector requires cgo).
        required: false
        type: boolean
        default: true
      run-gofmt-check:
        description: |
          Whether to run `gofmt -l` before the build. Defaults to
          true. Files with `// Code generated ... DO NOT EDIT.`
          headers are auto-skipped; set to false only when that
          convention isn't enough.
        required: false
        type: boolean
        default: true
      release-events:
        description: |
          Which events should trigger release-time actions (SLSA provenance,
          verification, publish). One of:
            - non-pull-request (default): every event except pull_request*.
            - tag-only: push to refs/tags/* only.
            - main-and-tags: push to refs/heads/main or refs/tags/*.
            - <comma-separated event_name list>: matches if github.event_name
              is in the list. See actions/release_gate for full vocabulary.
        required: false
        type: string
        default: non-pull-request
      ref:
        description: |
          Git ref to check out for the build. If empty (default), uses
          the triggering commit SHA (github.sha) — which is what almost
          every adopter wants. Pass `github.ref` for the rare case where
          an earlier job in the same workflow run has pushed a commit
          that the build should pick up.
        required: false
        type: string
        default: ""
      verify-provenance:
        description: |
          When true (default), wrangle runs `slsa-verifier verify-artifact`
          against the just-built dist before publishing. If verification
          fails, the workflow fails and the publish job is blocked via
          standard `needs:` propagation, so a tampered dist between
          build and publish cannot reach a GitHub Release. Set to false
          to skip wrangle's verification (e.g., adopters with a custom
          verification flow).
        required: false
        type: boolean
        default: true
    outputs:
      hashes:
        description: "Base64-encoded SHA-256 hashes of built artifacts (for SLSA provenance)"
        value: ${{ jobs.build.outputs.hashes }}
      version:
        description: "The release version (tag) goreleaser used, or 'snapshot' for non-tag builds"
        value: ${{ jobs.build.outputs.version }}
      dist-artifact-name:
        description: "Name of the uploaded dist/ artifact (download with this name to retrieve binaries + checksums.txt)"
        value: ${{ jobs.build.outputs.dist-artifact-name }}
      provenance-artifact-name:
        description: "Name of the SLSA provenance workflow artifact (= the provenance filename). Empty when should-release is false."
        value: ${{ jobs.provenance.outputs.provenance-name }}
      metadata-artifact-name:
        description: "Name of the workflow artifact (a zip of `metadata/go/<shortname>/`'s contents) containing the SBOM and govulncheck output. Format: `go-metadata-<shortname>`."
        value: ${{ jobs.build.outputs.metadata-artifact-name }}
      should-release:
        description: |
          "true" if the current event matches release-events; "false"
          otherwise. Wrangle gates provenance + publish on this internally.
        value: ${{ jobs.gate.outputs.should-release }}

jobs:
  # Refuse trigger patterns known to expose this workflow to supply-chain
  # attack classes (pull_request_target, workflow_run via pull_request_target).
  # The guard MUST stay first under `jobs:`; every other job lists `guard`
  # in its `needs:` so a refused invocation skips the entire workflow.
  # Full trigger contract: docs/SPEC.md#trigger-model.
  guard:
    runs-on: ubuntu-latest
    permissions: {}    # reads env only — no workspace, no API, no secrets
    steps:
      # TODO: replace with $/actions/preflight_guard when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/preflight_guard@2510122c14f8503a43c6fef5e88394d29af43d1d # main 2026-05-23

  gate:
    needs: [guard]
    runs-on: ubuntu-latest
    permissions: {}    # release_gate reads only env; no workspace, no API
    outputs:
      should-release: ${{ steps.gate.outputs.should-release }}
    steps:
      # TODO: replace with $/actions/release_gate when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/release_gate@2510122c14f8503a43c6fef5e88394d29af43d1d # main 2026-05-23
        id: gate
        with:
          events: ${{ inputs.release-events }}

  build:
    # needs `gate` so the build can read should-release and disable the
    # Go module/build caches for release builds (SLSA L3 isolation — see
    # the `cache:` input on the composite action and the cache analysis
    # in build/actions/go/SPEC.md "Cache isolation").
    needs: [guard, gate]
    runs-on: ubuntu-latest
    permissions:
      # contents: write — goreleaser publishes to GitHub Releases inline
      # on tag pushes (creates the release, uploads archives + checksums,
      # runs adopter-configured downstream verbs). On non-tag events the
      # composite passes --snapshot --skip=publish so this permission is
      # unused, but it must be granted at workflow startup either way.
      contents: write
    outputs:
      hashes: ${{ steps.build.outputs.hashes }}
      version: ${{ steps.build.outputs.version }}
      shortname: ${{ steps.build.outputs.shortname }}
      dist-artifact-name: ${{ steps.names.outputs.dist }}
      metadata-artifact-name: ${{ steps.names.outputs.metadata }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-tags: true       # goreleaser needs tag visibility for version resolution
          fetch-depth: 0         # goreleaser also reads recent commit history
          ref: ${{ inputs.ref || '' }}

      # TODO: replace with $/build/actions/go when GitHub ships $/ syntax (#136)
      # Self-pinned to PR HEAD until merge (composite action and reusable
      # workflow update together per CLAUDE.md "Action Reference Pinning").
      # A follow-up "Bump self-ref pins" PR repoints to the squashed merge
      # SHA after this lands, matching #227 / #233.
      - uses: TomHennen/wrangle/build/actions/go@75e9e50887c988fff5ba1bf4b775ebfc55327bc1 # PR #238 HEAD before this revision; bump-self-refs follow-up updates after merge
        id: build
        with:
          path: ${{ inputs.path }}
          go-version: ${{ inputs.go-version }}
          run-tests: ${{ inputs.run-tests }}
          run-race-detector: ${{ inputs.run-race-detector }}
          run-gofmt-check: ${{ inputs.run-gofmt-check }}
          # Disable the Go module + build caches on release builds.
          # should-release == 'true' means this event produces L3
          # provenance, so the build must not consume a shared
          # cross-build cache — Go's build cache trusts pre-derived
          # compiled output without re-derivation (same shape as the
          # uv-cache L3 gap). See the composite action's `cache:` input
          # docstring for the full reasoning. PR builds keep the cache
          # for fast iteration; they produce no provenance.
          cache: ${{ needs.gate.outputs.should-release == 'true' && 'disabled' || 'enabled' }}

      # Namespace artifact names by the path-derived shortname so
      # multiple Go builds in one workflow don't collide.
      - id: names
        shell: bash
        env:
          SHORTNAME: ${{ steps.build.outputs.shortname }}
        run: |
          set -euo pipefail
          printf 'dist=go-dist-%s\n' "$SHORTNAME" >> "$GITHUB_OUTPUT"
          printf 'metadata=go-metadata-%s\n' "$SHORTNAME" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.names.outputs.dist }}
          path: ${{ inputs.path }}/dist/
          if-no-files-found: error

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.names.outputs.metadata }}
          path: ${{ steps.build.outputs.metadata-dir }}/
          if-no-files-found: error

  # Generate SLSA L3 provenance for the built artifacts. The generator
  # runs in an isolated reusable workflow that the caller cannot tamper
  # with — this is what makes the provenance non-falsifiable. Gated on
  # the release-events input.
  #
  # upload-assets is true on tag pushes: goreleaser has already created
  # the GitHub Release in the build job (publishing inline is its
  # native behavior), and the SLSA generator appends the provenance
  # file to that release shortly after. The small window between
  # goreleaser's publish and this attestation is acceptable — the
  # provenance attests content-addressed hashes that don't change, and
  # any consumer that downloads in the window can verify once the
  # attestation lands.
  provenance:
    if: ${{ needs.gate.outputs.should-release == 'true' }}
    needs: [guard, gate, build]
    permissions:
      actions: read    # detect the GitHub Actions environment
      id-token: write  # OIDC for Sigstore signing
      contents: write  # required by generator's upload-assets job
    # MUST use tag, not SHA — the SLSA generator validates its own invocation
    # ref. See https://github.com/TomHennen/wrangle/issues/147
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses] tag required by SLSA generator's OIDC verification
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      provenance-name: go-${{ needs.build.outputs.shortname }}.intoto.jsonl
      upload-assets: ${{ startsWith(github.ref, 'refs/tags/') }}

  # Verify the just-built dist matches the just-generated provenance.
  # Runs AFTER goreleaser's inline publish; the artifacts are already
  # live on the GitHub Release at this point — but the provenance
  # attests content-addressed hashes, so verification still works the
  # same way it would pre-publish. A failure here surfaces loudly in
  # CI even if the bad bytes have already been uploaded; in practice
  # it would mean the SLSA generator's hashes don't match the bytes
  # wrangle handed it, which is a tooling regression worth flagging.
  # Same shape as the container build type's `verify-image` step.
  verify:
    if: ${{ needs.gate.outputs.should-release == 'true' && inputs.verify-provenance }}
    needs: [guard, gate, build, provenance]
    runs-on: ubuntu-latest
    permissions: {}    # default token; download-artifact reads same-run artifacts
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build.outputs.dist-artifact-name }}
          path: dist/

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: provenance/

      - uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Verify SLSA provenance
        env:
          SOURCE_URI: github.com/${{ github.repository }}
          PROVENANCE_NAME: ${{ needs.provenance.outputs.provenance-name }}
        run: |
          set -euo pipefail
          # Build the verification list FROM dist/checksums.txt, not
          # by globbing dist/. Goreleaser writes several metadata
          # files alongside the artifacts (artifacts.json, config.yaml,
          # metadata.json) that aren't listed in checksums.txt and
          # aren't provenance subjects — globbing dist/ would include
          # them and slsa-verifier would fail with "artifact hash does
          # not match provenance subject". checksums.txt is the
          # authoritative subject list (it's what wrangle's hash step
          # base64-encoded for the SLSA generator), so parse it.
          #
          # Each line is `<sha256>  <filename>` (two-space separator
          # per sha256sum's default). awk grabs $2..end joined with
          # space to be defensive against filenames with spaces — the
          # tar.gz names goreleaser produces don't contain spaces but
          # belt-and-braces.
          mapfile -t artifacts < <(
              awk '{ $1=""; sub(/^ +/, ""); print "dist/" $0 }' dist/checksums.txt
          )
          if (( ${#artifacts[@]} == 0 )); then
              printf 'Error: dist/checksums.txt is empty; nothing to verify\n' >&2
              exit 1
          fi
          slsa-verifier verify-artifact \
              --provenance-path "provenance/${PROVENANCE_NAME}" \
              --source-uri "$SOURCE_URI" \
              "${artifacts[@]}"
