name: publish osv tool image

# Build, publish, and attest wrangle's osv-scanner tool image from
# tools/osv/Dockerfile. The Dockerfile builds osv-scanner from tools/go.mod and
# bundles the osv adapter (which reads lib/sanitize.sh), so it needs the repo
# root as the build context — supplied via the `dockerfile` input (#596).
# See docs/tool_container_design.md.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - tools/osv/Dockerfile
      - tools/osv/adapter.sh
      - tools/osv/render_md.sh
      - tools/go.mod
      - tools/go.sum
      - lib/sanitize.sh

permissions: {}

jobs:
  publish-osv:
    permissions:
      contents: read          # checkout + source scan
      id-token: write         # OIDC for keyless Cosign signing
      packages: write         # push image + provenance to GHCR
      attestations: write     # GitHub-issued SLSA provenance
      actions: read           # source scan reads the Actions API
      security-events: write  # source-scan SARIF -> Security tab
    uses: ./.github/workflows/build_and_publish_container.yml
    with:
      path: tools/osv
      dockerfile: tools/osv/Dockerfile
      imagename: ghcr.io/tomhennen/wrangle/osv
      registry: ghcr.io
      release-events: main-and-tags
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
