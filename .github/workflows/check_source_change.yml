name: Check Change

on:
  workflow_call:
    inputs:
      tools:
        description: "Space-separated list of tools to run (suffix :info for informational)"
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review wrangle-lint"
      go-cache:
        description: >
          Set to "enabled" to cache the Go module + build caches the
          scan tools build from source (osv-scanner et al. — #343).
          Default off: the cache is ~1.5–3 GB against this repo's
          Actions cache quota. Source scanning produces no provenance,
          so caching is L3-safe here regardless.
        required: false
        type: string
        default: ""

jobs:
  # Refuse trigger patterns known to expose this workflow to supply-chain
  # attack classes (pull_request_target, workflow_run via pull_request_target).
  # The guard MUST stay first under `jobs:`; every other job lists `guard`
  # in its `needs:` so a refused invocation skips the entire workflow.
  # Full trigger contract: docs/SPEC.md#trigger-model.
  guard:
    runs-on: ubuntu-latest
    permissions: {}    # reads env only — no workspace, no API, no secrets
    steps:
      # TODO: replace with $/actions/preflight_guard when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/preflight_guard@b7eb9765639f6ffaf11e994efb63b810d69ff53f # main 2026-06-16

  check-change:
    needs: [guard]
    permissions:
      actions: read
      contents: read
      security-events: write # SARIF upload to Security tab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The scan action runs adapter-pattern tools (via run.sh) and
      # action-pattern tools (zizmor, scorecard) via uses: internally.
      # Standalone scan: there is no build to fold into, so the artifact is
      # the consumer-facing scan-<sn>. This workflow scans the whole repo
      # (root path), so <sn> normalizes to "_".
      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - name: Source scan
        uses: TomHennen/wrangle/actions/scan@fe07882c487bb44d97414c828a5a94acf1016351 # bootstrap PR-head until merge (#469)
        with:
          tools: ${{ inputs.tools }}
          artifact-name: scan-_
          go-cache: ${{ inputs.go-cache }}
