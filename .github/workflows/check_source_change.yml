name: Check Change

on:
  workflow_call:
    inputs:
      tools:
        description: "Space-separated list of adapter-pattern tools to run"
        required: false
        type: string
        default: "osv"
      project-type:
        description: "Project type for testing/linting (shell, container, or auto)"
        required: false
        type: string
        default: "auto"

jobs:
  check-change:
    permissions:
      actions: read
      contents: read
      security-events: write # SARIF upload to Security tab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Security scanning: vulnerabilities, workflow linting, supply chain
      # TODO(PR 14): Pin to release tag @v0.1.0 — @main is temporary
      - name: Source scan
        uses: tomhennen/wrangle/actions/scan@main
        with:
          tools: ${{ inputs.tools }}

      # Project testing/linting: detect project type and run appropriate checks
      # TODO(PR 14): Pin to release tag @v0.1.0
      - name: Shell tests
        if: always()
        uses: tomhennen/wrangle/build/actions/shell@main
