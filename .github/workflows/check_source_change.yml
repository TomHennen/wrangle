name: Check Change

on:
  workflow_call:
    inputs:
      tools:
        description: "Space-separated list of tools to run (suffix :info for informational)"
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review"
      dependency-review-fail-on-severity:
        description: "dependency-review severity threshold: low, moderate, high, or critical"
        required: false
        type: string
        default: "high"
      dependency-review-comment-summary-in-pr:
        description: "dependency-review PR comment mode: never, on-failure, or always (on-failure/always need pull-requests: write)"
        required: false
        type: string
        default: "never"

jobs:
  check-change:
    permissions:
      actions: read
      contents: read
      security-events: write # SARIF upload to Security tab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # The scan action runs adapter-pattern tools (via run.sh) and
      # action-pattern tools (zizmor, scorecard) via uses: internally.
      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - name: Source scan
        uses: TomHennen/wrangle/actions/scan@075238e9d9dc8b1548912e4b387d243674f47abf # claude/address-issue-209-X3JeP 2026-05-15
        with:
          tools: ${{ inputs.tools }}
          dependency-review-fail-on-severity: ${{ inputs.dependency-review-fail-on-severity }}
          dependency-review-comment-summary-in-pr: ${{ inputs.dependency-review-comment-summary-in-pr }}
