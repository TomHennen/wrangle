name: Check Change

on:
  workflow_call:
    inputs:
      tools:
        description: "Space-separated list of tools to run (suffix :info for informational)"
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review wrangle-lint"

jobs:
  # MUST stay first under `jobs:`: prep's guard refuses unsafe triggers
  # before any other job runs, and every job `needs: [prep]`. No build-type,
  # so prep is guard-only (no release gate, no names). docs/SPEC.md#trigger-model.
  prep:
    runs-on: ubuntu-latest
    permissions: {}    # guard reads env only — no workspace, no API, no secrets
    steps:
      # TODO: replace with $/actions/prep when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/prep@1b0bf5611b60d1ccfe27c6c6187d9b607977927b # claude/trim-redundant-unit-tests 2026-07-05

  check-change:
    needs: [prep]
    permissions:
      actions: read
      contents: read
      security-events: write # SARIF upload to Security tab
    runs-on: ubuntu-latest
    steps:
      # The scan action runs adapter-pattern tools (via run.sh) and
      # action-pattern tools (zizmor, scorecard) via uses: internally, and
      # checks out the repo itself (checkout: true). Standalone scan: there is
      # no build to fold into, so the artifact is the consumer-facing `scan`.
      # This workflow scans the whole repo (root path), so the shortname is
      # empty and the name is just "scan".
      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - name: Source scan
        uses: TomHennen/wrangle/actions/scan@1b0bf5611b60d1ccfe27c6c6187d9b607977927b # claude/trim-redundant-unit-tests 2026-07-05
        with:
          checkout: "true"
          tools: ${{ inputs.tools }}
          artifact-name: scan
