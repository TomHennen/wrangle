name: Check Change

on:
  workflow_call:
    inputs:
      tools:
        description: "Space-separated list of tools to run"
        required: false
        type: string
        default: "osv zizmor"
  # No secrets required — tools are downloaded as public binaries

jobs:
  check-change:
    permissions:
      actions: read
      contents: read
      security-events: write # SARIF upload to Security tab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # TODO(PR 14): Pin to release tag @v0.1.0 — @main is temporary
      - name: Source scan
        uses: tomhennen/wrangle/actions/scan@main
        with:
          tools: ${{ inputs.tools }}

      # TODO(PR 14): Pin to release tag @v0.1.0
      - name: Scorecard
        if: always()
        uses: tomhennen/wrangle/actions/scorecard@main
