name: Check Change

on:
  workflow_call:
    inputs:
      tools:
        description: "Space-separated list of tools to run (suffix :info for informational)"
        required: false
        type: string
        default: "osv zizmor scorecard:info"

jobs:
  # Refuse pull_request_target invocations (defense-in-depth against the
  # "pwn request" pattern that compromised TanStack/router via Mini
  # Shai-Hulud in May 2026). pull_request_target runs in the base repo's
  # privileged context, so a caller using that trigger could have
  # poisoned the runner before invoking wrangle. No legitimate wrangle
  # adoption uses this trigger.
  # See: https://github.com/TomHennen/wrangle/issues/202
  guard:
    runs-on: ubuntu-latest
    permissions: {}    # reads env only — no workspace, no API, no secrets
    steps:
      - name: Refuse pull_request_target invocations
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          OUTER_EVENT: ${{ github.event.workflow_run.event }}
        run: |
          set -euo pipefail
          fail() {
              printf '::error::wrangle refuses %s.\n' "$1" >&2
              printf "::error::This trigger pattern combined with a checkout of PR head SHA is the 'pwn request' vector that compromised TanStack/router via Mini Shai-Hulud in May 2026.\n" >&2
              printf '::error::Move build/publish to a push-triggered workflow (push to main or tags). See docs/SPEC.md threat model.\n' >&2
              exit 1
          }
          if [[ "$EVENT_NAME" == "pull_request_target" ]]; then
              fail "pull_request_target invocations"
          fi
          if [[ "$EVENT_NAME" == "workflow_run" && "$OUTER_EVENT" == "pull_request_target" ]]; then
              fail "workflow_run invocations triggered by pull_request_target"
          fi
          printf 'Event "%s" allowed.\n' "$EVENT_NAME"

  check-change:
    needs: [guard]
    permissions:
      actions: read
      contents: read
      security-events: write # SARIF upload to Security tab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # The scan action runs adapter-pattern tools (via run.sh) and
      # action-pattern tools (zizmor, scorecard) via uses: internally.
      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - name: Source scan
        uses: TomHennen/wrangle/actions/scan@dad131c0f4faf6348952ad21b037750cb568834a # claude/v0.2-pnpm-support 2026-05-14
        with:
          tools: ${{ inputs.tools }}
