name: Check Change

on:
  workflow_call:
    inputs:
      tools:
        description: "Space-separated list of tools to run (suffix :info for informational)"
        required: false
        type: string
        default: "osv zizmor scorecard:info"

jobs:
  check-change:
    permissions:
      actions: read
      contents: read
      security-events: write # SARIF upload to Security tab
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # The scan action runs adapter-pattern tools (via run.sh) and
      # action-pattern tools (zizmor, scorecard) via uses: internally.
      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - name: Source scan
        uses: TomHennen/wrangle/actions/scan@0fa729d1b2f2bf5f550af91ed9e06a0d98ab5de9 # claude/implement-npm-build-type-draft 2026-05-04
        with:
          tools: ${{ inputs.tools }}
