name: Shell Build

on:
  workflow_call:
    inputs:
      scan-path:
        description: >
          Relative path to the subdirectory to scan with shellcheck and
          auto-detect bats tests within. Defaults to the workspace root.
          Useful for monorepos that only want wrangle's shell checks to run
          on a specific subtree.
        required: false
        type: string
        default: "."
      bats-path:
        description: "Space-separated path(s) to bats test files (default: auto-detect under scan-path)"
        required: false
        type: string
        default: ""
      setup-script:
        description: >
          Workspace-relative path to a bash script that installs test
          dependencies. Runs after shellcheck/bats are installed and
          before the checks; PATH additions via GITHUB_PATH reach the
          check steps. Empty disables setup.
        required: false
        type: string
        default: ""
      scan-tools:
        description: |
          Space-separated source-scan tools (suffix :info for
          non-blocking). A load-bearing (:fail) finding fails the run.
          Empty string disables scanning.
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review wrangle-lint"
      go-cache:
        description: >
          Set to "enabled" to cache the Go module + build caches the
          scan tools build from source (osv-scanner et al. — #343).
          Default off: the cache is ~1.5–3 GB against this repo's
          Actions cache quota. Source scanning produces no provenance,
          so caching is L3-safe here regardless.
        required: false
        type: string
        default: ""
      go-tools-dir:
        description: >
          Workspace-relative directory holding a go.mod + go.sum whose
          `go install tool` deps your setup-script builds. When set, the
          shell-build job caches the Go module + build caches keyed on
          that go.sum, so those tools aren't recompiled from source every
          run. The cache counts against your repo's Actions quota. Empty
          (default) disables it. To cache the scan tools, use go-cache.
        required: false
        type: string
        default: ""
      cache-setup-tools:
        description: >
          Set to "enabled" to cache the Go tool binaries the setup-script
          installs into wrangle's standard bin dir ($RUNNER_TEMP/.wrangle/bin,
          lib/env.sh), keyed on go-tools-dir's go.sum, so they aren't relinked
          every run. Requires go-tools-dir. Test/scan only: a cache hit
          restores prebuilt binaries instead of rebuilding, so go.sum is not
          re-verified on the hit — never enable on a release build. Empty
          (default) disables it.
        required: false
        type: string
        default: ""
      cache-image-builds:
        description: >
          Set to "enabled" to give docker-image builds in the suite a
          persistent buildx layer cache (WRANGLE_BUILDX_CACHE), so tool images
          a setup-script or bats test builds from source aren't recompiled
          inside the container every run — work the host go-cache can't reach.
          Requires go-tools-dir (the cache key tracks its go.sum). Test/scan
          only: BuildKit re-derives any layer whose inputs changed, so a stale
          cache only slows a run, never serves mismatched layers; this attests
          nothing. Empty (default) disables it.
        required: false
        type: string
        default: ""
    secrets:
      gh_token:
        description: >
          Token exposed to the bats step as GH_TOKEN, for integration tests
          that call gh (e.g. the pull-time VSA gate's `gh attestation verify`).
          Omit to leave bats tokenless — the default, so an adopter's bats see
          no token.
        required: false

jobs:
  # MUST stay first under `jobs:`: prep's guard refuses unsafe triggers
  # before any other job runs, and every job `needs: [prep]`. No build-type,
  # so prep is guard-only (no release gate, no names). docs/SPEC.md#trigger-model.
  prep:
    runs-on: ubuntu-latest
    permissions: {}    # guard reads env only — no workspace, no API, no secrets
    steps:
      # TODO: replace with $/actions/prep when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/prep@da0d201ed70d321919ed883e4052dae68b9aa350 # fix/dispatch-test-flakiness 2026-06-27

  # Source scan. A load-bearing (:fail) finding fails the run alongside
  # the shell build/test (there is no artifact to gate publishing of).
  scan:
    needs: [prep]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/scan@da0d201ed70d321919ed883e4052dae68b9aa350 # fix/dispatch-test-flakiness 2026-06-27
        if: ${{ inputs.scan-tools != '' }}
        with:
          checkout: "true"
          tools: ${{ inputs.scan-tools }}
          go-cache: ${{ inputs.go-cache }}

  shell-build:
    needs: [prep]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Reaches the auto-detected integration bats (run_bats in the composite
    # below) so a test that calls gh can authenticate. Empty when the caller
    # passes no gh_token secret, leaving bats tokenless.
    env:
      GH_TOKEN: ${{ secrets.gh_token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # The setup-script's `go install tool` builds from source; cache the
      # module + build caches keyed on the tool manifest's go.sum. Non-release
      # only (this workflow produces no provenance), so the build cache's
      # trust-on-hit (docs/SLSA_L3_AUDIT.md) is not an L3 concern here.
      - name: Set up Go with module + build cache
        if: ${{ inputs.go-tools-dir != '' }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-tools-dir }}/go.mod
          cache-dependency-path: ${{ inputs.go-tools-dir }}/go.sum

      # Restores prebuilt tool binaries on a go.sum-stable run so they aren't
      # relinked; a hit skips the go.sum re-verify, so this is test/scan only
      # and never gates a release (this workflow attests nothing).
      - name: Cache setup-script tool binaries
        if: ${{ inputs.cache-setup-tools == 'enabled' && inputs.go-tools-dir != '' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/.wrangle/bin
          key: setup-tools-${{ runner.os }}-${{ hashFiles(format('{0}/go.sum', inputs.go-tools-dir)) }}

      # The suite builds tool images from source (their Dockerfiles compile the
      # Go signing/scan binaries); a docker-container builder lets BuildKit
      # import/export a layer cache the ephemeral runner would otherwise lose.
      - name: Set up buildx for cached tool-image builds
        if: ${{ inputs.cache-image-builds == 'enabled' && inputs.go-tools-dir != '' }}
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Persist the buildx layer cache across runs. Keyed on the tool manifest's
      # go.sum (the dominant from-source build layer); a unique run_id suffix +
      # restore-keys keeps every run warm from the latest without the immutable-
      # key staleness. Test/scan only — the cache attests nothing, and BuildKit
      # rebuilds any layer whose inputs changed, so a restored cache can't taint
      # an image (docs/SLSA_L3_AUDIT.md).
      - name: Cache tool-image build layers
        if: ${{ inputs.cache-image-builds == 'enabled' && inputs.go-tools-dir != '' }}
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ runner.temp }}/.wrangle/buildx-cache
          key: image-builds-${{ runner.os }}-${{ hashFiles(format('{0}/go.sum', inputs.go-tools-dir)) }}-${{ github.run_id }}
          restore-keys: |
            image-builds-${{ runner.os }}-${{ hashFiles(format('{0}/go.sum', inputs.go-tools-dir)) }}-
            image-builds-${{ runner.os }}-

      - name: Point image builds at the buildx cache
        if: ${{ inputs.cache-image-builds == 'enabled' && inputs.go-tools-dir != '' }}
        shell: bash
        env:
          BUILDX_CACHE_DIR: ${{ runner.temp }}/.wrangle/buildx-cache
        run: printf 'WRANGLE_BUILDX_CACHE=%s\n' "$BUILDX_CACHE_DIR" >> "$GITHUB_ENV"

      - name: Run shell build
        # TODO: replace with $/build/actions/shell when GitHub ships $/ syntax (#136)
        # Bootstrap pin (docs/e2e_testing.md): the composite gained the
        # setup-script input and multi-path bats — the main-pinned version
        # would ignore setup-script and fail the dogfooded integration bats.
        # Bump to main post-merge via tools/bump_action_pins.sh.
        uses: TomHennen/wrangle/build/actions/shell@da0d201ed70d321919ed883e4052dae68b9aa350 # fix/dispatch-test-flakiness 2026-06-27
        with:
          scan-path: ${{ inputs.scan-path }}
          bats-path: ${{ inputs.bats-path }}
          setup-script: ${{ inputs.setup-script }}
