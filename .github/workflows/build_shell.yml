name: Shell Build

on:
  workflow_call:
    inputs:
      scan-path:
        description: >
          Relative path to the subdirectory to scan with shellcheck and
          auto-detect bats tests within. Defaults to the workspace root.
          Useful for monorepos that only want wrangle's shell checks to run
          on a specific subtree.
        required: false
        type: string
        default: "."
      bats-path:
        description: "Space-separated path(s) to bats test files (default: auto-detect under scan-path)"
        required: false
        type: string
        default: ""
      setup-script:
        description: >
          Workspace-relative path to a bash script that installs test
          dependencies. Runs after shellcheck/bats are installed and
          before the checks; PATH additions via GITHUB_PATH reach the
          check steps. Empty disables setup.
        required: false
        type: string
        default: ""
      scan-tools:
        description: |
          Space-separated source-scan tools (suffix :info for
          non-blocking). A load-bearing (:fail) finding fails the run.
          Empty string disables scanning.
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review"

jobs:
  # Refuse trigger patterns known to expose this workflow to supply-chain
  # attack classes (pull_request_target, workflow_run via pull_request_target).
  # The guard MUST stay first under `jobs:`; every other job lists `guard`
  # in its `needs:` so a refused invocation skips the entire workflow.
  # Full trigger contract: docs/SPEC.md#trigger-model.
  guard:
    runs-on: ubuntu-latest
    permissions: {}    # reads env only — no workspace, no API, no secrets
    steps:
      # TODO: replace with $/actions/preflight_guard when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/preflight_guard@5b79a1ca848b761ae5bd5524e80af70bb42207c9 # main 2026-06-07

  # Source scan. A load-bearing (:fail) finding fails the run alongside
  # the shell build/test (there is no artifact to gate publishing of).
  scan:
    needs: [guard]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: ${{ inputs.scan-tools != '' }}
        with:
          persist-credentials: false

      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      # Bootstrap pin (docs/e2e_testing.md): scan must resolve the branch
      # version so its dependency-review wrapper honors the repo's native
      # config file. Bump to main post-merge via tools/bump_action_pins.sh.
      - uses: TomHennen/wrangle/actions/scan@cd35332ff407e3bb99ff854747f9a2be79cd2541 # claude/wrangle-build-shell-workflow-72lpca 2026-06-10
        if: ${{ inputs.scan-tools != '' }}
        with:
          tools: ${{ inputs.scan-tools }}

  shell-build:
    needs: [guard]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run shell build
        # TODO: replace with $/build/actions/shell when GitHub ships $/ syntax (#136)
        # Bootstrap pin (docs/e2e_testing.md): the composite gained the
        # setup-script input and multi-path bats — the main-pinned version
        # would ignore setup-script and fail the dogfooded integration bats.
        # Bump to main post-merge via tools/bump_action_pins.sh.
        uses: TomHennen/wrangle/build/actions/shell@7a4521ac2a1a6351b12b89bb5e3250d5e611bb16 # claude/wrangle-build-shell-workflow-72lpca 2026-06-09
        with:
          scan-path: ${{ inputs.scan-path }}
          bats-path: ${{ inputs.bats-path }}
          setup-script: ${{ inputs.setup-script }}
