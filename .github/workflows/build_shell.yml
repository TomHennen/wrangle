name: Shell Build

on:
  workflow_call:
    inputs:
      scan-path:
        description: >
          Relative path to the subdirectory to scan with shellcheck and
          auto-detect bats tests within. Defaults to the workspace root.
          Useful for monorepos that only want wrangle's shell checks to run
          on a specific subtree.
        required: false
        type: string
        default: "."
      bats-path:
        description: "Space-separated path(s) to bats test files (default: auto-detect under scan-path)"
        required: false
        type: string
        default: ""
      setup-script:
        description: >
          Workspace-relative path to a bash script that installs test
          dependencies. Runs after shellcheck/bats are installed and
          before the checks; PATH additions via GITHUB_PATH reach the
          check steps. Empty disables setup.
        required: false
        type: string
        default: ""
      scan-tools:
        description: |
          Space-separated source-scan tools (suffix :info for
          non-blocking). A load-bearing (:fail) finding fails the run.
          Empty string disables scanning.
        required: false
        type: string
        default: "osv zizmor scorecard:info dependency-review wrangle-lint"
      go-cache:
        description: >
          Set to "enabled" to cache the Go module + build caches the
          scan tools build from source (osv-scanner et al. — #343).
          Default off: the cache is ~1.5–3 GB against this repo's
          Actions cache quota. Source scanning produces no provenance,
          so caching is L3-safe here regardless.
        required: false
        type: string
        default: ""
      go-tools-dir:
        description: >
          Workspace-relative directory holding a go.mod + go.sum whose
          `go install tool` deps your setup-script builds. When set, the
          shell-build job caches the Go module + build caches keyed on
          that go.sum, so those tools aren't recompiled from source every
          run. The cache counts against your repo's Actions quota. Empty
          (default) disables it. To cache the scan tools, use go-cache.
        required: false
        type: string
        default: ""

jobs:
  # MUST stay first under `jobs:`: prep's guard refuses unsafe triggers
  # before any other job runs, and every job `needs: [prep]`. No build-type,
  # so prep is guard-only (no release gate, no names). docs/SPEC.md#trigger-model.
  prep:
    runs-on: ubuntu-latest
    permissions: {}    # guard reads env only — no workspace, no API, no secrets
    steps:
      # TODO: replace with $/actions/prep when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/prep@428325083b9ffed4b41fa5ad9abc146bcb8aded8 # main 2026-06-20

  # Source scan. A load-bearing (:fail) finding fails the run alongside
  # the shell build/test (there is no artifact to gate publishing of).
  scan:
    needs: [prep]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # TODO: replace with $/actions/scan when GitHub ships $/ syntax (#136)
      - uses: TomHennen/wrangle/actions/scan@428325083b9ffed4b41fa5ad9abc146bcb8aded8 # main 2026-06-20
        if: ${{ inputs.scan-tools != '' }}
        with:
          checkout: "true"
          tools: ${{ inputs.scan-tools }}
          go-cache: ${{ inputs.go-cache }}

  shell-build:
    needs: [prep]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # The setup-script's `go install tool` builds from source; cache the
      # module + build caches keyed on the tool manifest's go.sum. Non-release
      # only (this workflow produces no provenance), so the build cache's
      # trust-on-hit (docs/SLSA_L3_AUDIT.md) is not an L3 concern here.
      - name: Set up Go with module + build cache
        if: ${{ inputs.go-tools-dir != '' }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.go-tools-dir }}/go.mod
          cache-dependency-path: ${{ inputs.go-tools-dir }}/go.sum

      - name: Run shell build
        # TODO: replace with $/build/actions/shell when GitHub ships $/ syntax (#136)
        # Bootstrap pin (docs/e2e_testing.md): the composite gained the
        # setup-script input and multi-path bats — the main-pinned version
        # would ignore setup-script and fail the dogfooded integration bats.
        # Bump to main post-merge via tools/bump_action_pins.sh.
        uses: TomHennen/wrangle/build/actions/shell@428325083b9ffed4b41fa5ad9abc146bcb8aded8 # main 2026-06-20
        with:
          scan-path: ${{ inputs.scan-path }}
          bats-path: ${{ inputs.bats-path }}
          setup-script: ${{ inputs.setup-script }}
