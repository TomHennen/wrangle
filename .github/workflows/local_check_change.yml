name: Check Change

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  check-change:
    permissions:
      actions: read
      contents: read
      security-events: write
    # ./ resolves to this repo at the PR branch ref, so PR CI tests
    # the actual code in the PR (not main).
    uses: ./.github/workflows/check_source_change.yml
