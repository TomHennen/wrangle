# Wrangle Verify Attestation — verify the GitHub-issued SLSA build provenance
# for a release artifact and confirm it was signed by wrangle's reusable build
# workflow.
#
# This verifies the provenance produced by actions/attest-build-provenance,
# whose builder.id and Sigstore signing certificate both resolve to the
# reusable workflow's job_workflow_ref (= wrangle's reusable build workflow).
# `gh attestation verify --signer-workflow` fails closed unless that identity
# matches, so a tampered or differently-signed attestation blocks the release.
#
# Pass bundle-path (the attest step's bundle-path output) to verify in the same
# run without waiting on the attestations API. Signing-side production stays in
# the calling workflow; this action only reads and checks.
#
# Required permissions on the calling job: none beyond the default read token —
# gh resolves the attestation via $GH_TOKEN.
name: Wrangle Verify Attestation
description: >
  Verify GitHub-issued SLSA build provenance for an artifact (blob path or
  oci:// image) and enforce that it was signed by the named reusable workflow.
  Prints builder.id / buildType / signer for inspection; fails closed on a
  signer mismatch.

inputs:
  subject:
    description: >
      What to verify: a path to a file, a directory whose files are each
      verified, or an oci://<image>@sha256:<digest> reference.
    required: true
  repo:
    description: "owner/repo where the attestation is stored (gh --repo); normally github.repository."
    required: true
  signer-workflow:
    description: >
      The reusable workflow that must have signed the attestation, in gh's
      [host/]owner/repo/path form WITHOUT an @ref, e.g.
      TomHennen/wrangle/.github/workflows/build_and_publish_npm.yml.
    required: true
  bundle-path:
    description: >
      Optional path to the attest step's emitted bundle (its bundle-path
      output). When set, verification reads this local bundle instead of the
      attestations API, so it is deterministic within the producing run.
    required: false
    default: ""
  predicate-type:
    description: "Attestation predicate type to verify (gh --predicate-type)."
    required: false
    default: "https://slsa.dev/provenance/v1"

runs:
  using: composite
  steps:
    - name: Verify attestation
      shell: bash
      env:
        SUBJECT: ${{ inputs.subject }}
        REPO: ${{ inputs.repo }}
        SIGNER_WORKFLOW: ${{ inputs.signer-workflow }}
        BUNDLE_PATH: ${{ inputs.bundle-path }}
        PREDICATE_TYPE: ${{ inputs.predicate-type }}
        GH_TOKEN: ${{ github.token }}
      run: |
        "${GITHUB_ACTION_PATH}/verify_attestation.sh" run
