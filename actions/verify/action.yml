# Wrangle Verify — verify a release artifact against a wrangle PolicySet and
# emit a signed SLSA Verification Summary Attestation (VSA) at the release
# boundary.
#
# This wraps the published upstream action carabiner-dev/actions/ampel/verify,
# which installs ampel, evaluates the PolicySet against attestations gathered
# by the collector, and signs the result in place via `bnd statement`. Wrangle
# adds release-boundary plumbing on top: it pins the VSA to the in-toto bundle
# filename, uploads it as a workflow artifact, and attaches it to the GitHub
# release on a tag push.
#
# The VSA is the ONLY consumer contract (docs/ampel_research.md §2). Adopters
# never install ampel; they trust the signed VSA alone. It conforms to
# https://slsa.dev/verification_summary/v1 and is verified downstream with
# `cosign verify-blob-attestation --new-bundle-format`.
#
# Filename: the VSA is written directly to `<artifact-name>.intoto.jsonl`
# (Decision 4) — the in-toto v1 attestation-bundle naming convention
# (https://github.com/in-toto/attestation/blob/main/spec/v1/bundle.md), so the
# release asset is self-describing and `wget`-able without GitHub auth.
#
# Signing identity: keyless sigstore via the CALLING workflow's GitHub OIDC
# certificate (Decision 3) — wrangle adds no signing of its own. Consumers
# therefore verify with a cosign --certificate-identity-regexp matching the
# wrangle verify workflow path, e.g.:
#   --certificate-identity-regexp="^https://github.com/TomHennen/wrangle/.github/workflows/verify\.yml@refs/tags/v.+"
#   --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
# Trust rides on that SIGNING CERTIFICATE identity. Do NOT trust the VSA's
# predicate `verifier.id`: ampel hardcodes it to "https://carabiner.dev/ampel@v1"
# (there is no override flag), a value any ampel user emits — it is not a
# wrangle-specific assertion.
#
# Required permissions on the CALLING job (a composite action cannot set its
# own): `id-token: write` (keyless OIDC signing of the VSA) and, only on the
# tag/publish job where attach-to-release runs, `contents: write` (gh release
# upload). Scope `contents: write` to that job alone — don't grant it repo-wide.
name: Wrangle Verify
description: >
  Verify a release artifact against a wrangle PolicySet using ampel and emit a
  signed SLSA Verification Summary Attestation (VSA). The VSA is written to
  <artifact-name>.intoto.jsonl, uploaded as a workflow artifact, and attached
  to the GitHub release on a tag push. The VSA is the only consumer contract —
  adopters verify it with cosign and never install ampel themselves.

inputs:
  subject:
    description: >
      The artifact to verify, as understood by ampel — a path, a hash
      (sha256:...), or a locator. Passed through to the upstream action's
      --subject. This is the resourceUri recorded in the emitted VSA.
    required: true
  policy:
    description: >
      The wrangle PolicySet to evaluate against — a path to a PolicySet file
      in policies/ or an ampel locator
      (git+https://github.com/org/repo@<sha>#path/policy.json). Passed through
      to the upstream action's --policy.
    required: true
  collector:
    description: >
      The ampel collector driver(s) that gather the attestations the policy
      evaluates — e.g. jsonl:, oci:, github:, release:. Passed through to the
      upstream action's --collector.
    required: true
  artifact-name:
    description: >
      Basename used for the emitted VSA file (e.g. my-app-1.2.3.tgz). The VSA
      is written to <artifact-name>.intoto.jsonl per the in-toto v1 bundle
      convention and that filename becomes both the workflow-artifact name and
      the release-asset name.
    required: true
  context:
    description: >
      Optional context values supplied to the policy's CEL tenets, in ampel's
      --context format: colon-separated KEY:VALUE pairs, comma-separated for
      multiple (e.g. "buildPoint:git+https://github.com/OWNER/REPO,vsa.resourceUri:pkg:...").
      wrangle's default/strict PolicySets expect buildPoint (the source repo)
      and optionally vsa.resourceUri here; builderId/buildType are baked into
      the PolicySet. Pass-through to the upstream action's --context.
    required: false
    default: ""
  attestation:
    description: >
      Optional explicit attestation file(s) to load in addition to whatever the
      collector gathers. Pass-through to the upstream action's --attestation.
    required: false
    default: ""
  fail:
    description: >
      When "true" (default) a FAILED verification result fails the step,
      blocking the release. Set "false" to evaluate without blocking.
      Pass-through to the upstream action's --fail.
    required: false
    default: "true"
  attach-to-release:
    description: >
      When "true" (default) and the run is a tag push, the VSA is uploaded to
      the GitHub release named by the tag. Non-tag runs skip the upload
      regardless.
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    # Validate EVERY input before it is used (CLAUDE.md: inputs flowing into a
    # command or file path must be allowlist/regex-checked). This is the
    # security boundary: the upstream carabiner-dev/actions/ampel/verify step
    # interpolates subject/policy/collector/context/attestation as raw text
    # into a shell `run:` script (a GitHub Actions expression-injection sink),
    # and results-path (= artifact-name) lands in an UNQUOTED `mv`. Rejecting
    # every shell metacharacter here keeps wrangle's reusable action from being
    # an injection vector for adopters, regardless of upstream's shell hygiene.
    - name: Validate inputs
      shell: bash
      env:
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
        SUBJECT: ${{ inputs.subject }}
        POLICY: ${{ inputs.policy }}
        COLLECTOR: ${{ inputs.collector }}
        CONTEXT: ${{ inputs.context }}
        ATTESTATION: ${{ inputs.attestation }}
        FAIL: ${{ inputs.fail }}
      run: |
        reject() { printf 'wrangle: invalid %s "%s" — %s\n' "$1" "$2" "$3" >&2; exit 1; }
        # artifact-name is a plain basename (also the VSA filename and the arg
        # to upstream's unquoted mv): no separators, dots-leading, or metachars.
        [[ "$ARTIFACT_NAME" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]] \
            || reject artifact-name "$ARTIFACT_NAME" 'must match ^[A-Za-z0-9][A-Za-z0-9._-]*$'
        # The rest are forwarded into upstream's shell run: step. Allow only the
        # characters real hashes / paths / VCS locators / KEY:VALUE context need
        # — every shell metacharacter (quotes, $, backtick, ;, &, |, <>, (), {},
        # *, ?, whitespace, backslash, newline) is outside these classes.
        [[ "$SUBJECT"   =~ ^[A-Za-z0-9._:/@+-]+$   ]] || reject subject   "$SUBJECT"   'contains disallowed characters'
        [[ "$POLICY"    =~ ^[A-Za-z0-9._:/@#+-]+$  ]] || reject policy    "$POLICY"    'contains disallowed characters'
        [[ "$COLLECTOR" =~ ^[A-Za-z0-9._:/@#+,-]+$ ]] || reject collector "$COLLECTOR" 'contains disallowed characters'
        [[ "$FAIL"      =~ ^(true|false)$          ]] || reject fail      "$FAIL"      'must be "true" or "false"'
        # context and attestation are optional (empty is fine).
        [[ -z "$CONTEXT"     || "$CONTEXT"     =~ ^[A-Za-z0-9._:/@#+,%=-]+$ ]] || reject context     "$CONTEXT"     'contains disallowed characters'
        [[ -z "$ATTESTATION" || "$ATTESTATION" =~ ^[A-Za-z0-9._:/@#+,-]+$   ]] || reject attestation "$ATTESTATION" 'contains disallowed characters'

    # Upstream verify: installs ampel (provenance-verified via its bootstrap),
    # evaluates the PolicySet, renders the result to the step summary, and signs
    # the VSA in place using the calling workflow's OIDC identity (Decision 3).
    #
    # attest-format=vsa makes the signed result a SLSA VSA; results-path writes
    # it straight to the in-toto bundle filename (Decision 4). push-attestation
    # is left false — wrangle does its own upload below to control the artifact
    # name. attest, signer/key/keydata are intentionally not set: attest
    # defaults true and keyless OIDC signing needs no key material.
    - name: Verify against PolicySet and emit VSA
      uses: carabiner-dev/actions/ampel/verify@e0e3b8149dafed833431095bc148d50e7eade4e8 # v1.2.0
      with:
        subject: ${{ inputs.subject }}
        policy: ${{ inputs.policy }}
        collector: ${{ inputs.collector }}
        context: ${{ inputs.context }}
        attestation: ${{ inputs.attestation }}
        fail: ${{ inputs.fail }}
        attest-format: vsa
        results-path: ${{ inputs.artifact-name }}.intoto.jsonl
        push-attestation: "false"

    # Best-effort convenience copy (Decision 4): the canonical VSA is the
    # release asset attached below; this artifact lets non-release runs (e.g.
    # PRs) inspect the VSA too.
    - name: Upload VSA artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ inputs.artifact-name }}.intoto.jsonl
        path: ${{ inputs.artifact-name }}.intoto.jsonl
        if-no-files-found: error

    # Canonical VSA storage (Decision 4): attach to the GitHub release on a tag
    # push so consumers can fetch it without GitHub auth. --clobber makes the
    # step idempotent on re-runs. Guarded to tag pushes; non-tag runs skip it.
    - name: Attach VSA to release
      if: github.ref_type == 'tag' && inputs.attach-to-release == 'true'
      shell: bash
      # inputs.artifact-name threaded through env to avoid expression injection
      # in the run block; GITHUB_REF_NAME is the runner-provided tag name.
      env:
        VSA_FILE: ${{ inputs.artifact-name }}.intoto.jsonl
        GH_TOKEN: ${{ github.token }}
      run: gh release upload "$GITHUB_REF_NAME" "$VSA_FILE" --clobber
