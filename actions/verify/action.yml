# Wrangle Verify — verify a release artifact against a wrangle PolicySet with
# ampel and emit a signed SLSA Verification Summary Attestation (VSA).
#
# This is the consumer contract: a PASS produces `<artifact>.intoto.jsonl`
# (slsa.dev/verification_summary/v1), and downstream consumers trust only that
# signed VSA — they never run ampel themselves (docs/ampel_research.md §2).
#
# ampel and bnd are built from tools/go.mod (`go install`); the runner needs a
# Go toolchain (GitHub-hosted runners ship one). The PolicySet itself mandates
# the signer identities of every input attestation (its common.identities), so
# verification is fail-closed regardless of how this action is invoked — there
# is no --signer flag to forget.
#
# Signing identity: bnd signs the VSA keyless via the CALLING workflow's GitHub
# OIDC certificate. Consumers verify with cosign --certificate-identity-regexp
# on the wrangle verify workflow path.
#
# Required permissions on the calling job: `id-token: write` (sign the VSA);
# `contents: write` only on the tag/publish job (attach to the release).
name: Wrangle Verify
description: >
  Verify a release artifact against a wrangle PolicySet using ampel and emit a
  signed SLSA VSA. The VSA is written to <artifact-name>.intoto.jsonl, uploaded
  as a workflow artifact, and attached to the GitHub release on a tag push.

inputs:
  subject:
    description: "Artifact to verify — a hash (sha256:...) or a path. ampel --subject."
    required: true
  policy:
    description: "wrangle PolicySet to evaluate — a path under policies/ or an ampel locator."
    required: true
  collector:
    description: "ampel collector(s) that gather the attestations to evaluate (e.g. jsonl:, oci:, release:)."
    required: true
  artifact-name:
    description: "Basename for the emitted VSA file (e.g. my-app-1.2.3.tgz); the VSA is <artifact-name>.intoto.jsonl."
    required: true
  context:
    description: >
      Optional per-verify context for the policy's CEL, in ampel's KEY:VALUE
      format (comma-separated for multiple), e.g.
      "buildPoint:git+https://github.com/OWNER/REPO". builderId/buildType and the
      signer identities are baked into the PolicySet, not passed here.
    required: false
    default: ""
  attestation:
    description: "Optional explicit attestation file(s) to load in addition to the collector."
    required: false
    default: ""
  fail:
    description: 'When "true" (default) a FAILED result fails the step and blocks the release.'
    required: false
    default: "true"
  attach-to-release:
    description: 'When "true" (default) and the run is a tag push, attach the VSA to the release.'
    required: false
    default: "true"

runs:
  using: composite
  steps:
    # Validate every input before use (CLAUDE.md). subject/policy/collector/
    # context/attestation are passed to ampel; reject shell metacharacters so a
    # value can never break out of the run: steps below.
    - name: Validate inputs
      shell: bash
      env:
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
        SUBJECT: ${{ inputs.subject }}
        POLICY: ${{ inputs.policy }}
        COLLECTOR: ${{ inputs.collector }}
        CONTEXT: ${{ inputs.context }}
        ATTESTATION: ${{ inputs.attestation }}
        FAIL: ${{ inputs.fail }}
      run: |
        set -euo pipefail
        reject() { printf 'wrangle: invalid %s "%s" — %s\n' "$1" "$2" "$3" >&2; exit 1; }
        [[ "$ARTIFACT_NAME" =~ ^[A-Za-z0-9][A-Za-z0-9._-]*$ ]] || reject artifact-name "$ARTIFACT_NAME" 'must match ^[A-Za-z0-9][A-Za-z0-9._-]*$'
        [[ "$SUBJECT"    =~ ^[A-Za-z0-9._:/@+-]+$    ]] || reject subject    "$SUBJECT"    'disallowed characters'
        [[ "$POLICY"     =~ ^[A-Za-z0-9._:/@#+-]+$   ]] || reject policy     "$POLICY"     'disallowed characters'
        [[ "$COLLECTOR"  =~ ^[A-Za-z0-9._:/@#+,-]+$  ]] || reject collector  "$COLLECTOR"  'disallowed characters'
        [[ "$FAIL"       =~ ^(true|false)$           ]] || reject fail       "$FAIL"       'must be "true" or "false"'
        [[ -z "$CONTEXT"     || "$CONTEXT"     =~ ^[A-Za-z0-9._:/@#+,%=-]+$ ]] || reject context     "$CONTEXT"     'disallowed characters'
        [[ -z "$ATTESTATION" || "$ATTESTATION" =~ ^[A-Za-z0-9._:/@#+,-]+$   ]] || reject attestation "$ATTESTATION" 'disallowed characters'

    # Build ampel + bnd from the pinned tool manifest into WRANGLE_BIN_DIR.
    - name: Install ampel and bnd
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
        # Assert sumdb verification isn't environment-conditional (CLAUDE.md):
        # an inherited GOSUMDB=off / GONOSUMCHECK would otherwise silently skip
        # the build-integrity check the go.mod install relies on.
        GOPROXY: https://proxy.golang.org,direct
        GOSUMDB: sum.golang.org
      run: |
        # shellcheck source=../../lib/env.sh
        source "$WRANGLE_ROOT/lib/env.sh"
        GOBIN="$WRANGLE_BIN_DIR" go -C "$WRANGLE_ROOT/tools" install tool
        printf '%s\n' "$WRANGLE_BIN_DIR" >> "$GITHUB_PATH"

    # Evaluate the PolicySet and write the (unsigned) VSA. The policy's
    # common.identities verify the signer of every input attestation, so a
    # tampered/unsigned input fails here.
    - name: Verify and emit VSA
      shell: bash
      env:
        SUBJECT: ${{ inputs.subject }}
        POLICY: ${{ inputs.policy }}
        COLLECTOR: ${{ inputs.collector }}
        CONTEXT: ${{ inputs.context }}
        ATTESTATION: ${{ inputs.attestation }}
        FAIL: ${{ inputs.fail }}
        VSA: ${{ inputs.artifact-name }}.intoto.jsonl
      run: |
        set -euo pipefail
        args=(verify --subject="$SUBJECT" --collector="$COLLECTOR" --policy="$POLICY"
              --exit-code="$FAIL" --attest-results --attest-format=vsa --results-path="$VSA")
        if [[ -n "$CONTEXT" ]]; then args+=(--context "$CONTEXT"); fi
        if [[ -n "$ATTESTATION" ]]; then args+=(--attestation "$ATTESTATION"); fi
        ampel "${args[@]}" --format=html >> "$GITHUB_STEP_SUMMARY"

    # Sign the VSA in place, keyless, with the calling workflow's OIDC identity.
    - name: Sign the VSA
      shell: bash
      env:
        VSA: ${{ inputs.artifact-name }}.intoto.jsonl
      run: |
        set -euo pipefail
        mv "$VSA" "$VSA.unsigned"
        bnd statement "$VSA.unsigned" > "$VSA"
        rm -f "$VSA.unsigned"

    - name: Upload VSA artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ inputs.artifact-name }}.intoto.jsonl
        path: ${{ inputs.artifact-name }}.intoto.jsonl
        if-no-files-found: error

    # Canonical VSA storage: attach to the GitHub release on a tag push.
    - name: Attach VSA to release
      if: github.ref_type == 'tag' && inputs.attach-to-release == 'true'
      shell: bash
      env:
        VSA: ${{ inputs.artifact-name }}.intoto.jsonl
        GH_TOKEN: ${{ github.token }}
      run: gh release upload "$GITHUB_REF_NAME" "$VSA" --clobber
