# ampel and bnd are built from tools/go.mod (`go install`); cosign too, but only
# for the container (oci-target) build. The runner needs a Go toolchain. The
# PolicySet mandates the signer identities of every input attestation
# (common.identities), so verification is fail-closed with no --signer flag to
# forget. bnd signs each VSA keyless via the CALLING workflow's OIDC identity;
# consumers verify with cosign --certificate-identity-regexp.
#
# Caller permissions: id-token: write (sign); attestations: write (post each VSA
# to the GitHub attestation store); contents: write only on the tag/publish job
# (attach to release); packages: write only with oci-target.
name: Wrangle Verify
description: >
  Verify a release's provenance against a wrangle PolicySet using ampel, sign
  one SLSA VSA per dist subject, and append it to that subject's attest-assembled
  <artifact>.intoto.jsonl bundle (provenance + signed metadata) — the completed
  bundles in bundle-out are uploaded as one workflow artifact and attached to the
  GitHub release on a tag push. Each signed VSA is also posted to the GitHub
  attestation store for by-digest discovery (needs attestations: write). With
  oci-target set (container build type) the VSA is also pushed to the registry as
  an OCI referrer, which needs packages: write.

inputs:
  subjects:
    description: >
      Newline-separated dist subjects to bind a VSA to — each a hash (sha256:...)
      or a path. One signed VSA statement is appended per subject. Leave empty
      and pass dist-files instead for the npm/go/python build types.
    required: false
    default: ""
  dist-files:
    description: >
      JSON array of dist basenames (the build job's dist-files output); expanded
      to one dist/<file> subject each. Mutually exclusive with subjects.
    required: false
    default: ""
  policy:
    description: "wrangle PolicySet to evaluate — a path under policies/ or an ampel locator."
    required: true
  collector:
    description: >
      Additional ampel collector(s) beyond the per-artifact bundle (e.g.
      container's oci: referrer collector). Empty for go/npm/python — the bundle
      verify reads is the only collector.
    required: false
    default: ""
  bundle-in:
    description: >
      Directory of the attest job's per-artifact <artifact>.intoto.jsonl bundles
      (provenance + that subject's signed SBOM/scan); verify appends each VSA to
      the matching bundle. All build types pass it.
    required: true
  bundle-out:
    description: >
      Directory the per-artifact in-toto JSONL bundles are written into, one
      <artifact>.intoto.jsonl per subject. These filenames are the
      consumer-facing release asset names (e.g. foo-linux-amd64.tar.gz.intoto.jsonl).
    required: true
  artifact-name:
    description: >
      Name of the uploaded workflow artifact. Namespace it per build (e.g.
      go-bundle-<shortname>) — download-artifact picks non-deterministically on a
      name clash.
    required: true
  context:
    description: >
      Optional per-verify context for the policy's CEL, in ampel's KEY:VALUE
      format (comma-separated for multiple), e.g.
      "buildPoint:git+https://github.com/OWNER/REPO". builderId/buildType and the
      signer identities are baked into the PolicySet, not passed here.
    required: false
    default: ""
  attestation:
    description: "Optional explicit attestation file(s) to load in addition to the collector."
    required: false
    default: ""
  fail:
    description: 'When "true" (default) a FAILED result fails the step and blocks the release.'
    required: false
    default: "true"
  attach-to-release:
    description: 'When "true" (default) and the run is a tag push, attach the rationalized asset set to the release.'
    required: false
    default: "true"
  attach-release-assets:
    description: 'When "true" (default) attach the per-subject dist + bundle and the metadata zip. Set "false" to suppress the release-asset attach.'
    required: false
    default: "true"
  build-type:
    description: "Build type (go/python/npm/container)."
    required: false
    default: ""
  dist-dir:
    description: "Directory holding the dist files, attached per subject alongside their bundles."
    required: false
    default: "dist"
  metadata-dir:
    description: >
      Directory the per-subject bundles are written into and zipped from for the
      release metadata asset (sbom + scan/ + bundles); production wires this to
      the same value as bundle-out.
    required: false
    default: ""
  oci-target:
    description: >
      When set, push each signed VSA to this OCI image reference
      (<imagename>@sha256:<digest>) as a referrer attached to the image digest, in
      addition to the workflow-artifact storage. Container build type only; leave
      empty for npm/go/python. Requires packages: write.
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Build the verify tools into WRANGLE_BIN_DIR. Downstream steps re-source
    # lib/env.sh to find them on PATH, so there is no write to $GITHUB_PATH.
    # cosign is built only for the container (oci-target) build — see the script.
    - name: Install verify tools
      shell: bash
      env:
        OCI_TARGET: ${{ inputs.oci-target }}
      run: |
        "${{ github.action_path }}/install_tools.sh"

    # Pass through subjects, or expand the dist-files JSON array into them.
    - name: Resolve subjects
      id: subjects
      shell: bash
      env:
        SUBJECTS_IN: ${{ inputs.subjects }}
        DIST_FILES: ${{ inputs.dist-files }}
      run: |
        "${{ github.action_path }}/emit_subjects.sh"

    # Verify, sign, and append the VSA in one process, so an unsigned VSA never
    # sits on disk across a step boundary.
    - name: Verify and sign the bundles
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
        SUBJECTS: ${{ steps.subjects.outputs.subjects }}
        POLICY: ${{ inputs.policy }}
        COLLECTOR: ${{ inputs.collector }}
        CONTEXT: ${{ inputs.context }}
        ATTESTATION: ${{ inputs.attestation }}
        FAIL: ${{ inputs.fail }}
        # The attest job's per-artifact bundles (provenance + signed metadata);
        # verify appends each VSA to the matching bundle.
        BUNDLE_IN: ${{ inputs.bundle-in }}
        BUNDLE_OUT: ${{ inputs.bundle-out }}
        OCI_TARGET: ${{ inputs.oci-target }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        # bnd push github authenticates to the attestation store with this token;
        # the attestations: write permission rides on it.
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        "$WRANGLE_ROOT/actions/verify/run_verify.sh" run

    - name: Upload bundle artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.bundle-out }}/
        if-no-files-found: error

    # On a tag push, attach the rationalized asset set to the GitHub release if
    # one exists (wrangle does not create releases).
    - name: Attach assets to release
      if: github.ref_type == 'tag' && inputs.attach-to-release == 'true' && inputs.attach-release-assets == 'true'
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
        BUNDLE_OUT: ${{ inputs.bundle-out }}
        BUILD_TYPE: ${{ inputs.build-type }}
        DIST_DIR: ${{ inputs.dist-dir }}
        METADATA_ROOT: ${{ inputs.metadata-dir }}
        METADATA_ZIP_NAME: ${{ inputs.artifact-name }}.zip
        GH_TOKEN: ${{ github.token }}
        # The verify job has no checkout, so gh has no git remote to infer the
        # base repo from; set it explicitly or every gh release call no-ops.
        GH_REPO: ${{ github.repository }}
      run: |
        "$WRANGLE_ROOT/actions/verify/run_verify.sh" attach
