name: Wrangle Attest Provenance
description: >
  Own the attest-job wiring the go/npm/python reusable build workflows shared:
  download the build's dist, generate SLSA L3 build provenance via GitHub's
  attestation API, then sign every build-metadata attestation (SBOM + scan/v1)
  over the same dist subjects with wrangle-attest/bnd, post each to the GitHub
  attestation store, and assemble one per-artifact <artifact>.intoto.jsonl bundle
  per artifact (the shared provenance + that subject's signed metadata). The
  bundle directory is uploaded as the bundles workflow artifact the verify job
  appends the VSA to — so every non-VSA signed statement is persisted independent
  of the later policy verdict (#550, #566). The dist, bundles, and metadata
  artifact names are computed here from build-type + shortname (lib/shortname.sh
  via the action_path), so callers don't pass them.

  Pass exactly one subject: subject-checksums (go: dist/checksums.txt, the
  canonical subject set the VSA binds to) or subject-path (npm/python:
  dist/*). Container is its own OCI variant and does not use this composite.

inputs:
  build-type:
    description: "Build type (go, npm, python) — namespaces the computed artifact names."
    required: true
  shortname:
    description: "The build composite's path-derived shortname (empty at the repo root)."
    required: false
    default: ""
  subject-checksums:
    description: "Path to a standard sha256sum-format checksums file (one '<sha256>  <filename>' line per artifact) whose entries are the provenance subjects; go passes goreleaser's dist/checksums.txt. Mutually exclusive with subject-path."
    required: false
    default: ""
  subject-path:
    description: "Glob of files to attest as provenance subjects (npm/python). Mutually exclusive with subject-checksums."
    required: false
    default: ""

outputs:
  bundles-artifact-name:
    description: "Workflow-artifact name of the directory of per-artifact <artifact>.intoto.jsonl bundles (provenance + signed metadata) verify downloads to append each VSA."
    value: ${{ steps.names.outputs.bundles }}

runs:
  using: composite
  steps:
    - id: validate
      shell: bash
      env:
        SUBJECT_CHECKSUMS: ${{ inputs.subject-checksums }}
        SUBJECT_PATH: ${{ inputs.subject-path }}
      run: |
        set -euo pipefail
        set -f
        if [[ -n "$SUBJECT_CHECKSUMS" && -n "$SUBJECT_PATH" ]] || [[ -z "$SUBJECT_CHECKSUMS" && -z "$SUBJECT_PATH" ]]; then
            printf 'attest_provenance: pass exactly one of subject-checksums or subject-path\n' >&2
            exit 1
        fi

    - id: names
      shell: bash
      env:
        BUILD_TYPE: ${{ inputs.build-type }}
        SHORTNAME: ${{ inputs.shortname }}
      run: '"${{ github.action_path }}/../../lib/derive_names.sh" "$BUILD_TYPE" "$SHORTNAME"'

    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ steps.names.outputs.dist }}
        path: dist/

    - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      id: attest
      with:
        subject-checksums: ${{ inputs.subject-checksums }}
        subject-path: ${{ inputs.subject-path }}

    # Normalize the signed provenance bundle to one JSON object per line — the
    # shared seed every per-artifact bundle copies (ampel's jsonl: collector).
    - name: Stage the provenance seed
      shell: bash
      env:
        BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
      run: |
        set -euo pipefail
        set -f
        jq -c . "$BUNDLE_PATH" > "$RUNNER_TEMP/provenance.jsonl"

    # Sign every build-metadata attestation (SBOM + scan/v1) here, in attest, and
    # assemble the per-artifact bundles, so every non-VSA signed statement is
    # persisted independent of the later policy verdict (#550, #566). The build
    # job's pre-verify metadata is the input wrangle-attest walks.
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ steps.names.outputs.metadata-pre }}
        path: ${{ steps.names.outputs.metadata-dir }}/

    # Build only bnd (sign) + wrangle-attest (build the statements); attest does
    # not run ampel or cosign.
    - name: Install attest tools
      shell: bash
      run: |
        "${{ github.action_path }}/install_tools.sh"

    # Resolve the dist files to self-digest — the SAME subjects verify binds the
    # VSA to, so attest-signed metadata and the VSA share the sha256 digest.
    - name: Resolve metadata subjects
      id: subjects
      shell: bash
      env:
        SUBJECT_CHECKSUMS: ${{ inputs.subject-checksums }}
        SUBJECT_PATH: ${{ inputs.subject-path }}
      run: |
        "${{ github.action_path }}/resolve_subjects.sh"

    - name: Sign metadata and assemble the per-artifact bundles
      shell: bash
      env:
        METADATA_ROOT: ${{ steps.names.outputs.metadata-dir }}
        SUBJECTS: ${{ steps.subjects.outputs.subjects }}
        BUNDLE_IN: ${{ runner.temp }}/provenance.jsonl
        BUNDLE_OUT: ${{ runner.temp }}/bundles
        # Scanned commit recorded in each scan/v1 envelope's scannedCommit.
        COMMIT: ${{ github.sha }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        # bnd push github authenticates to the attestation store with this token;
        # the attestations: write permission rides on it.
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        "${{ github.action_path }}/sign_metadata.sh"

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ steps.names.outputs.bundles }}
        path: ${{ runner.temp }}/bundles/
        if-no-files-found: error
