name: Wrangle Verify VSA
description: >
  Verify that local artifact bytes carry wrangle's signed, PASSED VSA — the
  artifact's full policy verdict, not just its provenance — before
  publishing them. Drops into an adopter's publish job between
  `download-artifact` and the publish step, and fails closed: a file with
  no VSA, an untrusted signer, a mismatched digest, origin repository, or
  resource URI, or a verdict other than PASSED fails the run. Expects the bundles
  where wrangle's verify job puts them: same-run unified metadata artifacts named
  <type>-metadata-<shortname>, each holding one <artifact>.intoto.jsonl bundle per
  released artifact (alongside the SBOM and scan output, which it ignores).

inputs:
  path:
    description: >
      Artifact file to verify, or a directory — every regular file under it
      (recursively) is verified.
    required: true
  resource-uri:
    description: >
      The resource the VSA must name (its resourceUri — a purl or OCI ref).
      Pipe the build workflow's resource-uri output.
    required: true
  repo:
    description: >
      Origin repository the VSA's signing certificate must name
      (<owner>/<repo>). Defaults to the repository running the workflow.
    required: false
    default: ${{ github.repository }}
  github-token:
    description: >
      Token wrangle uses to verify its own tool image before running it. Leave
      unset to use the job's default token.
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    # Fail bad inputs before the VSA download.
    - name: Validate inputs
      shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.path }}
        RESOURCE_URI: ${{ inputs.resource-uri }}
        REPO: ${{ inputs.repo }}
      run: "${{ github.action_path }}/validate_inputs.sh"

    # Each metadata artifact lands in its own subdir (no merge-multiple), so
    # artifacts sharing a basename across builds don't clobber; verify_vsa.sh
    # finds every <artifact>.intoto.jsonl under the path (ignoring sbom/scan).
    - name: Download VSA bundles
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        # Match both the namespaced name (<type>-metadata-<sn>) and the
        # suffix-less root build (<type>-metadata). The '-premeta' transients
        # don't match — 'premeta' is not 'metadata'.
        pattern: "*-metadata*"
        path: ${{ runner.temp }}/wrangle-vsas

    - name: Verify artifact against VSA
      shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.path }}
        RESOURCE_URI: ${{ inputs.resource-uri }}
        REPO: ${{ inputs.repo }}
        VSA_DIR: ${{ runner.temp }}/wrangle-vsas
        # gh reads this for the attest-toolbox image VSA gate.
        GH_TOKEN: ${{ inputs.github-token }}
      run: "${{ github.action_path }}/verify_vsa.sh"
