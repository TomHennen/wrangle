name: Wrangle Verify VSA
description: >
  Verify that local artifact bytes carry wrangle's signed, PASSED VSA — the
  artifact's full policy verdict, not just its provenance — before
  publishing them. Drops into an adopter's publish job between
  `download-artifact` and the publish step, and fails closed: a file with
  no VSA, an untrusted signer, a mismatched digest, origin repository, or
  resource URI, or a verdict other than PASSED fails the run. Expects the bundles
  where wrangle's verify job puts them: same-run workflow artifacts named
  <type>-bundle-<shortname>, each holding one <artifact>.intoto.jsonl bundle per
  released artifact.

inputs:
  path:
    description: >
      Artifact file to verify, or a directory — every regular file under it
      (recursively) is verified.
    required: true
  resource-uri:
    description: >
      The resource the VSA must name (its resourceUri — a purl or OCI ref).
      Pipe the build workflow's resource-uri output.
    required: true
  repo:
    description: >
      Origin repository the VSA's signing certificate must name
      (<owner>/<repo>). Defaults to the repository running the workflow.
    required: false
    default: ${{ github.repository }}

runs:
  using: composite
  steps:
    # Fail bad inputs before the tool install and VSA download.
    - name: Validate inputs
      shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.path }}
        RESOURCE_URI: ${{ inputs.resource-uri }}
        REPO: ${{ inputs.repo }}
      run: "${{ github.action_path }}/validate_inputs.sh"

    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ github.action_path }}/../../tools/go.mod
        # No module/build cache: this runs in release publish jobs, where
        # wrangle's cache-isolation posture is cache-free builds.
        cache: false

    # go.sum pins the bytes; same manifest actions/verify builds from.
    - name: Install ampel
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        # shellcheck source=../../lib/env.sh
        source "$WRANGLE_ROOT/lib/env.sh"
        GOBIN="$WRANGLE_BIN_DIR" go -C "$WRANGLE_ROOT/tools" install github.com/carabiner-dev/ampel/cmd/ampel

    # wrangle's verify job uploads one bundle artifact per build, named
    # <type>-bundle-<shortname>, each holding the per-artifact
    # <artifact>.intoto.jsonl bundles for that build. Keep each in its own
    # subdir so artifacts that share a basename across builds don't clobber.
    # verify_vsa.sh concatenates every bundle found under the path.
    - name: Download VSA bundles
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: "*-bundle-*"
        path: ${{ runner.temp }}/wrangle-vsas

    - name: Verify artifact against VSA
      shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.path }}
        RESOURCE_URI: ${{ inputs.resource-uri }}
        REPO: ${{ inputs.repo }}
        VSA_DIR: ${{ runner.temp }}/wrangle-vsas
      run: "${{ github.action_path }}/verify_vsa.sh"
