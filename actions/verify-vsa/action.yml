name: Wrangle Verify VSA
description: >
  Verify that local artifact bytes carry wrangle's signed, PASSED VSA — the
  artifact's full policy verdict, not just its provenance — before
  publishing them. Drops into an adopter's publish job between
  `download-artifact` and the publish step, and fails closed: a file with
  no VSA, an untrusted signer, a mismatched digest or origin repository,
  or a verdict other than PASSED fails the run. Expects the VSAs where
  wrangle's verify job puts them: same-run workflow artifacts named
  <artifact-basename>.intoto.jsonl.

inputs:
  path:
    description: >
      Artifact file to verify, or a directory — every regular file under it
      (recursively) is verified.
    required: true
  signer-workflow:
    description: >
      Reusable workflow that signed the VSA, as
      <owner>/<repo>/<path-to-workflow>.yml (e.g.
      TomHennen/wrangle/.github/workflows/build_and_publish_npm.yml).
      Empty accepts any wrangle build_and_publish_* workflow; set it for
      the tightest binding.
    required: false
    default: ""
  repo:
    description: >
      Origin repository the VSA's signing certificate must name
      (<owner>/<repo>). Defaults to the repository running the workflow.
    required: false
    default: ${{ github.repository }}

runs:
  using: composite
  steps:
    # Fail bad inputs before the tool installs and VSA download.
    - name: Validate inputs
      shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.path }}
        SIGNER_WORKFLOW: ${{ inputs.signer-workflow }}
        REPO: ${{ inputs.repo }}
      run: "${{ github.action_path }}/validate_inputs.sh"

    # Go for the ampel build below. The runner image's PATH Go is not
    # contractually guaranteed (the ubuntu-24.04 image lists Go under cached
    # tools only), so the action provisions its own, at the version the tool
    # manifest pins.
    - name: Setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: ${{ github.action_path }}/../../tools/go.mod
        # No module/build cache: this runs in release publish jobs, where
        # wrangle's cache-isolation posture is cache-free builds.
        cache: false

    # Build ampel from the pinned tool manifest into WRANGLE_BIN_DIR — go.sum
    # pins the bytes, and it is the same manifest actions/verify builds from,
    # so the version is single-sourced. verify_vsa.sh re-sources lib/env.sh
    # to find it on PATH, so there is no write to $GITHUB_PATH.
    - name: Install ampel
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        # shellcheck source=../../lib/env.sh
        source "$WRANGLE_ROOT/lib/env.sh"
        GOBIN="$WRANGLE_BIN_DIR" go -C "$WRANGLE_ROOT/tools" install github.com/carabiner-dev/ampel/cmd/ampel

    # wrangle's verify job uploads one VSA artifact per dist file, named
    # <artifact-basename>.intoto.jsonl; merge them into one directory.
    - name: Download VSA artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        pattern: "*.intoto.jsonl"
        merge-multiple: true
        path: ${{ runner.temp }}/wrangle-vsas

    - name: Verify artifact against VSA
      shell: bash
      env:
        ARTIFACT_PATH: ${{ inputs.path }}
        SIGNER_WORKFLOW: ${{ inputs.signer-workflow }}
        REPO: ${{ inputs.repo }}
        VSA_DIR: ${{ runner.temp }}/wrangle-vsas
      run: "${{ github.action_path }}/verify_vsa.sh"
