name: Wrangle Package Metadata Names
description: >
  Derive the per-build packaging artifact names for a build type from the
  build composite's path-derived shortname. The four reusable build
  workflows (go/python/npm/container) call this instead of each repeating
  the same name-join loop, so the names can't drift between build types.

  Runs from the wrangle checkout, so it sources lib/shortname.sh for the
  root-path normalization — the build/release jobs check out the ADOPTER
  repo (no lib/) and consume these outputs rather than deriving names.

inputs:
  build-type:
    description: "Build type the names are namespaced under (go, python, npm, container)."
    required: true
  shortname:
    description: "The build composite's path-derived shortname output (alphanumeric + '_', empty at the repo root)."
    required: false
    default: ""

outputs:
  dist:
    description: "Name of the dist/ product artifact."
    value: ${{ steps.names.outputs.dist }}
  scan:
    description: "Name of the source-scan output transient folded into the metadata."
    value: ${{ steps.names.outputs.scan }}
  checks:
    description: "Name of the checks-job transient (go: govulncheck.json) folded into the metadata."
    value: ${{ steps.names.outputs.checks }}
  metadata:
    description: "Name of the unified metadata artifact (sbom + scan/ + bundle)."
    value: ${{ steps.names.outputs.metadata }}
  metadata-pre:
    description: "Name of the build job's pre-verify metadata transient (release runs)."
    value: ${{ steps.names.outputs.metadata-pre }}
  provenance-bundle:
    description: "Name of the attest job's raw provenance bundle transient."
    value: ${{ steps.names.outputs.provenance-bundle }}

runs:
  using: composite
  steps:
    - id: names
      shell: bash
      env:
        BUILD_TYPE: ${{ inputs.build-type }}
        SHORTNAME: ${{ inputs.shortname }}
      run: '"${{ github.action_path }}/derive_names.sh" "$BUILD_TYPE" "$SHORTNAME"'
