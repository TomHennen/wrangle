name: Wrangle Package Metadata Names
description: >
  Derive the per-build packaging artifact names (and the shortname) for a
  build type. The build workflows call this from both their scan job (passing
  path) and their build job (passing shortname) so names can't drift between
  build types or between the scan and build jobs. Runs from the wrangle
  checkout so it can source lib/shortname.sh, which the adopter checkout lacks.

inputs:
  build-type:
    description: "Build type the names are namespaced under (go, python, npm, container)."
    required: true
  shortname:
    description: "Overrides the shortname that path would otherwise compute. Build jobs pass their already-computed shortname here."
    required: false
    default: ""
  path:
    description: "Input path to derive the shortname from when shortname is empty (the scan job, which runs before the build)."
    required: false
    default: ""

outputs:
  dist:
    description: "Name of the dist/ product artifact."
    value: ${{ steps.names.outputs.dist }}
  scan:
    description: "Name of the source-scan output transient folded into the metadata."
    value: ${{ steps.names.outputs.scan }}
  checks:
    description: "Name of the checks-job transient (go: govulncheck.json) folded into the metadata."
    value: ${{ steps.names.outputs.checks }}
  metadata:
    description: "Name of the unified metadata artifact (sbom + scan/ + bundle)."
    value: ${{ steps.names.outputs.metadata }}
  metadata-pre:
    description: "Name of the build job's pre-verify metadata transient (release runs)."
    value: ${{ steps.names.outputs.metadata-pre }}
  provenance-bundle:
    description: "Name of the attest job's raw provenance bundle transient."
    value: ${{ steps.names.outputs.provenance-bundle }}
  metadata-dir:
    description: "The unified metadata dir (metadata/<type>[/<shortname>]) the bundle and sbom + scan/ live under."
    value: ${{ steps.names.outputs.metadata-dir }}
  shortname:
    description: "The resolved shortname (the input shortname, or the one derived from path)."
    value: ${{ steps.names.outputs.shortname }}

runs:
  using: composite
  steps:
    - id: names
      shell: bash
      env:
        BUILD_TYPE: ${{ inputs.build-type }}
        SHORTNAME: ${{ inputs.shortname }}
        PATH_IN: ${{ inputs.path }}
      run: '"${{ github.action_path }}/derive_names.sh" "$BUILD_TYPE" "$SHORTNAME" "$PATH_IN"'
