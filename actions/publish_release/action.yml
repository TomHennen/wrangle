name: Wrangle Publish Release
description: >
  Create the tag's GitHub release if absent and upload the rationalized asset
  set. attest-and-verify: required attaches the verify job's signed bundles +
  dist + metadata zip; disabled attaches dist + metadata (no bundles/VSAs) and
  marks the body unattested. The signing-free publish step: this is the only job
  holding contents: write.

inputs:
  build-type:
    description: "Build type (go, python, npm) — namespaces the computed artifact names."
    required: true
  shortname:
    description: "The build composite's path-derived shortname (empty at the repo root)."
    required: false
    default: ""
  attest-and-verify:
    description: "required attaches the verify job's signed bundles; disabled publishes an unattested release."
    required: false
    default: required

runs:
  using: composite
  steps:
    - id: names
      shell: bash
      env:
        BUILD_TYPE: ${{ inputs.build-type }}
        SHORTNAME: ${{ inputs.shortname }}
      run: '"${{ github.action_path }}/../../lib/derive_names.sh" "$BUILD_TYPE" "$SHORTNAME"'

    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ steps.names.outputs.dist }}
        path: dist/

    # The metadata artifact: on the attested path it is the verify job's
    # completed dir (sbom + scan/ + the signed bundles); unattested it is the
    # build job's sbom + scan/.
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ steps.names.outputs.metadata }}
        path: ${{ steps.names.outputs.metadata-dir }}/

    - name: Attach assets to release
      if: github.ref_type == 'tag'
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
        ATTESTATION: ${{ inputs.attest-and-verify }}
        BUNDLE_OUT: ${{ steps.names.outputs.metadata-dir }}
        BUILD_TYPE: ${{ inputs.build-type }}
        DIST_DIR: dist
        METADATA_ROOT: ${{ steps.names.outputs.metadata-dir }}
        METADATA_ZIP_NAME: ${{ steps.names.outputs.metadata }}.zip
        GH_TOKEN: ${{ github.token }}
        # No checkout in this job, so gh has no remote to infer the base repo from.
        GH_REPO: ${{ github.repository }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
      run: |
        if [[ "$ATTESTATION" == "disabled" ]]; then
            "$WRANGLE_ROOT/actions/verify/run_verify.sh" attach-unattested
        else
            "$WRANGLE_ROOT/actions/verify/run_verify.sh" attach
        fi
