name: Wrangle Verify Release
description: >
  Own the verify-job wiring the four reusable build workflows shared: stage
  the build's dist, provenance bundle, and pre-verify metadata, then call
  actions/verify to evaluate the PolicySet, sign one VSA per subject, and
  emit the unified metadata artifact. The artifact names and the metadata
  dir are computed here from build-type + shortname (lib/shortname.sh via
  the action_path), so adding a verify input is one edit here, not four.

  The dist download is skipped for the container build type — set oci-target;
  the container's artifact is the image, not a workflow-artifact dist. The
  attest-assembled bundles download for every build type. Registry auth (cosign
  install, registry login) stays in the container workflow: it is container-only
  and handles registry secrets.

inputs:
  build-type:
    description: "Build type (go, python, npm, container) — namespaces the computed names and metadata dir."
    required: true
  shortname:
    description: "The build composite's path-derived shortname (empty at the repo root)."
    required: false
    default: ""
  policy:
    description: "wrangle PolicySet to evaluate (path under policies/ or an ampel locator)."
    required: true
  collector:
    description: "Additional ampel collector beyond the per-artifact bundle (container's oci: referrer collector). Empty for go/npm/python."
    required: false
    default: ""
  context:
    description: "Per-verify context for the policy's CEL (ampel KEY:VALUE, comma-separated)."
    required: false
    default: ""
  dist-files:
    description: "JSON array of dist basenames to bind a VSA to (go/npm/python). Mutually exclusive with subjects."
    required: false
    default: ""
  subjects:
    description: "Newline-separated subjects to bind a VSA to (container: the image digest). Mutually exclusive with dist-files."
    required: false
    default: ""
  oci-target:
    description: "OCI image ref to fetch provenance from and push the bundle to (container only). When set, the dist/provenance workflow-artifact downloads are skipped."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - id: names
      shell: bash
      env:
        BUILD_TYPE: ${{ inputs.build-type }}
        SHORTNAME: ${{ inputs.shortname }}
      run: '"${{ github.action_path }}/../../lib/derive_names.sh" "$BUILD_TYPE" "$SHORTNAME"'

    # Skipped for container: the artifact is the image, not a workflow-artifact dist.
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      if: ${{ inputs.oci-target == '' }}
      with:
        name: ${{ steps.names.outputs.dist }}
        path: dist/

    # Stage the build job's sbom + scan/ so verify's completed bundles land beside
    # them under the metadata dir.
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ steps.names.outputs.metadata-pre }}
        path: ${{ steps.names.outputs.metadata-dir }}/

    # The attest job assembled the per-artifact bundles (provenance + signed
    # SBOM/scan, all build types); verify appends the VSA to each. attest owns the
    # signing + store push (and, for container, the OCI referrer push) (#550, #566).
    # Land them in the metadata dir so verify appends in place.
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ steps.names.outputs.bundles }}
        path: ${{ steps.names.outputs.metadata-dir }}/

    # TODO: replace with $/actions/verify when GitHub ships $/ syntax (#136)
    - uses: TomHennen/wrangle/actions/verify@e029656803f53a67502f050a926acaf82a92eaf7 # main 2026-07-12
      with:
        dist-files: ${{ inputs.dist-files }}
        subjects: ${{ inputs.subjects }}
        policy: ${{ inputs.policy }}
        collector: ${{ inputs.collector }}
        # The attest-assembled bundles, downloaded into the metadata dir; verify
        # appends each VSA in place.
        bundle-in: ${{ steps.names.outputs.metadata-dir }}
        bundle-out: ${{ steps.names.outputs.metadata-dir }}
        artifact-name: ${{ steps.names.outputs.metadata }}
        context: ${{ inputs.context }}
        oci-target: ${{ inputs.oci-target }}
        fail: "true"
