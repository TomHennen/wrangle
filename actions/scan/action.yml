name: Wrangle Source Scan
description: Scan source code with wrangle security tools

inputs:
  tools:
    description: >
      Space-separated list of tools to run. Suffix with :info for
      informational-only (default policy: :fail). Adapter-pattern tools
      are dispatched to run.sh; action-pattern tools are invoked via
      their uses: steps.
    required: false
    default: "osv zizmor scorecard:info dependency-review"

runs:
  using: "composite"
  steps:
    - name: Set up wrangle
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: "$WRANGLE_ROOT/lib/setup.sh"

    # Run adapter-pattern tools via the orchestrator (run.sh).
    # run.sh strips :policy suffixes and skips action-pattern tools.
    - name: Run adapter-pattern tools
      shell: bash
      # tools input passed via env var to prevent expression injection.
      # ${{ github.action_path }} is safe to interpolate in run: blocks —
      # it is set by GitHub when fetching the composite action and is not
      # attacker-controllable (unlike inputs.* or github.event.*).
      env:
        WRANGLE_TOOLS: ${{ inputs.tools }}
        WRANGLE_ROOT: ${{ github.action_path }}/../..
        # osv-scanner builds from source via `go install` (tools/osv/
        # install.sh); a cold runner's module download + compile can
        # exceed run.sh's 300s default install timeout.
        WRANGLE_INSTALL_TIMEOUT: "900"
      run: |
        # shellcheck source=../../lib/env.sh
        source "$WRANGLE_ROOT/lib/env.sh"
        # $WRANGLE_TOOLS is intentionally unquoted so it word-splits into
        # multiple arguments. This is safe because the orchestrator validates
        # each token against ^[a-z][a-z0-9_-]*$ and runs set -f.
        "$WRANGLE_ROOT/run.sh" \
          -s "$GITHUB_WORKSPACE" \
          -o "$WRANGLE_METADATA_DIR" \
          $WRANGLE_TOOLS

    # Action-pattern tools: invoked via local path. Inside a reusable
    # workflow, ./ resolves to this repo at the called ref (the adopter's
    # pinned tag or the PR branch for local CI).
    # Each tool action handles its own log banner and human-readable
    # output generation (output.md) — see tools/<name>/action.yml.
    # TODO: replace with $/tools/zizmor when $/ syntax ships (#136, #137)
    - name: Zizmor
      if: always() && contains(inputs.tools, 'zizmor')
      uses: TomHennen/wrangle/tools/zizmor@e0944de1f0748ef3210cb40db0a987dd5919e73d # main 2026-06-12

    # Scorecard only runs on push events — it requires GITHUB_TOKEN scopes
    # that aren't available on PRs and uses Docker, which only mounts
    # $GITHUB_WORKSPACE. Skipping on PRs avoids guaranteed failures.
    # TODO: replace with $/tools/scorecard when $/ syntax ships (#136, #137)
    - name: Scorecard
      if: always() && contains(inputs.tools, 'scorecard') && github.event_name != 'pull_request'
      uses: TomHennen/wrangle/tools/scorecard@e0944de1f0748ef3210cb40db0a987dd5919e73d # main 2026-06-12

    # Dependency Review is PR-only — the upstream action requires
    # github.event.pull_request.base.sha / head.sha to compute the diff.
    # See tools/dependency-review/SPEC.md.
    # TODO: replace with $/tools/dependency-review when $/ syntax ships (#136, #137)
    # Per-tool options are not plumbed through actions/scan inputs (#221):
    # each tool reads its native config file — dependency-review picks up
    # .github/dependency-review-config.yml when the scanned repo has one.
    # The wrapper's inline defaults (fail-on-severity: high) still apply.
    - name: Dependency Review
      if: always() && contains(inputs.tools, 'dependency-review') && github.event_name == 'pull_request'
      uses: TomHennen/wrangle/tools/dependency-review@e0944de1f0748ef3210cb40db0a987dd5919e73d # main 2026-06-12

    - name: Generate step summary
      if: always()
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        # shellcheck source=../../lib/env.sh
        source "$WRANGLE_ROOT/lib/env.sh"
        if [[ -d "$WRANGLE_METADATA_DIR" ]]; then
          "$WRANGLE_ROOT/lib/format_sarif_summary.sh" "$WRANGLE_METADATA_DIR" >> "$GITHUB_STEP_SUMMARY"
        fi

    # Per-finding CI-log lines. MUST run before "Check results" so the
    # finding context appears above the failure line — reordering
    # silently defeats issue #158.
    - name: Log findings
      if: always()
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        # shellcheck source=../../lib/env.sh
        source "$WRANGLE_ROOT/lib/env.sh"
        "$WRANGLE_ROOT/lib/log_findings.sh" "$WRANGLE_METADATA_DIR"

    # Check results: fail the check if any :fail-policy tool reported
    # findings. Tools with :info policy are noted but don't block.
    - name: Check results
      if: always()
      shell: bash
      env:
        WRANGLE_TOOLS: ${{ inputs.tools }}
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        # shellcheck source=../../lib/env.sh
        source "$WRANGLE_ROOT/lib/env.sh"
        # $WRANGLE_TOOLS is intentionally unquoted for word-splitting.
        "$WRANGLE_ROOT/lib/check_results.sh" "$WRANGLE_METADATA_DIR" $WRANGLE_TOOLS

    # SARIF upload: per-tool attribution in the Security tab.
    # continue-on-error is legitimate here — Advanced Security may not
    # be available (private repos, no license).
    #
    # Each upload is gated on its tool actually being in the `tools`
    # input. Without the gate, upload-sarif emits noisy `::error::`
    # annotations on every run that omits the tool because the
    # corresponding metadata/<tool>/output.sarif file was never
    # produced — see issue #189.
    - name: Upload OSV SARIF
      if: always() && contains(inputs.tools, 'osv')
      uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      continue-on-error: true
      with:
        sarif_file: ${{ github.workspace }}/.wrangle/metadata/osv/output.sarif
        category: wrangle/osv

    # Zizmor SARIF upload is handled by the upstream zizmor-action
    # (advanced-security: true). Adding a wrangle upload here would create
    # a duplicate code scanning configuration.

    - name: Upload Scorecard SARIF
      if: always() && contains(inputs.tools, 'scorecard') && github.event_name != 'pull_request'
      uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      continue-on-error: true
      with:
        sarif_file: ${{ github.workspace }}/.wrangle/metadata/scorecard/output.sarif
        category: wrangle/scorecard

    # Skip Code Scanning upload on a dep-review tool error: collect_outputs.sh
    # / mark_error.sh write the error marker exactly when the upstream
    # produced no usable findings, and any SARIF on disk in that case is
    # either absent or an empty fallback. Uploading an empty SARIF would
    # overwrite the previous run's findings in the Security tab with
    # `results: []`, silently scrubbing real findings on a transient API
    # failure. Gating on the marker preserves the prior valid state.
    - name: Upload Dependency Review SARIF
      if: always() && contains(inputs.tools, 'dependency-review') && github.event_name == 'pull_request' && hashFiles('.wrangle/metadata/dependency-review/error') == ''
      uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
      continue-on-error: true
      with:
        sarif_file: ${{ github.workspace }}/.wrangle/metadata/dependency-review/output.sarif
        category: wrangle/dependency-review

    - name: Upload scan results artifact
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      continue-on-error: true
      with:
        name: wrangle-scan-results
        path: ${{ github.workspace }}/.wrangle/metadata/
        if-no-files-found: ignore
