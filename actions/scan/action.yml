name: Wrangle Source Scan
description: Scan source code with wrangle security tools

inputs:
  tools:
    description: "Space-separated list of adapter-pattern tools to run (default: osv)"
    required: false
    default: "osv"

runs:
  using: "composite"
  steps:
    - name: Set up wrangle
      shell: bash
      run: |
        WRANGLE_BIN_DIR="${RUNNER_TEMP}/.wrangle/bin"
        # Metadata dir is workspace-relative so Scorecard's Docker container
        # can write to it ($GITHUB_WORKSPACE is mounted, $RUNNER_TEMP is not).
        WRANGLE_METADATA_DIR="${GITHUB_WORKSPACE}/.wrangle/metadata"
        mkdir -p "$WRANGLE_BIN_DIR" "$WRANGLE_METADATA_DIR"
        echo "$WRANGLE_BIN_DIR" >> "$GITHUB_PATH"
        echo "WRANGLE_BIN_DIR=$WRANGLE_BIN_DIR" >> "$GITHUB_ENV"
        echo "WRANGLE_METADATA_DIR=$WRANGLE_METADATA_DIR" >> "$GITHUB_ENV"

    # Install slsa-verifier for tools that use SLSA provenance verification
    # (e.g., OSV-Scanner). Required before running adapter-pattern tools.
    - name: Install slsa-verifier
      uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

    # Adapter-pattern tools: run via the orchestrator (run.sh)
    - name: Run adapter-pattern tools
      shell: bash
      # tools input passed via env var to prevent expression injection.
      # ${{ github.action_path }} is safe to interpolate in run: blocks —
      # it is set by GitHub when fetching the composite action and is not
      # attacker-controllable (unlike inputs.* or github.event.*).
      env:
        WRANGLE_TOOLS: ${{ inputs.tools }}
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        # $WRANGLE_TOOLS is intentionally unquoted so it word-splits into
        # multiple arguments. This is safe because the orchestrator validates
        # each token against ^[a-z][a-z0-9_-]*$ and runs set -f.
        "$WRANGLE_ROOT/run.sh" \
          -s "$GITHUB_WORKSPACE" \
          -o "$WRANGLE_METADATA_DIR" \
          $WRANGLE_TOOLS

    # Action-pattern tools: invoked via local path. Inside a reusable
    # workflow, ./ resolves to this repo at the called ref (the adopter's
    # pinned tag or the PR branch for local CI).
    - name: Zizmor
      if: always()
      uses: ./tools/zizmor

    # Scorecard only runs on push events — it requires GITHUB_TOKEN scopes
    # that aren't available on PRs and uses Docker, which only mounts
    # $GITHUB_WORKSPACE. Skipping on PRs avoids guaranteed failures.
    - name: Scorecard
      if: always() && github.event_name != 'pull_request'
      uses: ./tools/scorecard

    - name: Generate step summary
      if: always()
      shell: bash
      env:
        WRANGLE_ROOT: ${{ github.action_path }}/../..
      run: |
        if [[ -d "$WRANGLE_METADATA_DIR" ]]; then
          "$WRANGLE_ROOT/lib/format_sarif_summary.sh" "$WRANGLE_METADATA_DIR" >> "$GITHUB_STEP_SUMMARY"
        fi

    # Check results: fail the check if any tool (except informational ones)
    # found issues. Scorecard is informational — it assesses repo-level
    # security posture, not per-change vulnerabilities.
    - name: Check results
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        exit_code=0
        for tool_dir in "$WRANGLE_METADATA_DIR"/*/; do
          if [[ ! -d "$tool_dir" ]]; then continue; fi
          tool="$(basename "$tool_dir")"
          # Scorecard is informational-only — a low score is a maintenance
          # signal, not a reason to block a PR.
          if [[ "$tool" == "scorecard" ]]; then continue; fi
          sarif="${tool_dir}output.sarif"
          if [[ -f "$sarif" ]]; then
            if ! count="$(jq '[.runs[].results[]] | length' "$sarif" 2>/dev/null)"; then
              printf 'wrangle: %s produced invalid SARIF\n' "$tool" >&2
              exit_code=1
            elif [[ "$count" -gt 0 ]]; then
              printf 'wrangle: %s reported %s finding(s)\n' "$tool" "$count"
              exit_code=1
            fi
          fi
        done
        exit "$exit_code"

    # SARIF upload: per-tool attribution in the Security tab.
    # continue-on-error is legitimate here — Advanced Security may not
    # be available (private repos, no license).
    - name: Upload OSV SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
      continue-on-error: true
      with:
        sarif_file: ${{ env.WRANGLE_METADATA_DIR }}/osv/output.sarif
        category: wrangle/osv

    # Zizmor SARIF upload is handled by the upstream zizmor-action
    # (advanced-security: true). No wrangle upload step needed.

    - name: Upload Scorecard SARIF
      if: always() && github.event_name != 'pull_request'
      uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
      continue-on-error: true
      with:
        sarif_file: ${{ env.WRANGLE_METADATA_DIR }}/scorecard/output.sarif
        category: wrangle/scorecard

    - name: Upload scan results artifact
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      continue-on-error: true
      with:
        name: wrangle-scan-results
        path: ${{ env.WRANGLE_METADATA_DIR }}/
        if-no-files-found: ignore
